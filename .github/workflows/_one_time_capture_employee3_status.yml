name: One-time capture employee3 status

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/employee3-status-trigger.txt"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Capture latest employee3 run
        id: status
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          JSON=$(gh run list --repo "$REPO" --workflow employee3_runner.yml --event workflow_dispatch --limit 1 --json databaseId,status,conclusion,createdAt,updatedAt,url,headSha)
          echo "$JSON"
          RUN_ID=$(echo "$JSON" | jq -r '.[0].databaseId // empty')
          STATUS=$(echo "$JSON" | jq -r '.[0].status // "unknown"')
          CONCLUSION=$(echo "$JSON" | jq -r '.[0].conclusion // "none"')
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"
          if [ -n "$RUN_ID" ]; then
            gh run view "$RUN_ID" --repo "$REPO" --json jobs,status,conclusion,url
          fi

      - name: Remove status capture and record state
        env:
          ACTIONS_PAT: ${{ secrets.ACTIONS_PAT }}
          FALLBACK_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.status.outputs.run_id }}
          STATUS: ${{ steps.status.outputs.status }}
          CONCLUSION: ${{ steps.status.outputs.conclusion }}
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/_one_time_capture_employee3_status.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Employee3 status ${STATUS} ${CONCLUSION} run ${RUN_ID}"
          git config --local --unset-all http.https://github.com/.extraheader || true
          TOKEN="${ACTIONS_PAT:-$FALLBACK_TOKEN}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
