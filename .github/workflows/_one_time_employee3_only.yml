name: One-time employee3-only schedule consolidation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/employee3-only-trigger.txt"

permissions:
  contents: write
  actions: read

concurrency:
  group: one-time-employee3-only-schedule-consolidation
  cancel-in-progress: false

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Consolidate schedules and run three self-checks
        run: python -u .github/scripts/consolidate_employee3_only.py

      - name: Commit final configuration and remove one-time files
        shell: bash
        env:
          ACTIONS_PAT: ${{ secrets.ACTIONS_PAT }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git rm .github/workflows/_one_time_employee3_only.yml
          git rm .github/scripts/consolidate_employee3_only.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows
          git diff --cached --check
          git commit -m "Only run employee3 daily and harden cache chain"
          git config --local --unset-all http.https://github.com/.extraheader || true
          TOKEN="${ACTIONS_PAT:-$FALLBACK_TOKEN}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
