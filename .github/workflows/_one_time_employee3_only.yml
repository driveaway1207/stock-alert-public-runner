name: One-time employee3-only schedule consolidation

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/_one_time_employee3_only.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: one-time-employee3-only-schedule-consolidation
  cancel-in-progress: false

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install YAML validator
        run: python -m pip install --upgrade pyyaml

      - name: Consolidate schedules and harden employee3
        shell: bash
        run: |
          python - <<'PYCODE'
          from __future__ import annotations

          import re
          from pathlib import Path
          import yaml

          ROOT = Path('.github/workflows')
          EMPLOYEE3 = ROOT / 'employee3_runner.yml'
          SELF = ROOT / '_one_time_employee3_only.yml'

          def indent(line: str) -> int:
              return len(line) - len(line.lstrip(' '))

          def is_on(line: str) -> bool:
              return indent(line) == 0 and line.strip() in {'on:', '"on":', "'on':"}

          def schedules(text: str) -> list[str]:
              lines = text.splitlines()
              inside = False
              found: list[str] = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  s = line.strip()
                  if is_on(line):
                      inside = True
                      i += 1
                      continue
                  if inside and indent(line) == 0 and s and not s.startswith('#'):
                      inside = False
                  if inside and indent(line) == 2 and s == 'schedule:':
                      i += 1
                      while i < len(lines):
                          row = lines[i]
                          rs = row.strip()
                          if rs and indent(row) <= 2:
                              break
                          m = re.search(r"cron:\s*['\"]?([^'\"]+)['\"]?", rs)
                          if m:
                              found.append(m.group(1).strip())
                          i += 1
                      continue
                  i += 1
              return found

          def remove_schedule(text: str) -> tuple[str, bool]:
              lines = text.splitlines(keepends=True)
              out: list[str] = []
              inside = False
              removed = False
              i = 0
              while i < len(lines):
                  line = lines[i]
                  s = line.strip()
                  if is_on(line):
                      inside = True
                      out.append(line)
                      i += 1
                      continue
                  if inside and indent(line) == 0 and s and not s.startswith('#'):
                      inside = False
                  if inside and indent(line) == 2 and s == 'schedule:':
                      removed = True
                      while out and (not out[-1].strip() or (indent(out[-1]) == 2 and out[-1].strip().startswith('#'))):
                          out.pop()
                      i += 1
                      while i < len(lines):
                          row = lines[i]
                          if row.strip() and indent(row) <= 2:
                              break
                          i += 1
                      continue
                  out.append(line)
                  i += 1
              result = ''.join(out)
              if removed and '自动定时运行已关闭' not in result:
                  rows = result.splitlines(keepends=True)
                  for n, row in enumerate(rows):
                      if is_on(row):
                          rows.insert(n + 1, '  # 自动定时运行已关闭；仅保留手动或事件触发。\n')
                          break
                  result = ''.join(rows)
              return result, removed

          def expression(name: str) -> str:
              return '$' + '{{ ' + name + ' }}'

          def patch_employee3(text: str) -> str:
              text = text.replace('北京时间20:10', '北京时间21:10')
              text, count = re.subn(
                  r'(?m)^(\s*-\s*cron:\s*)["\']10 12 \* \* 1-5["\']\s*$',
                  r'\1"10 13 * * 1-5"',
                  text,
                  count=1,
              )
              if count != 1 and '10 13 * * 1-5' not in text:
                  raise SystemExit('employee3 cron was not found')

              native = '      - name: run employee3 native engine\n'
              if native not in text:
                  raise SystemExit('employee3 engine marker missing')

              old_date = expression('steps.config.outputs.target_date')
              effective_date = expression('steps.cache_state.outputs.effective_target_date')
              ref_name = expression('github.ref_name')
              run_id = expression('github.run_id')

              block = f'''      - name: refresh shared kline cache for employee3
                env:
                  PYTHONUNBUFFERED: 1
                  MAX_RUNTIME_MINUTES: "45"
                  SOFT_STOP_BUFFER_MINUTES: "5"
                  MIN_FRESH_COVERAGE: "0.965"
                  ALLOW_STOCK_ALERT_IF_STALE_ONLY: "1"
                run: |
                  mkdir -p outputs kline_cache
                  python -u tools/update_kline_cache_daily.py

              - name: validate refreshed cache and resolve effective trade date
                id: cache_state
                shell: bash
                env:
                  REQUESTED_TARGET_DATE: {old_date}
                run: |
                  python - <<'PY' >> "$GITHUB_OUTPUT"
                  import json
                  from pathlib import Path
                  path = Path("outputs/daily_kline_update_state.json")
                  if not path.exists():
                      raise SystemExit("missing cache refresh state")
                  state = json.loads(path.read_text(encoding="utf-8"))
                  effective = str(state.get("目标交易日") or "").strip()
                  coverage = float(state.get("fresh_coverage") or 0.0)
                  if not effective or not bool(state.get("should_run_stock_alert")):
                      raise SystemExit(f"cache freshness gate failed: effective={{effective}} coverage={{coverage:.6f}}")
                  print(f"effective_target_date={{effective}}")
                  print(f"fresh_coverage={{coverage:.6f}}")
                  PY

              - name: save refreshed shared kline cache
                uses: actions/cache/save@v4
                with:
                  path: kline_cache
                  key: a-kline-cache-{ref_name}-employee3-{run_id}

              - name: upload employee3 cache refresh report
                if: always()
                uses: actions/upload-artifact@v4
                with:
                  name: employee3-cache-refresh-report
                  path: |
                    outputs/daily_kline_update_report_*.csv
                    outputs/daily_kline_update_summary_*.csv
                    outputs/daily_kline_update_state.json
                  if-no-files-found: warn
                  retention-days: 14

          '''

              if 'refresh shared kline cache for employee3' not in text:
                  before, after = text.split(native, 1)
                  text = before + block + native + after

              marker = text.index(native)
              text = text[:marker] + text[marker:].replace(old_date, effective_date)
              return text

          changed: list[str] = []
          removed_from: list[str] = []
          for path in sorted(ROOT.glob('*.y*ml')):
              original = path.read_text(encoding='utf-8')
              updated = original
              if path == EMPLOYEE3:
                  updated = patch_employee3(original)
              elif path != SELF:
                  updated, did_remove = remove_schedule(original)
                  if did_remove:
                      removed_from.append(path.name)
              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(path.name)

          # 自检一：文本扫描定时触发归属。
          scan = {p.name: schedules(p.read_text(encoding='utf-8')) for p in ROOT.glob('*.y*ml') if p != SELF}
          bad = {k: v for k, v in scan.items() if k != EMPLOYEE3.name and v}
          assert not bad, f'non-employee3 schedules remain: {bad}'
          assert scan.get(EMPLOYEE3.name) == ['10 13 * * 1-5'], scan.get(EMPLOYEE3.name)
          print('SELF-CHECK-1 PASS')

          # 自检二：所有工作流均可解析，且只有三号有 schedule。
          parsed = {}
          for path in ROOT.glob('*.y*ml'):
              if path == SELF:
                  continue
              obj = yaml.load(path.read_text(encoding='utf-8'), Loader=yaml.BaseLoader)
              assert isinstance(obj, dict), path.name
              on_obj = obj.get('on')
              parsed[path.name] = on_obj.get('schedule') if isinstance(on_obj, dict) else None
          assert not {k: v for k, v in parsed.items() if k != EMPLOYEE3.name and v}, parsed
          assert parsed.get(EMPLOYEE3.name), parsed.get(EMPLOYEE3.name)
          print('SELF-CHECK-2 PASS')

          # 自检三：缓存、数据门控、引擎、报告与推送链路完整。
          e3 = EMPLOYEE3.read_text(encoding='utf-8')
          required = [
              'python -u tools/update_kline_cache_daily.py',
              'id: cache_state',
              'actions/cache/save@v4',
              effective_date,
              'python -u employee3_runner.py',
              'python -u employee3_report_guard.py',
              'TELEGRAM_BOT_TOKEN',
              'DATA_GATE_TARGET_DATE',
          ]
          missing = [x for x in required if x not in e3]
          assert not missing, missing
          assert 'python -u stock_alert.py' not in e3
          print('SELF-CHECK-3 PASS')
          print('changed=', ','.join(changed))
          print('schedule_removed=', ','.join(removed_from))
          PYCODE

      - name: Commit final configuration and remove this workflow
        shell: bash
        env:
          ACTIONS_PAT: ${{ secrets.ACTIONS_PAT }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git rm .github/workflows/_one_time_employee3_only.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows
          git diff --cached --check
          git commit -m "Only run employee3 daily and harden cache chain"
          TOKEN="${ACTIONS_PAT:-$FALLBACK_TOKEN}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
