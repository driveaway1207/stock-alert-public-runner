name: 擎天
run-name: 擎天

"on":
  workflow_dispatch:
    inputs:
      qingtian_date_choice:
        description: "🎨 选择海选日期｜默认：上一个交易日"
        required: false
        type: choice
        default: "🟦 上一个交易日"
        options:
          - "🟦 上一个交易日"
          - "🟩 当前交易日"
          - "🟨 上两个交易日"
          - "🟧 上三个交易日"
          - "🟥 上四个交易日"
          - "🟪 上五个交易日"
          - "🟫 上六个交易日"
          - "⬛ 上七个交易日"

      qingtian_target_date:
        description: "✍️ 手动日期｜可填0604、6.4、YYYY-MM-DD、YYYYMMDD｜填了优先"
        required: false
        default: ""

      qingtian_send_telegram:
        description: "📨 是否发送Telegram"
        required: false
        type: choice
        default: "🟩 是｜发送Telegram"
        options:
          - "🟩 是｜发送Telegram"
          - "⬜ 否｜不发送Telegram"

      qingtian_baostock_fallback:
        description: "🔄 是否允许BaoStock补拉最近K线｜默认：否，只读公共缓存"
        required: false
        type: choice
        default: "⬜ 否｜只读公共缓存"
        options:
          - "⬜ 否｜只读公共缓存"
          - "🟧 是｜允许补拉最近K线"

      qingtian_scan_limit:
        description: "🔎 调试扫描数量｜0=全缓存"
        required: false
        default: "0"

  schedule:
    - cron: "25 12 * * 1-5"

concurrency:
  group: qingtian-singleton-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  qingtian:
    name: 擎天
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: restore shared kline cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-qingtian-check-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qingtian-reports
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30
