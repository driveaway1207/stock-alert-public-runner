name: 擎天
run-name: 擎天

"on":
  workflow_dispatch:
    inputs:
      qingtian_target_date:
        description: "✍️ 手动日期｜YYYY-MM-DD 或 YYYYMMDD"
        required: false
        default: ""
      qingtian_send_telegram:
        description: "📨 是否发送Telegram"
        required: false
        type: choice
        default: "🟩 是｜发送Telegram"
        options:
          - "🟩 是｜发送Telegram"
          - "⬜ 否｜不发送Telegram"
      qingtian_scan_limit:
        description: "🔎 调试扫描数量｜0=全缓存"
        required: false
        default: "0"

  schedule:
    - cron: "25 12 * * 1-5"

concurrency:
  group: qingtian-singleton-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  qingtian:
    name: 擎天
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: restore shared kline cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-qingtian-check-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: inspect cache before qingtian
        run: |
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -type f 2>/dev/null | wc -l || true
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -maxdepth 2 -type f 2>/dev/null | head -50 || true

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests akshare baostock openpyxl lxml beautifulsoup4 html5lib tqdm tabulate

      - name: self test qingtian
        run: python -u 擎天.py --self-test

      - name: run qingtian
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QINGTIAN_TARGET_DATE: ${{ github.event.inputs.qingtian_target_date }}
          SELECTION_TRADE_DATE: ${{ github.event.inputs.qingtian_target_date }}
          TARGET_TRADE_DATE: ${{ github.event.inputs.qingtian_target_date }}
          DATA_GATE_TARGET_DATE: ${{ github.event.inputs.qingtian_target_date }}
          ENABLE_TELEGRAM: ${{ github.event.inputs.qingtian_send_telegram == '🟩 是｜发送Telegram' && '1' || '0' }}
          QINGTIAN_SEND_TELEGRAM: ${{ github.event.inputs.qingtian_send_telegram == '🟩 是｜发送Telegram' && '1' || '0' }}
          QINGTIAN_SCAN_LIMIT: ${{ github.event.inputs.qingtian_scan_limit }}
          NO_COLOR: ""
        run: python -u 擎天.py --scan --limit "${{ github.event.inputs.qingtian_scan_limit }}"

      - name: send telegram summary
        if: ${{ always() && github.event.inputs.qingtian_send_telegram == '🟩 是｜发送Telegram' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            擎天运行完成
            状态：${{ job.status }}
            详情请查看 GitHub Actions artifact: qingtian-reports

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qingtian-reports
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

      - name: upload cache visibility snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qingtian-cache-visibility-snapshot
          path: |
            kline_cache/
            employee5_kline_cache/
            data/kline_cache/
            cache/kline_cache/
          if-no-files-found: ignore
          retention-days: 3
