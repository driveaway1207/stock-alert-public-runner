name: 擎天
run-name: 擎天

"on":
  # 自动定时运行已关闭；保留原有手动或事件触发。
  workflow_dispatch:
    inputs:
      qingtian_date_choice:
        description: "🎨 选择海选日期｜默认：上一个交易日"
        required: false
        type: choice
        default: "🟦 上一个交易日"
        options:
          - "🟦 上一个交易日"
          - "🟩 当前交易日"
          - "🟨 上两个交易日"
          - "🟧 上三个交易日"
          - "🟥 上四个交易日"
          - "🟪 上五个交易日"
          - "🟫 上六个交易日"
          - "⬛ 上七个交易日"
      qingtian_target_date:
        description: "✍️ 手动日期｜可填0604、6.4、YYYY-MM-DD、YYYYMMDD｜填了优先"
        required: false
        default: ""
      qingtian_send_telegram:
        description: "📨 是否发送Telegram"
        required: false
        type: choice
        default: "🟩 是｜发送Telegram"
        options:
          - "🟩 是｜发送Telegram"
          - "⬜ 否｜不发送Telegram"
      qingtian_scan_limit:
        description: "🔎 调试扫描数量｜0=全市场"
        required: false
        default: "0"

concurrency:
  group: qingtian-singleton-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  qingtian:
    name: 擎天
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: resolve target date
        id: config
        shell: bash
        env:
          QINGTIAN_INPUT_DATE_CHOICE: ${{ github.event.inputs.qingtian_date_choice }}
          QINGTIAN_INPUT_TARGET_DATE: ${{ github.event.inputs.qingtian_target_date }}
          QINGTIAN_INPUT_SEND_TELEGRAM: ${{ github.event.inputs.qingtian_send_telegram }}
          QINGTIAN_INPUT_SCAN_LIMIT: ${{ github.event.inputs.qingtian_scan_limit }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          from datetime import datetime, timedelta, timezone

          def norm_date(x, today):
              s = str(x or '').strip()
              if not s:
                  return ''
              s = s.replace('年', '-').replace('月', '-').replace('日', '')
              s = s.replace('/', '-').replace('.', '-').replace('_', '-').strip()
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              m = re.fullmatch(r'(\d{1,2})-(\d{1,2})', s)
              if m:
                  return f'{today.year:04d}-{int(m.group(1)):02d}-{int(m.group(2)):02d}'
              if len(s) in (3, 4) and s.isdigit():
                  return f'{today.year:04d}-{int(s[:-2]):02d}-{int(s[-2:]):02d}'
              return ''

          def shift_trading_day(d, n):
              if n == 0:
                  while d.weekday() >= 5:
                      d -= timedelta(days=1)
                  return d
              moved = 0
              while moved < n:
                  d -= timedelta(days=1)
                  if d.weekday() < 5:
                      moved += 1
              return d

          now = datetime.now(timezone(timedelta(hours=8)))
          today = now.date()
          manual = norm_date(os.environ.get('QINGTIAN_INPUT_TARGET_DATE'), today)
          choice = str(os.environ.get('QINGTIAN_INPUT_DATE_CHOICE') or '').strip()
          choice_map = {
              '当前交易日': 0,
              '上一个交易日': 1,
              '上两个交易日': 2,
              '上三个交易日': 3,
              '上四个交易日': 4,
              '上五个交易日': 5,
              '上六个交易日': 6,
              '上七个交易日': 7,
          }
          offset = 1
          for key, value in choice_map.items():
              if key in choice:
                  offset = value
                  break
          target = manual or shift_trading_day(today, offset).isoformat()
          reason = 'manual_date' if manual else f'dropdown_offset_{offset}'
          send_choice = str(os.environ.get('QINGTIAN_INPUT_SEND_TELEGRAM') or '')
          send_telegram = '0' if '不发送' in send_choice or '否' in send_choice else '1'
          raw_limit = str(os.environ.get('QINGTIAN_INPUT_SCAN_LIMIT') or '0').strip()
          try:
              scan_limit = int(raw_limit)
          except Exception:
              scan_limit = 0
          if scan_limit < 0:
              scan_limit = 0
          print(f'target_date={target}')
          print(f'target_reason={reason}')
          print(f'date_choice={choice}')
          print(f'send_telegram={send_telegram}')
          print(f'scan_limit={scan_limit}')
          PY

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: restore shared kline cache visibility
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-qingtian-check-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: inspect runtime before qingtian
        shell: bash
        run: |
          echo "target date: ${{ steps.config.outputs.target_date }}"
          echo "target reason: ${{ steps.config.outputs.target_reason }}"
          echo "date choice: ${{ steps.config.outputs.date_choice }}"
          echo "send telegram: ${{ steps.config.outputs.send_telegram }}"
          echo "scan limit: ${{ steps.config.outputs.scan_limit }}"
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -type f 2>/dev/null | wc -l || true
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -maxdepth 2 -type f 2>/dev/null | head -50 || true

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests akshare baostock openpyxl lxml beautifulsoup4 html5lib tqdm tabulate

      - name: self test qingtian three rounds
        env:
          PYTHONUNBUFFERED: 1
          QINGTIAN_TARGET_DATE: ${{ steps.config.outputs.target_date }}
          SELECTION_TRADE_DATE: ${{ steps.config.outputs.target_date }}
          TARGET_TRADE_DATE: ${{ steps.config.outputs.target_date }}
          DATA_GATE_TARGET_DATE: ${{ steps.config.outputs.target_date }}
        run: python -u 擎天.py --self-test --self-test-rounds 3

      - name: run qingtian native monthly
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QINGTIAN_TARGET_DATE: ${{ steps.config.outputs.target_date }}
          SELECTION_TRADE_DATE: ${{ steps.config.outputs.target_date }}
          TARGET_TRADE_DATE: ${{ steps.config.outputs.target_date }}
          DATA_GATE_TARGET_DATE: ${{ steps.config.outputs.target_date }}
          ENABLE_TELEGRAM: "0"
          QINGTIAN_SEND_TELEGRAM: "0"
          QINGTIAN_MAX_STOCKS: ${{ steps.config.outputs.scan_limit }}
          NO_COLOR: ""
        run: python -u 擎天.py --scan --limit "${{ steps.config.outputs.scan_limit }}"

      - name: build telegram message from qingtian report
        if: always()
        id: qingtian_message
        shell: bash
        run: |
          DELIM="QINGTIAN_MESSAGE_$(date +%s%N)"
          echo "message<<${DELIM}" >> "$GITHUB_OUTPUT"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          p = Path("artifacts/qingtian_report.md")
          if p.exists():
              for line in p.read_text(encoding="utf-8", errors="replace").splitlines()[:120]:
                  print(line)
          else:
              print("擎天扫描异常：未生成股票名单")
          PY
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: send telegram result
        if: ${{ success() && steps.config.outputs.send_telegram == '1' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: ${{ steps.qingtian_message.outputs.message }}

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qingtian-reports
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

      - name: upload cache visibility snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qingtian-cache-visibility-snapshot
          path: |
            kline_cache/
            employee5_kline_cache/
            data/kline_cache/
            cache/kline_cache/
          if-no-files-found: ignore
          retention-days: 3
