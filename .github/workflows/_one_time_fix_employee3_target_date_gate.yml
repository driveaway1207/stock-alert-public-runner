name: One-time fix employee3 target date gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/employee3-target-date-gate-trigger.txt"

permissions:
  contents: write
  actions: read

concurrency:
  group: one-time-fix-employee3-target-date-gate
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install YAML validator
        run: python -m pip install --upgrade pyyaml

      - name: Fix date resolution and run three self-checks
        run: python -u .github/scripts/fix_employee3_target_date_gate.py

      - name: Commit final fix and remove one-time files
        shell: bash
        env:
          ACTIONS_PAT: ${{ secrets.ACTIONS_PAT }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git rm .github/workflows/_one_time_fix_employee3_target_date_gate.yml
          git rm .github/scripts/fix_employee3_target_date_gate.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/employee3_runner.yml employee3_report_guard.py
          git diff --cached --check
          git commit -m "Fix employee3 target-date gate"
          git config --local --unset-all http.https://github.com/.extraheader || true
          TOKEN="${ACTIONS_PAT:-$FALLBACK_TOKEN}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
