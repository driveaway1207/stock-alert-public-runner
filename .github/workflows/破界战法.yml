name: 破界战法选股模型

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "运行模式：selfcheck=自检；daily=正式扫描"
        required: true
        default: "selfcheck"
        type: choice
        options:
          - selfcheck
          - daily
      max_stocks:
        description: "最多扫描股票数量；0=不限制。第一次建议300"
        required: true
        default: "300"
      result_limit:
        description: "输出候选数量"
        required: true
        default: "10"
      send_telegram:
        description: "是否发送Telegram"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  schedule:
    # 北京时间18:20运行。GitHub使用UTC，所以是10:20。
    - cron: "20 10 * * 1-5"

permissions:
  contents: read
  actions: read

jobs:
  run-pojie:
    name: 运行破界战法
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: "1"
      MODEL_FILE: "破界战法.py"

      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

      # 与一号员工保持一致：优先使用中文K线缓存目录
      USE_FULL_HISTORY_CACHE: "1"
      FULL_HISTORY_CACHE_DIR: "K线缓存"
      CACHE_DIR: "K线缓存"
      ALLOW_STALE_KLINE_CACHE: "0"

      # 公开源只做兜底，不作为主入口
      STOCK_LIST_FALLBACK_AKSHARE: "1"
      KLINE_FALLBACK_AKSHARE: "1"

      MAX_STOCKS: ${{ github.event.inputs.max_stocks || '0' }}
      RESULT_LIMIT: ${{ github.event.inputs.result_limit || '10' }}

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4

      - name: 显示当前生产路径
        run: |
          pwd
          echo "当前仓库根目录文件："
          ls -la

      - name: 尝试恢复GitHub缓存里的K线
        if: ${{ github.event.inputs.run_mode != 'selfcheck' || github.event_name == 'schedule' }}
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            K线缓存
            kline_cache
          key: a-kline-cache-${{ github.ref_name }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-

      - name: 检查K线缓存状态
        shell: bash
        run: |
          echo "开始检查K线缓存状态..."

          if [ "${{ github.event.inputs.run_mode || 'daily' }}" = "selfcheck" ] && [ "${{ github.event_name }}" != "schedule" ]; then
            echo "当前是 selfcheck，自检模式不需要K线缓存。"
            echo "SHOULD_RUN_POJIE=1" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -d "K线缓存" ]; then
            echo "✅ 找到中文K线缓存文件夹：K线缓存"
            echo "FULL_HISTORY_CACHE_DIR=K线缓存" >> "$GITHUB_ENV"
            echo "CACHE_DIR=K线缓存" >> "$GITHUB_ENV"
            CSV_COUNT=$(find "K线缓存" -name "*.csv" | wc -l)
            echo "K线缓存CSV数量：$CSV_COUNT"

          elif [ -d "kline_cache" ]; then
            echo "✅ 找到旧英文K线缓存文件夹：kline_cache"
            echo "FULL_HISTORY_CACHE_DIR=kline_cache" >> "$GITHUB_ENV"
            echo "CACHE_DIR=kline_cache" >> "$GITHUB_ENV"
            CSV_COUNT=$(find "kline_cache" -name "*.csv" | wc -l)
            echo "K线缓存CSV数量：$CSV_COUNT"

          else
            echo "⚠️ 没找到 K线缓存 或 kline_cache。"
            CSV_COUNT=0
          fi

          if [ "$CSV_COUNT" -ge 1000 ]; then
            echo "✅ K线缓存可用。"
            echo "SHOULD_RUN_POJIE=1" >> "$GITHUB_ENV"
          else
            echo "❌ K线缓存不可用或数量过少：$CSV_COUNT"
            echo "破界战法不直接触发全量补缓存，避免和一号员工缓存任务冲突。"
            echo "请先运行 A Stock Full Kline Cache Auto Backfill 或等一号员工缓存验收完成。"
            echo "SHOULD_RUN_POJIE=0" >> "$GITHUB_ENV"
            exit 1
          fi

      - name: 检查破界主程序
        run: |
          echo "检查破界主程序：$MODEL_FILE"
          if [ ! -f "$MODEL_FILE" ]; then
            echo "❌ 没找到破界主程序：$MODEL_FILE"
            echo "当前目录文件如下："
            ls -la
            exit 1
          fi
          echo "✅ 找到破界主程序：$MODEL_FILE"

      - name: 安装Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            echo "发现 requirements.txt，先安装仓库依赖。"
            pip install -r requirements.txt
          fi

          echo "强制补装破界战法必需依赖，避免 requirements.txt 缺包。"
          pip install pandas numpy requests akshare baostock openpyxl

          echo "验证关键依赖是否可导入。"
          python - <<'PY'
          import pandas, numpy, requests
          import akshare
          import baostock
          print("依赖验证通过：pandas/numpy/requests/akshare/baostock")
          PY

      - name: 语法检查
        run: |
          python -m py_compile "$MODEL_FILE"

      - name: 运行破界战法
        if: ${{ env.SHOULD_RUN_POJIE == '1' }}
        env:
          RAW_MODE: ${{ github.event.inputs.run_mode || 'daily' }}
          RAW_SEND_TG: ${{ github.event.inputs.send_telegram || 'true' }}
        run: |
          echo "触发类型：${{ github.event_name }}"
          echo "运行模式：$RAW_MODE"
          echo "最多股票数量：$MAX_STOCKS"
          echo "输出数量：$RESULT_LIMIT"
          echo "K线目录：$FULL_HISTORY_CACHE_DIR"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            RUN_MODE="daily"
            SEND_TG="true"
          else
            RUN_MODE="$RAW_MODE"
            SEND_TG="$RAW_SEND_TG"
          fi

          if [ "$RUN_MODE" = "selfcheck" ]; then
            echo "执行破界自检，不发送Telegram。"
            python "$MODEL_FILE" --模式 selfcheck
          else
            if [ "$SEND_TG" = "true" ]; then
              echo "执行破界正式扫描，并发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT" --发送Telegram
            else
              echo "执行破界正式扫描，不发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT"
            fi
          fi

      - name: 保存破界运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 破界战法运行结果
          path: |
            outputs/**
            *_pojie*
            破界*
          if-no-files-found: ignore
