name: 破界战法选股模型

on:
  workflow_dispatch:
    inputs:
      模式:
        description: "运行模式：daily=正式扫描；selfcheck=自检"
        required: true
        default: "selfcheck"
        type: choice
        options:
          - selfcheck
          - daily
      最多股票数量:
        description: "最多扫描股票数量；0=不限制。第一次建议300"
        required: true
        default: "300"
      输出数量:
        description: "输出候选数量"
        required: true
        default: "10"
      发送Telegram:
        description: "是否发送Telegram"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  schedule:
    # 北京时间18:20运行。GitHub使用UTC，所以是10:20。
    - cron: "20 10 * * 1-5"

permissions:
  contents: read
  actions: read

jobs:
  run-pojie:
    name: 运行破界战法
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: "1"
      MODEL_FILE: "破界战法.py"

      # Telegram：只有 daily 且发送Telegram=true 或定时运行时才发送
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

      # 复用一号员工缓存/股票池
      USE_FULL_HISTORY_CACHE: "1"
      FULL_HISTORY_CACHE_DIR: "kline_cache"
      CACHE_DIR: "kline_cache"
      MODEL_UNIVERSE_FILE: ""

      # 默认控制运行规模
      MAX_STOCKS: ${{ github.event.inputs.最多股票数量 || '0' }}
      RESULT_LIMIT: ${{ github.event.inputs.输出数量 || '10' }}

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4

      - name: 显示当前生产路径
        run: |
          pwd
          echo "当前仓库根目录文件："
          ls -la

      - name: 检查破界主程序
        run: |
          echo "检查破界主程序：$MODEL_FILE"
          if [ ! -f "$MODEL_FILE" ]; then
            echo "❌ 没找到破界主程序：$MODEL_FILE"
            echo "当前目录文件如下："
            ls -la
            exit 1
          fi
          echo "✅ 找到破界主程序：$MODEL_FILE"

      - name: 安装Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy requests akshare baostock
          fi

      - name: 语法检查
        run: |
          python -m py_compile "$MODEL_FILE"

      - name: 运行破界战法
        env:
          RAW_MODE: ${{ github.event.inputs.模式 || 'daily' }}
          RAW_SEND_TG: ${{ github.event.inputs.发送Telegram || 'true' }}
        run: |
          echo "触发类型：${{ github.event_name }}"
          echo "运行模式：$RAW_MODE"
          echo "最多股票数量：$MAX_STOCKS"
          echo "输出数量：$RESULT_LIMIT"

          # 定时运行固定 daily，并默认发送Telegram
          if [ "${{ github.event_name }}" = "schedule" ]; then
            RUN_MODE="daily"
            SEND_TG="true"
          else
            RUN_MODE="$RAW_MODE"
            SEND_TG="$RAW_SEND_TG"
          fi

          if [ "$RUN_MODE" = "selfcheck" ]; then
            echo "执行破界自检，不发送Telegram。"
            python "$MODEL_FILE" --模式 selfcheck
          else
            if [ "$SEND_TG" = "true" ]; then
              echo "执行破界正式扫描，并发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT" --发送Telegram
            else
              echo "执行破界正式扫描，不发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT"
            fi
          fi

      - name: 保存破界运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 破界战法运行结果
          path: |
            outputs/**
            *_pojie*
            破界*
          if-no-files-found: ignore
