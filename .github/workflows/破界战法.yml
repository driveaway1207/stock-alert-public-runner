name: 破界战法2.2.7日期模式优化版

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "运行模式：selfcheck=自检；daily=正式扫描"
        required: true
        default: "daily"
        type: choice
        options:
          - selfcheck
          - daily
      max_stocks:
        description: "最多扫描股票数量；0=全量扫描"
        required: true
        default: "0"
      result_limit:
        description: "输出候选数量"
        required: true
        default: "3"
      send_telegram:
        description: "是否发送Telegram"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      date_mode:
        description: "K线日期模式"
        required: true
        default: "自动识别最近完整交易日"
        type: choice
        options:
          - 自动识别最近完整交易日
          - 使用前一个交易日
          - 使用当前缓存最新日期
          - 手动填写日期
      expected_kline_date:
        description: "手动日期，仅选择“手动填写日期”时填写；支持 2026-05-15 / 2026-5-15 / 20260515 / 2026515"
        required: false
        default: ""
      allow_remote_patch:
        description: "缓存未更新/缺失时是否允许自动补拉；默认true=先补拉再扫描"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  actions: read

jobs:
  run-pojie:
    name: 运行破界战法
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: "1"
      MODEL_FILE: "破界战法.py"
      BRANCH_NAME: ${{ github.ref_name }}

      # 你的仓库 Secrets 名称是 TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID。
      # 同时导出 TELEGRAM_TOKEN 与 TELEGRAM_BOT_TOKEN，兼容 PY 里两种读取方式。
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      ENABLE_TELEGRAM: ${{ github.event.inputs.send_telegram == 'true' && '1' || '0' }}

      USE_FULL_HISTORY_CACHE: "1"
      FULL_HISTORY_CACHE_DIR: "kline_cache"
      CACHE_DIR: "kline_cache"
      STOCK_LIST_FALLBACK_AKSHARE: "0"
      KLINE_FALLBACK_AKSHARE: "0"
      POJIE_ALLOW_AKSHARE_KLINE: "0"

      # 默认仍然保持只读缓存，不自作主张改缓存框架。
      # 如果你手动运行时把 allow_remote_patch 设为 true，才允许 BaoStock 补拉。
      POJIE_REMOTE_ON_CACHE_MISS: ${{ github.event.inputs.allow_remote_patch == 'true' && '1' || '0' }}
      ENABLE_AUTO_BACKFILL: ${{ github.event.inputs.allow_remote_patch == 'true' && '1' || '0' }}
      CACHE_ONLY: ${{ github.event.inputs.allow_remote_patch == 'true' && '0' || '1' }}
      READ_CACHE_ONLY: ${{ github.event.inputs.allow_remote_patch == 'true' && '0' || '1' }}

      # 性能优化：默认6进程。
      POJIE_WORKERS: "6"
      POJIE_PARALLEL_MIN_STOCKS: "300"
      POJIE_FAST_PREFILTER: "1"
      POJIE_STRATEGY_PROFILE: "balanced"
      POJIE_MIN_CORELINE_SCORE: "58"
      POJIE_OUTPUT_OBSERVATION: "1"
      破界_最低分: "58"

      # 日志/进度优化：默认不逐只打印K线成功，避免Actions刷屏。
      POJIE_VERBOSE_KLINE: "0"
      POJIE_LOG_FIRST_N: "5"
      POJIE_PROGRESS_EVERY: "300"
      POJIE_PROGRESS_SECONDS: "30"

      # GitHub日志只显示摘要；完整推荐只发Telegram并保存artifact。
      POJIE_GITHUB_QUIET: "1"

      MAX_STOCKS: ${{ github.event.inputs.max_stocks || '0' }}
      RESULT_LIMIT: ${{ github.event.inputs.result_limit || '3' }}
      破界_输出数量: ${{ github.event.inputs.result_limit || '3' }}
      POJIE_DATE_MODE: ${{ github.event.inputs.date_mode || 'auto' }}
      POJIE_EXPECTED_KLINE_DATE_RAW: ${{ github.event.inputs.expected_kline_date || '' }}
      POJIE_EXPECTED_KLINE_DATE: ${{ github.event.inputs.expected_kline_date || '' }}

      # 自动补拉时间保护：给全市场5200只留足时间，避免补到一半反复从头开始。
      KLINE_UPDATE_TIME_LIMIT_SECONDS: "6600"
      MAX_UPDATE_SECONDS: "6600"
      UPDATE_TIME_LIMIT_SECONDS: "6600"
      MAX_RUNTIME_SECONDS: "6600"
      BAOSTOCK_UPDATE_MAX_SECONDS: "6600"
      DAILY_KLINE_UPDATE_MAX_SECONDS: "6600"
      KLINE_BACKFILL_MAX_SECONDS: "6600"

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4

      - name: 归一化目标K线日期
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from datetime import datetime, date, timedelta
          from zoneinfo import ZoneInfo

          mode_raw = (os.getenv('POJIE_DATE_MODE') or '自动识别最近完整交易日').strip()
          mode_map = {
              '自动识别最近完整交易日': 'auto',
              '使用前一个交易日': 'previous_trade_day',
              '使用当前缓存最新日期': 'latest_cache',
              '手动填写日期': 'manual',
              # 兼容旧英文值，避免旧手动运行参数失效
              'auto': 'auto',
              'previous_trade_day': 'previous_trade_day',
              'latest_cache': 'latest_cache',
              'manual': 'manual',
          }
          mode = mode_map.get(mode_raw)
          if not mode:
              raise SystemExit(f'未知 K线日期模式：{mode_raw}')
          raw = (os.getenv('POJIE_EXPECTED_KLINE_DATE_RAW') or '').strip()

          def normalize_date(value: str) -> str:
              value = (value or '').strip()
              if not value:
                  return ''
              v = re.sub(r'[./_]', '-', value)
              if re.fullmatch(r'\d{8}', v):
                  y, m, d = int(v[:4]), int(v[4:6]), int(v[6:8])
              elif re.fullmatch(r'\d{7}', v):
                  y, m, d = int(v[:4]), int(v[4:5]), int(v[5:7])
              else:
                  mobj = re.fullmatch(r'(\d{4})-(\d{1,2})-(\d{1,2})', v)
                  if not mobj:
                      raise ValueError(f'无法识别日期格式：{value}。支持 2026-05-15 / 2026-5-15 / 20260515 / 2026515')
                  y, m, d = map(int, mobj.groups())
              return date(y, m, d).isoformat()

          def previous_weekday(today: date) -> date:
              d = today - timedelta(days=1)
              while d.weekday() >= 5:
                  d -= timedelta(days=1)
              return d

          today_cn = datetime.now(ZoneInfo('Asia/Shanghai')).date()
          expected = ''
          note = ''

          if raw:
              expected = normalize_date(raw)
              note = f'手动输入日期已归一化：{raw} -> {expected}' if raw != expected else f'手动输入日期：{expected}'
          elif mode == 'manual':
              raise SystemExit('选择“手动填写日期”时必须填写“手动日期”')
          elif mode == 'previous_trade_day':
              expected = previous_weekday(today_cn).isoformat()
              note = f'按前一普通交易日模式推断目标日期：{expected}'
          elif mode in ('auto', 'latest_cache'):
              expected = ''
              note = f'K线日期模式={mode_raw}，未手动指定日期；后续由缓存/PY自动判断'
          else:
              raise SystemExit(f'未知 K线日期模式：{mode_raw}')

          print(note)
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f'POJIE_DATE_MODE={mode}\n')
              f.write(f'POJIE_EXPECTED_KLINE_DATE={expected}\n')
              f.write(f'POJIE_EXPECTED_KLINE_DATE_NORMALIZED={expected}\n')
          PY

      - name: 显示当前运行环境
        shell: bash
        run: |
          echo "当前路径：$(pwd)"
          echo "当前分支：$BRANCH_NAME"
          echo "仓库根目录文件："
          ls -la
          echo "workflow 文件："
          ls -la .github/workflows || true
          echo "运行模式：${{ github.event.inputs.run_mode }}"
          echo "日期模式：$POJIE_DATE_MODE"
          echo "原始日期输入：${POJIE_EXPECTED_KLINE_DATE_RAW:-空}"
          echo "期望K线日期：${POJIE_EXPECTED_KLINE_DATE:-自动判断}"
          echo "是否允许BaoStock补拉：$POJIE_REMOTE_ON_CACHE_MISS"
          echo "Telegram启用：$ENABLE_TELEGRAM"
          if [ -n "$TELEGRAM_TOKEN" ]; then
            echo "Telegram Token：已读取"
          else
            echo "Telegram Token：未读取"
          fi
          if [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram Chat ID：已读取"
          else
            echo "Telegram Chat ID：未读取"
          fi

      - name: 检查破界战法2.2.3主程序
        shell: bash
        run: |
          echo "检查破界战法2.2.3主程序：$MODEL_FILE"
          if [ ! -f "$MODEL_FILE" ]; then
            echo "❌ 没找到破界主程序：$MODEL_FILE"
            ls -la
            exit 1
          fi
          echo "✅ 找到破界战法2.2.3主程序：$MODEL_FILE"
          ls -lh "$MODEL_FILE"

      - name: 尝试下载最近K线验收产物
        if: ${{ github.event.inputs.run_mode != 'selfcheck' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          echo "开始查找最近成功的 K线验收产物：artifact=kline-cache-accepted"
          rm -rf artifact_download
          mkdir -p artifact_download

          RUN_ID=$(gh run list --limit 80 --json databaseId,name,conclusion,status,createdAt \
            --jq '.[] | select((.name=="A Stock Kline Cache Acceptance" or (.name|contains("Kline Cache Acceptance")) or (.name|contains("K线"))) and .conclusion=="success") | .databaseId' \
            | head -n 1)

          if [ -z "$RUN_ID" ]; then
            echo "⚠️ 没找到最近成功的K线验收运行。稍后尝试GitHub cache恢复。"
            echo "ARTIFACT_KLINE_COUNT=0" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "找到最近K线验收运行 RUN_ID=$RUN_ID，开始下载 artifact..."
          gh run download "$RUN_ID" --name kline-cache-accepted --dir artifact_download
          DL_STATUS=$?
          if [ "$DL_STATUS" -ne 0 ]; then
            echo "⚠️ artifact下载失败，稍后尝试GitHub cache恢复。"
            echo "ARTIFACT_KLINE_COUNT=0" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "artifact_download 文件预览："
          find artifact_download -maxdepth 4 -type f | head -80 || true

          mkdir -p kline_cache
          if [ -d artifact_download/kline_cache ]; then
            cp -r artifact_download/kline_cache/* kline_cache/ || true
          fi
          if [ -d artifact_download/K线缓存 ]; then
            mkdir -p "K线缓存"
            cp -r artifact_download/K线缓存/* "K线缓存"/ || true
          fi
          if [ -d artifact_download/base ]; then
            mkdir -p kline_cache/base
            cp -r artifact_download/base/* kline_cache/base/ || true
          fi
          if [ -d artifact_download/deep ]; then
            mkdir -p kline_cache/deep
            cp -r artifact_download/deep/* kline_cache/deep/ || true
          fi
          ROOT_CSV=$(find artifact_download -maxdepth 1 -name "*.csv" 2>/dev/null | wc -l | tr -d ' ')
          if [ "${ROOT_CSV:-0}" -gt 0 ]; then
            mkdir -p kline_cache/base
            cp artifact_download/*.csv kline_cache/base/ || true
          fi

          COUNT=$(find kline_cache "K线缓存" -name "*.csv" 2>/dev/null | wc -l | tr -d ' ')
          echo "从artifact恢复后的K线CSV数量：${COUNT:-0}"
          echo "ARTIFACT_KLINE_COUNT=${COUNT:-0}" >> "$GITHUB_ENV"

      - name: 恢复GitHub缓存里的K线断点续补结果
        if: ${{ github.event.inputs.run_mode != 'selfcheck' }}
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            K线缓存
            kline_cache
          key: pojie-kline-cache-${{ github.ref_name }}
          restore-keys: |
            pojie-kline-cache-${{ github.ref_name }}-
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            pojie-kline-cache-

      - name: 安装Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            echo "发现 requirements.txt，先安装仓库依赖。"
            pip install -r requirements.txt
          fi
          echo "补装破界战法必需依赖。"
          pip install pandas numpy requests baostock openpyxl
          python - <<'PY'
          import pandas, numpy, requests, baostock
          print('依赖验证通过：pandas / numpy / requests / baostock')
          PY

      - name: 检查K线缓存状态
        shell: bash
        run: |
          echo "开始检查K线缓存状态..."
          if [ "${{ github.event.inputs.run_mode }}" = "selfcheck" ]; then
            echo "当前是 selfcheck，自检模式不需要K线缓存。"
            echo "SHOULD_RUN_POJIE=1" >> "$GITHUB_ENV"
            echo "HAS_KLINE_CACHE=0" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p kline_cache kline_cache/base kline_cache/deep outputs

          python - <<'PY'
          import os
          from pathlib import Path
          from collections import Counter
          import pandas as pd

          roots = [Path('kline_cache/base'), Path('kline_cache/deep'), Path('kline_cache'), Path('K线缓存')]
          items = {
              'kline_cache_root': len(list(Path('kline_cache').glob('*.csv'))) if Path('kline_cache').exists() else 0,
              'kline_cache_base': len(list(Path('kline_cache/base').rglob('*.csv'))) if Path('kline_cache/base').exists() else 0,
              'kline_cache_deep': len(list(Path('kline_cache/deep').rglob('*.csv'))) if Path('kline_cache/deep').exists() else 0,
              'cn_cache': len(list(Path('K线缓存').rglob('*.csv'))) if Path('K线缓存').exists() else 0,
              'outputs': len(list(Path('outputs').rglob('*.csv'))) if Path('outputs').exists() else 0,
          }
          total = items['kline_cache_root'] + items['kline_cache_base'] + items['kline_cache_deep'] + items['cn_cache']
          print(f"kline_cache 根目录CSV数量：{items['kline_cache_root']}")
          print(f"kline_cache/base CSV数量：{items['kline_cache_base']}")
          print(f"kline_cache/deep CSV数量：{items['kline_cache_deep']}")
          print(f"K线缓存 CSV数量：{items['cn_cache']}")
          print(f"outputs CSV数量：{items['outputs']}")
          print(f"最终识别K线缓存CSV数量：{total}")

          print('展示前10个K线缓存文件：')
          n = 0
          for root in roots:
              if not root.exists():
                  continue
              for f in root.rglob('*.csv'):
                  print(str(f))
                  n += 1
                  if n >= 10:
                      break
              if n >= 10:
                  break

          dates = []
          sample = 0
          for root in roots:
              if not root.exists():
                  continue
              for f in root.rglob('*.csv'):
                  try:
                      df = pd.read_csv(f, usecols=['date'])
                      if len(df):
                          dates.append(str(df['date'].iloc[-1])[:10])
                          sample += 1
                  except Exception:
                      pass
                  if sample >= 5000:
                      break
              if sample >= 5000:
                  break

          if dates:
              print('缓存最后日期Top10：')
              for d, c in Counter(dates).most_common(10):
                  print(f'  {d}: {c}')
          else:
              print('缓存最后日期Top10：无可用日期')

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write('SHOULD_RUN_POJIE=1\n')
              f.write('FULL_HISTORY_CACHE_DIR=kline_cache\n')
              f.write('CACHE_DIR=kline_cache\n')
              f.write('KLINE_FALLBACK_AKSHARE=0\n')
              f.write('STOCK_LIST_FALLBACK_AKSHARE=0\n')
              f.write('POJIE_ALLOW_AKSHARE_KLINE=0\n')
              f.write(f"HAS_KLINE_CACHE={1 if total >= 1000 else 0}\n")

          if total >= 1000:
              print('✅ 已发现一号员工K线缓存；破界.py将按股票代码懒加载读取。')
          elif total > 0:
              print('⚠️ 发现少量K线缓存；破界.py会优先读，缺失处理由POJIE_REMOTE_ON_CACHE_MISS控制。')
          else:
              print('⚠️ 当前没有发现K线缓存；是否补拉由POJIE_REMOTE_ON_CACHE_MISS控制。')
          PY

      - name: 自动补拉并校验K线缓存日期
        if: ${{ github.event.inputs.run_mode != 'selfcheck' }}
        shell: bash
        run: |
          set -e
          echo "自动补拉开关：$ENABLE_AUTO_BACKFILL"
          echo "目标K线日期：${POJIE_EXPECTED_KLINE_DATE:-自动识别}"

          echo "补拉前缓存日期分布："
          python - <<'PY'
          import pandas as pd
          from pathlib import Path
          from collections import Counter
          roots = [Path('kline_cache/base'), Path('kline_cache/deep'), Path('kline_cache'), Path('K线缓存')]
          dates=[]
          for root in roots:
              if not root.exists():
                  continue
              for f in root.rglob('*.csv'):
                  try:
                      df = pd.read_csv(f, usecols=['date'])
                      if len(df):
                          dates.append(str(df['date'].iloc[-1])[:10])
                  except Exception:
                      pass
          if dates:
              for d,c in Counter(dates).most_common(10):
                  print(f'  {d}: {c}')
              print(f'缓存众数日期={Counter(dates).most_common(1)[0][0]}')
              print(f'缓存最大日期={max(dates)}')
          else:
              print('  未发现可统计日期的K线缓存')
          PY

          if [ "$ENABLE_AUTO_BACKFILL" = "1" ]; then
            echo "开始执行自动补拉脚本..."
            SCRIPT=""
            if [ -f "tools/update_kline_cache_daily.py" ]; then
              SCRIPT="tools/update_kline_cache_daily.py"
            elif [ -f "update_kline_cache_daily.py" ]; then
              SCRIPT="update_kline_cache_daily.py"
            elif [ -f "scripts/update_kline_cache_daily.py" ]; then
              SCRIPT="scripts/update_kline_cache_daily.py"
            fi

            if [ -z "$SCRIPT" ]; then
              echo "⚠️ 未找到 update_kline_cache_daily.py，无法自动补拉。"
            else
              echo "使用补拉脚本：$SCRIPT"
              export TARGET_TRADE_DATE="$POJIE_EXPECTED_KLINE_DATE"
              export EXPECTED_TRADE_DATE="$POJIE_EXPECTED_KLINE_DATE"
              export POJIE_EXPECTED_KLINE_DATE="$POJIE_EXPECTED_KLINE_DATE"
              export FULL_HISTORY_CACHE_DIR="kline_cache"
              export CACHE_DIR="kline_cache"
              python "$SCRIPT"
              echo "AUTO_BACKFILL_RAN=1" >> "$GITHUB_ENV"
            fi
          else
            echo "自动补拉关闭，本次只读缓存。"
          fi

          echo "补拉后缓存日期分布与目标校验："
          python - <<'PY'
          import os
          import pandas as pd
          from pathlib import Path
          from collections import Counter

          import re
          from datetime import date
          expected_raw = (os.getenv('POJIE_EXPECTED_KLINE_DATE') or '').strip()
          expected = ''
          def normalize_date(value):
              value = (value or '').strip()
              if not value:
                  return ''
              v = re.sub(r'[./_]', '-', value)
              if re.fullmatch(r'\d{8}', v):
                  y, m, d = int(v[:4]), int(v[4:6]), int(v[6:8])
              elif re.fullmatch(r'\d{7}', v):
                  y, m, d = int(v[:4]), int(v[4:5]), int(v[5:7])
              else:
                  mobj = re.fullmatch(r'(\d{4})-(\d{1,2})-(\d{1,2})', v)
                  if not mobj:
                      raise ValueError(f'无法识别日期格式：{value}')
                  y, m, d = map(int, mobj.groups())
              return date(y, m, d).isoformat()
          if expected_raw:
              try:
                  expected = normalize_date(expected_raw)
                  if expected != expected_raw:
                      print(f'目标日期格式归一化：{expected_raw} -> {expected}')
              except Exception as e:
                  print(f'❌ 目标日期无法归一化：{expected_raw}；原因：{e}')
                  with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                      f.write('SHOULD_RUN_POJIE=0\n')
                      f.write('POJIE_CACHE_NEEDS_MORE=0\n')
                  raise SystemExit(1)
          roots = [Path('kline_cache/base'), Path('kline_cache/deep'), Path('kline_cache'), Path('K线缓存')]
          dates=[]
          total_csv=0
          for root in roots:
              if not root.exists():
                  continue
              for f in root.rglob('*.csv'):
                  total_csv += 1
                  try:
                      df = pd.read_csv(f, usecols=['date'])
                      if len(df):
                          dates.append(str(df['date'].iloc[-1])[:10])
                  except Exception:
                      pass

          print(f'K线CSV数量={total_csv}')
          if dates:
              cnt = Counter(dates)
              print('缓存最后日期Top10：')
              for d,c in cnt.most_common(10):
                  print(f'  {d}: {c}')
              mode_date, mode_count = cnt.most_common(1)[0]
              print(f'缓存众数日期={mode_date}')
              print(f'缓存最大日期={max(dates)}')
              with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                  f.write(f'POJIE_CACHE_MODE_DATE={mode_date}\n')
                  f.write(f'POJIE_CACHE_MODE_COUNT={mode_count}\n')

              if not expected and (os.getenv('POJIE_DATE_MODE') or '').strip() == 'latest_cache':
                  expected = mode_date
                  print(f'K线日期模式=使用当前缓存最新日期，使用缓存众数日期作为目标日期：{expected}')
                  with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                      f.write(f'POJIE_EXPECTED_KLINE_DATE={expected}\n')
              if expected:
                  expected_count = cnt.get(expected, 0)
                  cache_max_date = max(dates)
                  print(f'目标日期={expected}；目标日正好有K线的股票数={expected_count}')
                  print(f'缓存最大日期={cache_max_date}')
                  with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                      f.write(f'POJIE_EXPECTED_KLINE_DATE={expected}\n')

                  # 指定日期扫描逻辑：缓存只要覆盖到目标日期即可运行。
                  # Python会把每只股票K线截断到目标日期及以前，再进行破界扫描。
                  try:
                      if pd.to_datetime(cache_max_date) < pd.to_datetime(expected):
                          print('⚠️ 缓存最大日期早于目标日期，本次不运行破界正式推荐。')
                          print('✅ 已保留本轮补拉成果，后续保存到GitHub cache；请再次运行继续断点补拉。')
                          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                              f.write('SHOULD_RUN_POJIE=0\n')
                              f.write('POJIE_CACHE_NEEDS_MORE=1\n')
                          raise SystemExit(0)
                  except SystemExit:
                      raise
                  except Exception as e:
                      print(f'⚠️ 日期覆盖校验异常：{e}，本次继续运行。')

                  print('✅ 缓存已覆盖目标日期，可以按目标日期截断后扫描。')
                  with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                      f.write('SHOULD_RUN_POJIE=1\n')
                      f.write('POJIE_CACHE_NEEDS_MORE=0\n')
              else:
                  print('未指定目标日期，后续由PY按缓存众数/工作日逻辑判断。')
                  with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                      f.write('SHOULD_RUN_POJIE=1\n')
                      f.write('POJIE_CACHE_NEEDS_MORE=0\n')
          else:
              print('⚠️ 未发现可用K线日期，本次不运行破界正式推荐。')
              with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                  f.write('SHOULD_RUN_POJIE=0\n')
                  f.write('POJIE_CACHE_NEEDS_MORE=1\n')
              raise SystemExit(0)
          PY

      - name: 语法检查
        shell: bash
        run: |
          python -m py_compile "$MODEL_FILE"
          echo "✅ Python语法检查通过"

      - name: 运行破界战法
        if: ${{ env.SHOULD_RUN_POJIE == '1' }}
        env:
          RAW_MODE: ${{ github.event.inputs.run_mode }}
          RAW_SEND_TG: ${{ github.event.inputs.send_telegram }}
        shell: bash
        run: |
          echo "运行模式：$RAW_MODE"
          echo "策略档位：$POJIE_STRATEGY_PROFILE"
          echo "最低分：$破界_最低分"
          echo "最多股票数量：$MAX_STOCKS"
          echo "输出数量：$RESULT_LIMIT"
          echo "期望K线最新日期：${POJIE_EXPECTED_KLINE_DATE:-自动识别}"
          echo "K线目录：$FULL_HISTORY_CACHE_DIR"
          echo "是否已恢复K线缓存：$HAS_KLINE_CACHE"
          echo "AkShare K线兜底：$KLINE_FALLBACK_AKSHARE"
          echo "破界 AkShare K线兜底：$POJIE_ALLOW_AKSHARE_KLINE"
          echo "缓存未命中时是否允许BaoStock补拉：$POJIE_REMOTE_ON_CACHE_MISS"
          echo "逐只K线日志：$POJIE_VERBOSE_KLINE；并行workers：$POJIE_WORKERS；保守预筛：$POJIE_FAST_PREFILTER；进度间隔：每$POJIE_PROGRESS_EVERY只或$POJIE_PROGRESS_SECONDS秒"
          echo "推送策略：完整推荐只发Telegram；GitHub日志只显示摘要。"
          if [ "$RAW_SEND_TG" = "true" ]; then export ENABLE_TELEGRAM=1; else export ENABLE_TELEGRAM=0; fi

          if [ "$RAW_MODE" = "selfcheck" ]; then
            echo "执行破界自检，不发送Telegram。"
            python "$MODEL_FILE" --模式 selfcheck
          else
            if [ "$RAW_SEND_TG" = "true" ]; then
              echo "执行破界正式扫描，并发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT" --发送Telegram
            else
              echo "执行破界正式扫描，不发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT"
            fi
          fi

      - name: 保存破界运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 破界战法运行结果
          path: |
            outputs/**
            *_pojie*
            破界*
          if-no-files-found: ignore

      - name: 检查是否需要保存破界补拉缓存
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os, json
          from pathlib import Path

          total = 0
          for root in [Path('kline_cache'), Path('K线缓存')]:
              if root.exists():
                  total += len(list(root.rglob('*.csv')))

          remote_success = 0
          signals = Path('outputs/pojie/pojie_signals.json')
          if signals.exists():
              try:
                  data = json.loads(signals.read_text(encoding='utf-8'))
                  remote_success = int(data.get('kline_stats', {}).get('remote_success', 0) or 0)
              except Exception as e:
                  print(f'读取破界K线统计失败：{e}')

          print(f'运行结束后K线CSV数量：{total}')
          print(f'本次BaoStock补拉成功数量：{remote_success}')

          should_save = (total >= 1000 and (remote_success > 0 or os.getenv('AUTO_BACKFILL_RAN') == '1' or os.getenv('POJIE_CACHE_NEEDS_MORE') == '1'))

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"SAVE_POJIE_CACHE={1 if should_save else 0}\n")

          if should_save:
              print('✅ 本次有自动补拉或BaoStock补拉并且K线数量足够，保存破界专用缓存。')
          else:
              print('✅ 本次未新增补拉或K线数量不足，不重复保存缓存，避免浪费时间/存储。')
          PY

      - name: 保存破界专用K线缓存
        if: ${{ always() && env.SAVE_POJIE_CACHE == '1' }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            K线缓存
            kline_cache
          key: pojie-kline-cache-${{ github.ref_name }}-${{ github.run_id }}
