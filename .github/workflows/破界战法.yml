name: 破界战法选股模型

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "运行模式：selfcheck=自检；daily=正式扫描"
        required: true
        default: "daily"
        type: choice
        options:
          - selfcheck
          - daily

      max_stocks:
        description: "最多扫描股票数量；0=不限制。建议先100"
        required: true
        default: "100"

      result_limit:
        description: "输出候选数量"
        required: true
        default: "10"

      send_telegram:
        description: "是否发送Telegram"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  actions: read

jobs:
  run-pojie:
    name: 运行破界战法
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: "1"
      MODEL_FILE: "破界战法.py"

      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

      USE_FULL_HISTORY_CACHE: "1"
      FULL_HISTORY_CACHE_DIR: "kline_cache"
      CACHE_DIR: "kline_cache"

      # 破界默认逻辑：缓存优先；缓存缺失才用 BaoStock 主通道补拉；AkShare 默认彻底关闭。
      STOCK_LIST_FALLBACK_AKSHARE: "0"
      KLINE_FALLBACK_AKSHARE: "0"
      POJIE_ALLOW_AKSHARE_KLINE: "0"
      POJIE_ALLOW_AKSHARE_STOCK_LIST: "0"
      POJIE_REMOTE_ON_CACHE_MISS: "1"

      MAX_STOCKS: ${{ github.event.inputs.max_stocks || '100' }}
      RESULT_LIMIT: ${{ github.event.inputs.result_limit || '10' }}

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4

      - name: 显示当前运行环境
        shell: bash
        run: |
          echo "当前路径："
          pwd
          echo "仓库根目录文件："
          ls -la
          echo "workflow 文件："
          ls -la .github/workflows || true

      - name: 检查破界主程序
        shell: bash
        run: |
          echo "检查破界主程序：$MODEL_FILE"
          if [ ! -f "$MODEL_FILE" ]; then
            echo "❌ 没找到破界主程序：$MODEL_FILE"
            echo "当前目录文件如下："
            ls -la
            exit 1
          fi
          echo "✅ 找到破界主程序：$MODEL_FILE"

      - name: 恢复一号员工K线缓存
        if: ${{ github.event.inputs.run_mode != 'selfcheck' }}
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            kline_cache
            K线缓存
            outputs
          key: a-kline-cache-${{ github.ref_name }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            kline-cache-${{ github.ref_name }}-
            kline-cache-
            stock-alert-kline-cache-${{ github.ref_name }}-
            stock-alert-kline-cache-
            a-stock-kline-cache-${{ github.ref_name }}-
            a-stock-kline-cache-

      - name: 检查K线缓存状态
        shell: bash
        run: |
          echo "开始检查K线缓存状态..."

          if [ "${{ github.event.inputs.run_mode }}" = "selfcheck" ]; then
            echo "当前是 selfcheck，自检模式不需要K线缓存。"
            echo "SHOULD_RUN_POJIE=1" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p kline_cache

          ROOT_COUNT=$(find kline_cache -maxdepth 1 -name "*.csv" 2>/dev/null | wc -l || echo 0)
          BASE_COUNT=$(find kline_cache/base -name "*.csv" 2>/dev/null | wc -l || echo 0)
          DEEP_COUNT=$(find kline_cache/deep -name "*.csv" 2>/dev/null | wc -l || echo 0)
          CN_COUNT=$(find "K线缓存" -name "*.csv" 2>/dev/null | wc -l || echo 0)
          OUTPUT_COUNT=$(find outputs -name "*.csv" 2>/dev/null | wc -l || echo 0)

          TOTAL_COUNT=$((ROOT_COUNT + BASE_COUNT + DEEP_COUNT + CN_COUNT))

          echo "kline_cache 根目录CSV数量：$ROOT_COUNT"
          echo "kline_cache/base CSV数量：$BASE_COUNT"
          echo "kline_cache/deep CSV数量：$DEEP_COUNT"
          echo "K线缓存 CSV数量：$CN_COUNT"
          echo "outputs CSV数量：$OUTPUT_COUNT"
          echo "最终识别K线缓存CSV数量：$TOTAL_COUNT"

          echo "展示前30个K线缓存文件："
          find kline_cache "K线缓存" -name "*.csv" 2>/dev/null | head -30 || true

          if [ "$TOTAL_COUNT" -ge 1 ]; then
            echo "✅ 已发现一号员工K线缓存。"
            echo "✅ 本次不统一重写全部CSV，直接交给破界.py按股票代码懒加载读取。"
            echo "✅ 缓存命中不联网；缓存缺失才允许BaoStock主通道补拉。"
          else
            echo "⚠️ 当前没有发现K线缓存。"
            echo "⚠️ 破界.py会尝试一号员工数据入口，补拉主通道为BaoStock，AkShare已关闭。"
          fi

          echo "SHOULD_RUN_POJIE=1" >> "$GITHUB_ENV"
          echo "FULL_HISTORY_CACHE_DIR=kline_cache" >> "$GITHUB_ENV"
          echo "CACHE_DIR=kline_cache" >> "$GITHUB_ENV"
          echo "KLINE_FALLBACK_AKSHARE=0" >> "$GITHUB_ENV"
          echo "STOCK_LIST_FALLBACK_AKSHARE=0" >> "$GITHUB_ENV"
          echo "POJIE_ALLOW_AKSHARE_KLINE=0" >> "$GITHUB_ENV"
          echo "POJIE_ALLOW_AKSHARE_STOCK_LIST=0" >> "$GITHUB_ENV"
          echo "POJIE_REMOTE_ON_CACHE_MISS=1" >> "$GITHUB_ENV"

      - name: 安装Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            echo "发现 requirements.txt，先安装仓库依赖。"
            pip install -r requirements.txt
          fi

          echo "补装破界战法必需依赖。"
          pip install pandas numpy requests baostock openpyxl

          python - <<'PY'
          import pandas
          import numpy
          import requests
          import baostock
          print("依赖验证通过：pandas / numpy / requests / baostock")
          PY

      - name: 语法检查
        shell: bash
        run: |
          python -m py_compile "$MODEL_FILE"
          echo "✅ Python语法检查通过"

      - name: 运行破界战法
        if: ${{ env.SHOULD_RUN_POJIE == '1' }}
        env:
          RAW_MODE: ${{ github.event.inputs.run_mode }}
          RAW_SEND_TG: ${{ github.event.inputs.send_telegram }}
        shell: bash
        run: |
          echo "运行模式：$RAW_MODE"
          echo "最多股票数量：$MAX_STOCKS"
          echo "输出数量：$RESULT_LIMIT"
          echo "K线目录：$FULL_HISTORY_CACHE_DIR"
          echo "AkShare K线兜底：$KLINE_FALLBACK_AKSHARE"
          echo "破界 AkShare K线兜底：$POJIE_ALLOW_AKSHARE_KLINE"

          if [ "$RAW_MODE" = "selfcheck" ]; then
            echo "执行破界自检，不发送Telegram。"
            python "$MODEL_FILE" --模式 selfcheck
          else
            if [ "$RAW_SEND_TG" = "true" ]; then
              echo "执行破界正式扫描，并发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT" --发送Telegram
            else
              echo "执行破界正式扫描，不发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT"
            fi
          fi

      - name: 保存破界运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 破界战法运行结果
          path: |
            outputs/**
            *_pojie*
            破界*
          if-no-files-found: ignore

      - name: 保存K线缓存
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            kline_cache
            K线缓存
            outputs
          key: a-kline-cache-${{ github.ref_name }}-${{ github.run_id }}
