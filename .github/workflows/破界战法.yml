name: 破界战法2.2.2年季候选池评分制

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "运行模式：selfcheck=自检；daily=正式扫描"
        required: true
        default: "daily"
        type: choice
        options:
          - selfcheck
          - daily
      max_stocks:
        description: "最多扫描股票数量；0=全量扫描"
        required: true
        default: "0"
      result_limit:
        description: "输出候选数量"
        required: true
        default: "20"
      send_telegram:
        description: "是否发送Telegram"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  actions: read

jobs:
  run-pojie:
    name: 运行破界战法
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: "1"
      MODEL_FILE: "破界战法.py"
      BRANCH_NAME: ${{ github.ref_name }}

      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      ENABLE_TELEGRAM: ${{ github.event.inputs.send_telegram == 'true' && '1' || '0' }}

      USE_FULL_HISTORY_CACHE: "1"
      FULL_HISTORY_CACHE_DIR: "kline_cache"
      CACHE_DIR: "kline_cache"
      STOCK_LIST_FALLBACK_AKSHARE: "0"
      KLINE_FALLBACK_AKSHARE: "0"
      POJIE_ALLOW_AKSHARE_KLINE: "0"
      POJIE_REMOTE_ON_CACHE_MISS: "0"

      # 性能优化：默认6进程。实测小CSV I/O下4-6通常比10更稳；如需可改成10。
      POJIE_WORKERS: "6"
      POJIE_PARALLEL_MIN_STOCKS: "300"
      POJIE_FAST_PREFILTER: "1"
      POJIE_STRATEGY_PROFILE: "balanced"
      POJIE_MIN_CORELINE_SCORE: "58"
      POJIE_OUTPUT_OBSERVATION: "1"
      破界_最低分: "58"

      # 日志/进度优化：默认不逐只打印K线成功，避免Actions刷屏。
      POJIE_VERBOSE_KLINE: "0"
      POJIE_LOG_FIRST_N: "5"
      POJIE_PROGRESS_EVERY: "300"
      POJIE_PROGRESS_SECONDS: "30"

      MAX_STOCKS: ${{ github.event.inputs.max_stocks || '0' }}
      RESULT_LIMIT: ${{ github.event.inputs.result_limit || '20' }}

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4

      - name: 显示当前运行环境
        shell: bash
        run: |
          echo "当前路径：$(pwd)"
          echo "当前分支：$BRANCH_NAME"
          echo "仓库根目录文件："
          ls -la
          echo "workflow 文件："
          ls -la .github/workflows || true

      - name: 检查破界战法2.2.2主程序
        shell: bash
        run: |
          echo "检查破界战法2.2.2主程序：$MODEL_FILE"
          if [ ! -f "$MODEL_FILE" ]; then
            echo "❌ 没找到破界主程序：$MODEL_FILE"
            ls -la
            exit 1
          fi
          echo "✅ 找到破界战法2.2.2主程序：$MODEL_FILE"

      - name: 尝试下载最近K线验收产物
        if: ${{ github.event.inputs.run_mode != 'selfcheck' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          echo "开始查找最近成功的 K线验收产物：artifact=kline-cache-accepted"
          rm -rf artifact_download
          mkdir -p artifact_download

          RUN_ID=$(gh run list --limit 80 --json databaseId,name,conclusion,status,createdAt \
            --jq '.[] | select((.name=="A Stock Kline Cache Acceptance" or (.name|contains("Kline Cache Acceptance")) or (.name|contains("K线"))) and .conclusion=="success") | .databaseId' \
            | head -n 1)

          if [ -z "$RUN_ID" ]; then
            echo "⚠️ 没找到最近成功的K线验收运行。稍后尝试GitHub cache恢复。"
            echo "ARTIFACT_KLINE_COUNT=0" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "找到最近K线验收运行 RUN_ID=$RUN_ID，开始下载 artifact..."
          gh run download "$RUN_ID" --name kline-cache-accepted --dir artifact_download
          DL_STATUS=$?
          if [ "$DL_STATUS" -ne 0 ]; then
            echo "⚠️ artifact下载失败，稍后尝试GitHub cache恢复。"
            echo "ARTIFACT_KLINE_COUNT=0" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "artifact_download 文件预览："
          find artifact_download -maxdepth 4 -type f | head -80 || true

          mkdir -p kline_cache
          if [ -d artifact_download/kline_cache ]; then
            cp -r artifact_download/kline_cache/* kline_cache/ || true
          fi
          if [ -d artifact_download/K线缓存 ]; then
            mkdir -p "K线缓存"
            cp -r artifact_download/K线缓存/* "K线缓存"/ || true
          fi
          if [ -d artifact_download/base ]; then
            mkdir -p kline_cache/base
            cp -r artifact_download/base/* kline_cache/base/ || true
          fi
          if [ -d artifact_download/deep ]; then
            mkdir -p kline_cache/deep
            cp -r artifact_download/deep/* kline_cache/deep/ || true
          fi
          ROOT_CSV=$(find artifact_download -maxdepth 1 -name "*.csv" 2>/dev/null | wc -l | tr -d ' ')
          if [ "${ROOT_CSV:-0}" -gt 0 ]; then
            mkdir -p kline_cache/base
            cp artifact_download/*.csv kline_cache/base/ || true
          fi

          COUNT=$(find kline_cache "K线缓存" -name "*.csv" 2>/dev/null | wc -l | tr -d ' ')
          echo "从artifact恢复后的K线CSV数量：${COUNT:-0}"
          echo "ARTIFACT_KLINE_COUNT=${COUNT:-0}" >> "$GITHUB_ENV"

      - name: 如果artifact不足则恢复GitHub缓存里的K线
        if: ${{ github.event.inputs.run_mode != 'selfcheck' && env.ARTIFACT_KLINE_COUNT < 1000 }}
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            K线缓存
            kline_cache
          key: a-kline-cache-${{ github.ref_name }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            pojie-kline-cache-${{ github.ref_name }}-
            pojie-kline-cache-

      - name: 检查K线缓存状态
        shell: bash
        run: |
          echo "开始检查K线缓存状态..."
          if [ "${{ github.event.inputs.run_mode }}" = "selfcheck" ]; then
            echo "当前是 selfcheck，自检模式不需要K线缓存。"
            echo "SHOULD_RUN_POJIE=1" >> "$GITHUB_ENV"
            echo "HAS_KLINE_CACHE=0" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p kline_cache kline_cache/base kline_cache/deep outputs

          python - <<'PY'
          import os
          from pathlib import Path
          items = {
              'kline_cache_root': len(list(Path('kline_cache').glob('*.csv'))) if Path('kline_cache').exists() else 0,
              'kline_cache_base': len(list(Path('kline_cache/base').rglob('*.csv'))) if Path('kline_cache/base').exists() else 0,
              'kline_cache_deep': len(list(Path('kline_cache/deep').rglob('*.csv'))) if Path('kline_cache/deep').exists() else 0,
              'cn_cache': len(list(Path('K线缓存').rglob('*.csv'))) if Path('K线缓存').exists() else 0,
              'outputs': len(list(Path('outputs').rglob('*.csv'))) if Path('outputs').exists() else 0,
          }
          total = items['kline_cache_root'] + items['kline_cache_base'] + items['kline_cache_deep'] + items['cn_cache']
          print(f"kline_cache 根目录CSV数量：{items['kline_cache_root']}")
          print(f"kline_cache/base CSV数量：{items['kline_cache_base']}")
          print(f"kline_cache/deep CSV数量：{items['kline_cache_deep']}")
          print(f"K线缓存 CSV数量：{items['cn_cache']}")
          print(f"outputs CSV数量：{items['outputs']}")
          print(f"最终识别K线缓存CSV数量：{total}")
          print('展示前10个K线缓存文件：')
          n=0
          for root in [Path('kline_cache/base'), Path('kline_cache/deep'), Path('kline_cache'), Path('K线缓存')]:
              if not root.exists():
                  continue
              for f in root.rglob('*.csv'):
                  print(str(f))
                  n += 1
                  if n >= 10:
                      break
              if n >= 10:
                  break
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write('SHOULD_RUN_POJIE=1\n')
              f.write('FULL_HISTORY_CACHE_DIR=kline_cache\n')
              f.write('CACHE_DIR=kline_cache\n')
              f.write('KLINE_FALLBACK_AKSHARE=0\n')
              f.write('STOCK_LIST_FALLBACK_AKSHARE=0\n')
              f.write('POJIE_ALLOW_AKSHARE_KLINE=0\n')
              f.write(f"HAS_KLINE_CACHE={1 if total >= 1000 else 0}\n")
          if total >= 1000:
              print('✅ 已发现一号员工K线缓存；破界.py将按股票代码懒加载读取，缓存命中不联网。')
          elif total > 0:
              print('⚠️ 发现少量K线缓存；破界.py会优先读，缺失才BaoStock补拉。')
          else:
              print('⚠️ 当前没有发现K线缓存；破界.py会使用BaoStock主通道补拉，AkShare已关闭。')
          PY

      - name: 安装Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            echo "发现 requirements.txt，先安装仓库依赖。"
            pip install -r requirements.txt
          fi
          echo "补装破界战法必需依赖。"
          pip install pandas numpy requests baostock openpyxl
          python - <<'PY'
          import pandas, numpy, requests, baostock
          print('依赖验证通过：pandas / numpy / requests / baostock')
          PY

      - name: 语法检查
        shell: bash
        run: |
          python -m py_compile "$MODEL_FILE"
          echo "✅ Python语法检查通过"

      - name: 运行破界战法
        if: ${{ env.SHOULD_RUN_POJIE == '1' }}
        env:
          RAW_MODE: ${{ github.event.inputs.run_mode }}
          RAW_SEND_TG: ${{ github.event.inputs.send_telegram }}
        shell: bash
        run: |
          echo "运行模式：$RAW_MODE"
          echo "策略档位：$POJIE_STRATEGY_PROFILE"
          echo "最低分：$破界_最低分"
          echo "最多股票数量：$MAX_STOCKS"
          echo "输出数量：$RESULT_LIMIT"
          echo "K线目录：$FULL_HISTORY_CACHE_DIR"
          echo "是否已恢复K线缓存：$HAS_KLINE_CACHE"
          echo "AkShare K线兜底：$KLINE_FALLBACK_AKSHARE"
          echo "破界 AkShare K线兜底：$POJIE_ALLOW_AKSHARE_KLINE"
          echo "缓存未命中时是否允许BaoStock补拉：$POJIE_REMOTE_ON_CACHE_MISS（0=只读缓存，不补拉）"
          echo "逐只K线日志：$POJIE_VERBOSE_KLINE；并行workers：$POJIE_WORKERS；保守预筛：$POJIE_FAST_PREFILTER；进度间隔：每$POJIE_PROGRESS_EVERY只或$POJIE_PROGRESS_SECONDS秒"
          echo "数据源策略：只读缓存；缓存缺失直接跳过；BaoStock/AkShare均不在战法层补拉。"
          echo "推送策略：完整推荐只发Telegram；GitHub日志只显示摘要。"
          if [ "$RAW_SEND_TG" = "true" ]; then export ENABLE_TELEGRAM=1; else export ENABLE_TELEGRAM=0; fi

          if [ "$RAW_MODE" = "selfcheck" ]; then
            echo "执行破界自检，不发送Telegram。"
            python "$MODEL_FILE" --模式 selfcheck
          else
            if [ "$RAW_SEND_TG" = "true" ]; then
              echo "执行破界正式扫描，并发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT" --发送Telegram
            else
              echo "执行破界正式扫描，不发送Telegram。"
              python "$MODEL_FILE" --模式 daily --最多股票数量 "$MAX_STOCKS" --输出数量 "$RESULT_LIMIT"
            fi
          fi

      - name: 保存破界运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 破界战法运行结果
          path: |
            outputs/**
            *_pojie*
            破界*
          if-no-files-found: ignore

      - name: 检查是否需要保存破界补拉缓存
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os, json
          from pathlib import Path

          total = 0
          for root in [Path('kline_cache'), Path('K线缓存')]:
              if root.exists():
                  total += len(list(root.rglob('*.csv')))

          remote_success = 0
          signals = Path('outputs/pojie/pojie_signals.json')
          if signals.exists():
              try:
                  data = json.loads(signals.read_text(encoding='utf-8'))
                  remote_success = int(data.get('kline_stats', {}).get('remote_success', 0) or 0)
              except Exception as e:
                  print(f'读取破界K线统计失败：{e}')

          print(f'运行结束后K线CSV数量：{total}')
          print(f'本次BaoStock补拉成功数量：{remote_success}')

          # 优化原则：如果只是读取已有缓存、没有新增补拉，就不重复保存巨大cache，节省时间和GitHub存储。
          should_save = (total >= 1000 and remote_success > 0)

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"SAVE_POJIE_CACHE={1 if should_save else 0}\n")

          if should_save:
              print('✅ 本次有BaoStock补拉并且K线数量足够，保存破界专用缓存。')
          else:
              print('✅ 本次未新增补拉或K线数量不足，不重复保存缓存，避免浪费时间/存储。')
          PY

      - name: 保存破界专用K线缓存
        if: ${{ always() && env.SAVE_POJIE_CACHE == '1' }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            K线缓存
            kline_cache
          key: pojie-kline-cache-${{ github.ref_name }}-${{ github.run_id }}
