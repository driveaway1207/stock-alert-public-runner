name: Test Tushare QFQ

on:
  workflow_dispatch:

jobs:
  test-tushare-qfq:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tushare pandas -q

      - name: Test 301360 qfq anchor
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          python test_tushare_qfq.py
