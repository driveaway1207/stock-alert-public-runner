name: Test Tushare QFQ

on:
  workflow_dispatch:

jobs:
  test-tushare-qfq:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install tushare pandas -q

      - name: Test 301360 qfq full-window anchor
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TUSHARE_TEST_CODE: '301360.SZ'
          TUSHARE_TEST_START_DATE: '20240101'
          TUSHARE_TEST_END_DATE: '20260529'
          TUSHARE_TEST_ANCHOR_DATE: '20241008'
          TUSHARE_EXPECTED_HIGH: '51.25'
          TUSHARE_EXPECTED_CLOSE: '49.38'
          TUSHARE_TOL: '0.01'
        run: |
          python test_tushare_qfq.py
