# Employee1 Workflow V26.1 | Updated: 2026-05-19
# FIRST LINE FORMAT LOCKED: only version number and Updated date may change; entrypoint remains stock_alert.py
name: Employee1 Daily Stock Alert

on:
  workflow_dispatch:
  schedule:
    # 新加坡/北京时间 18:10，对应 UTC 10:10
    - cron: '10 10 * * 1-5'

jobs:
  run-employee1:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TZ: Asia/Singapore
      PYTHONUNBUFFERED: '1'

      # ============================================================
      # PROTECTED PAT AREA - DO NOT MODIFY / FORMAT / REPLACE
      # PAT字段保护区：如仓库中使用 GH_PAT / GITHUB_TOKEN / 私有缓存上传令牌，
      # 请在 GitHub Secrets 中维护；workflow只读取，不在代码中明文写入。
      # ============================================================
      GH_PAT: ${{ secrets.GH_PAT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ============================================================
      # END PROTECTED PAT AREA
      # ============================================================

      # ============================================================
      # PROTECTED TELEGRAM SECRET AREA - DO NOT MODIFY / RENAME
      # Telegram密钥保护区：只读取 GitHub Secrets，不写明文，不改变量名。
      # ============================================================
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ENABLE_TELEGRAM: '1'
      # ============================================================
      # END PROTECTED TELEGRAM SECRET AREA
      # ============================================================

      # 一号员工 V26.1：爆发前夜最终买入池
      TOP_PUSH_LIMIT: '5'
      V20_FIXED_TOP_N: '5'
      V26_ENABLED: '1'
      V26_ENABLE_INSTITUTIONAL_SCORECARD: '1'
      V26_MIN_BUY_SCORE: '80'
      V26_STRONG_CONFIRM_SCORE: '82'
      V26_STANDARD_SCORE: '88'
      V26_ALLOW_EMPTY_TOP5: '1'
      V26_ENABLE_PORTFOLIO_DECORRELATION: '1'
      V26_AUTO_LEARN_MODE: 'semi'

      # 交易定价与风控
      V26_MIN_RR: '1.55'
      V26_MIN_UPSIDE: '0.10'
      V26_MAX_DEFENSE_DIST: '0.095'
      V26_MAX_SIGNAL_AGE_DAYS: '13'
      V26_MAX_SAME_SECTOR: '2'
      V26_MAX_SAME_HYPOTHESIS: '2'

      # 数据与运行效率
      USE_FULL_HISTORY_CACHE: '1'
      FULL_HISTORY_CACHE_DIR: kline_cache
      CHECK_DAYS: '1'
      DEEP_SCORE_LIMIT: '500'
      DEEP_SCORE_HARD_CAP: '200'
      MAX_STOCKS: '0'

      # 市场状态：可手动改 bull/range/weak/bear/panic
      V24_1_MARKET_REGIME: neutral

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests baostock akshare openpyxl scipy

      - name: Run Employee1
        run: |
          # PROTECTED ENTRYPOINT - DO NOT RENAME / DO NOT REPLACE
          # 运行入口保护：保持仓库长期使用的入口文件 stock_alert.py，不擅自切换到新文件名。
          test -f "stock_alert.py" || (echo "ERROR: protected entrypoint stock_alert.py not found" && ls -la && exit 2)
          python "stock_alert.py"

      - name: Upload Employee1 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee1-artifacts
          path: |
            stock_candidates.json
            v20_3_1_score_cards.json
            v20_3_1_daily_report.txt
            v20_3_1_review_report.txt
            v20_3_1_signal_lifecycle.json
            v26_institutional_scorecards.json
            v26_self_learning_review.json
            *.log
          if-no-files-found: ignore
