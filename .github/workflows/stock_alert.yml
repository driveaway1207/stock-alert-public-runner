name: 一号员工

on:
  # 自动定时运行已关闭；保留原有手动或事件触发。
  # BaoStock 日线全市场数据通常要等到晚间才稳定。
  # 北京时间 20:50 = UTC 12:50；只在周一到周五自动运行。
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式：daily=每日选股；backtest=回测；selfcheck=只自检；cache_only=只更新/验收缓存'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - backtest
          - selfcheck
          - cache_only

      selection_trade_date:
        description: '选股日期，可空。格式YYYY-MM-DD；空=自动按北京时间20:35规则判断'
        required: false
        default: ''

      cache_target_date:
        description: '拉取/验收缓存目标日期，可空。空=daily跟随选股日期，backtest跟随回测结束日期'
        required: false
        default: ''

      cache_strategy:
        description: '缓存策略：auto=缺/旧才补；force_refresh=强制补；use_existing=只用现有缓存'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - force_refresh
          - use_existing

      baostock_ready_policy:
        description: 'BaoStock未到20:35时：auto=自动用前一交易日；stop_if_unready=停止；force=强制按填写日期'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - stop_if_unready
          - force

      backtest_profile:
        description: '回测档位：quick=快速冒烟；standard=标准；deep=深度；custom=使用下面自填参数'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - standard
          - deep
          - custom

      start:
        description: '回测开始日期，仅 backtest 使用，例如 2022-04-08'
        required: false
        default: '2022-04-08'

      end:
        description: '回测结束日期，仅 backtest 使用，例如 2023-04-08'
        required: false
        default: '2023-04-08'

      max_dates:
        description: 'custom回测最多交易日；0=不限制'
        required: false
        default: '15'

      topn:
        description: 'custom回测每日推荐数量'
        required: false
        default: '5'

      deep_limit:
        description: 'custom回测深度评分数量'
        required: false
        default: '3'

      base_limit:
        description: 'custom回测基础入深度数量'
        required: false
        default: '3'

      date_step:
        description: 'custom回测交易日步长，1=每天'
        required: false
        default: '1'

      full_rebuild:
        description: '缓存过少时是否允许从0全量建立：0=不允许，1=允许'
        required: true
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

      min_cache_files_required:
        description: '非从0重建时，至少需要多少个缓存CSV才允许保存'
        required: false
        default: '3000'

      max_runtime_minutes:
        description: '缓存补拉单轮最大运行分钟数，建议270'
        required: false
        default: '270'

concurrency:
  group: 一号员工-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  prepare:
    name: ① 准备运行参数
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      mode: ${{ steps.config.outputs.mode }}
      selection_trade_date: ${{ steps.config.outputs.selection_trade_date }}
      cache_target_date: ${{ steps.config.outputs.cache_target_date }}
      required_cache_date: ${{ steps.config.outputs.required_cache_date }}
      cache_strategy: ${{ steps.config.outputs.cache_strategy }}
      backtest_start: ${{ steps.config.outputs.backtest_start }}
      backtest_end: ${{ steps.config.outputs.backtest_end }}
      backtest_max_dates: ${{ steps.config.outputs.backtest_max_dates }}
      backtest_topn: ${{ steps.config.outputs.backtest_topn }}
      backtest_deep_limit: ${{ steps.config.outputs.backtest_deep_limit }}
      backtest_base_limit: ${{ steps.config.outputs.backtest_base_limit }}
      backtest_date_step: ${{ steps.config.outputs.backtest_date_step }}
      full_rebuild: ${{ steps.config.outputs.full_rebuild }}
      min_cache_files_required: ${{ steps.config.outputs.min_cache_files_required }}
      max_runtime_minutes: ${{ steps.config.outputs.max_runtime_minutes }}

    steps:
      - name: 解析日期、模式与缓存策略
        id: config
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_SELECTION_TRADE_DATE: ${{ github.event.inputs.selection_trade_date }}
          INPUT_CACHE_TARGET_DATE: ${{ github.event.inputs.cache_target_date }}
          INPUT_CACHE_STRATEGY: ${{ github.event.inputs.cache_strategy }}
          INPUT_BAOSTOCK_READY_POLICY: ${{ github.event.inputs.baostock_ready_policy }}
          INPUT_BACKTEST_PROFILE: ${{ github.event.inputs.backtest_profile }}
          INPUT_START: ${{ github.event.inputs.start }}
          INPUT_END: ${{ github.event.inputs.end }}
          INPUT_MAX_DATES: ${{ github.event.inputs.max_dates }}
          INPUT_TOPN: ${{ github.event.inputs.topn }}
          INPUT_DEEP_LIMIT: ${{ github.event.inputs.deep_limit }}
          INPUT_BASE_LIMIT: ${{ github.event.inputs.base_limit }}
          INPUT_DATE_STEP: ${{ github.event.inputs.date_step }}
          INPUT_FULL_REBUILD: ${{ github.event.inputs.full_rebuild }}
          INPUT_MIN_CACHE_FILES_REQUIRED: ${{ github.event.inputs.min_cache_files_required }}
          INPUT_MAX_RUNTIME_MINUTES: ${{ github.event.inputs.max_runtime_minutes }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import datetime, timedelta, timezone

          def norm_date(x):
              s = str(x or '').strip().replace('/', '-')
              if not s:
                  return ''
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              return s[:10]

          def prev_workday(d):
              d = d - timedelta(days=1)
              while d.weekday() >= 5:
                  d -= timedelta(days=1)
              return d

          event_name = os.environ.get('EVENT_NAME') or 'schedule'
          mode = (os.environ.get('INPUT_MODE') or 'daily').strip()
          if event_name != 'workflow_dispatch':
              mode = 'daily'

          cache_strategy = (os.environ.get('INPUT_CACHE_STRATEGY') or 'auto').strip() or 'auto'
          ready_policy = (os.environ.get('INPUT_BAOSTOCK_READY_POLICY') or 'auto').strip() or 'auto'
          profile = (os.environ.get('INPUT_BACKTEST_PROFILE') or 'quick').strip() or 'quick'

          now = datetime.now(timezone(timedelta(hours=8)))
          today = now.date()

          if today.weekday() >= 5:
              auto_target = today
              while auto_target.weekday() >= 5:
                  auto_target = auto_target - timedelta(days=1)
              auto_reason = '周末自动回退到最近工作日'
          elif now.hour > 20 or (now.hour == 20 and now.minute >= 35):
              auto_target = today
              auto_reason = '北京时间20:35后，允许使用当天作为目标交易日'
          else:
              if ready_policy == 'stop_if_unready':
                  print('baostock_unready=1')
                  raise SystemExit('当前未到北京时间20:35，BaoStock全市场日线可能未完全稳定；baostock_ready_policy=stop_if_unready，停止运行。')
              auto_target = prev_workday(today)
              auto_reason = '北京时间20:35前，自动使用前一工作日，避免拿不全当天K线'

          manual_selection = norm_date(os.environ.get('INPUT_SELECTION_TRADE_DATE'))
          manual_cache = norm_date(os.environ.get('INPUT_CACHE_TARGET_DATE'))
          selection_trade_date = manual_selection or auto_target.isoformat()

          bt_start = norm_date(os.environ.get('INPUT_START')) or '2022-04-08'
          bt_end = norm_date(os.environ.get('INPUT_END')) or '2023-04-08'

          if profile == 'quick':
              bt_max_dates, bt_topn, bt_deep, bt_base, bt_step = '15', '3', '3', '3', '1'
          elif profile == 'standard':
              bt_max_dates, bt_topn, bt_deep, bt_base, bt_step = '60', '5', '30', '30', '1'
          elif profile == 'deep':
              bt_max_dates, bt_topn, bt_deep, bt_base, bt_step = '0', '5', '200', '200', '1'
          else:
              bt_max_dates = os.environ.get('INPUT_MAX_DATES') or '15'
              bt_topn = os.environ.get('INPUT_TOPN') or '5'
              bt_deep = os.environ.get('INPUT_DEEP_LIMIT') or '3'
              bt_base = os.environ.get('INPUT_BASE_LIMIT') or '3'
              bt_step = os.environ.get('INPUT_DATE_STEP') or '1'

          if mode == 'backtest':
              required_cache_date = manual_cache or bt_end
              cache_target_date = manual_cache or bt_end
          else:
              required_cache_date = manual_cache or selection_trade_date
              cache_target_date = manual_cache or selection_trade_date

          full_rebuild = (os.environ.get('INPUT_FULL_REBUILD') or '0').strip() or '0'
          min_cache_files_required = (os.environ.get('INPUT_MIN_CACHE_FILES_REQUIRED') or '3000').strip() or '3000'
          max_runtime_minutes = (os.environ.get('INPUT_MAX_RUNTIME_MINUTES') or '270').strip() or '270'

          print(f'mode={mode}')
          print(f'selection_trade_date={selection_trade_date}')
          print(f'cache_target_date={cache_target_date}')
          print(f'required_cache_date={required_cache_date}')
          print(f'cache_strategy={cache_strategy}')
          print(f'backtest_start={bt_start}')
          print(f'backtest_end={bt_end}')
          print(f'backtest_max_dates={bt_max_dates}')
          print(f'backtest_topn={bt_topn}')
          print(f'backtest_deep_limit={bt_deep}')
          print(f'backtest_base_limit={bt_base}')
          print(f'backtest_date_step={bt_step}')
          print(f'full_rebuild={full_rebuild}')
          print(f'min_cache_files_required={min_cache_files_required}')
          print(f'max_runtime_minutes={max_runtime_minutes}')
          print(f'auto_target_reason={auto_reason}')
          PY

      - name: 显示本次一号员工参数
        shell: bash
        run: |
          echo "================ 一号员工运行参数 ================"
          echo "运行模式：${{ steps.config.outputs.mode }}"
          echo "选股日期：${{ steps.config.outputs.selection_trade_date }}"
          echo "缓存目标日期：${{ steps.config.outputs.cache_target_date }}"
          echo "缓存覆盖要求：>= ${{ steps.config.outputs.required_cache_date }}"
          echo "缓存策略：${{ steps.config.outputs.cache_strategy }}"
          echo "回测区间：${{ steps.config.outputs.backtest_start }} ~ ${{ steps.config.outputs.backtest_end }}"
          echo "回测参数：max_dates=${{ steps.config.outputs.backtest_max_dates }} topn=${{ steps.config.outputs.backtest_topn }} deep=${{ steps.config.outputs.backtest_deep_limit }} base=${{ steps.config.outputs.backtest_base_limit }} step=${{ steps.config.outputs.backtest_date_step }}"
          echo "BaoStock保护：自动任务已移到北京时间20:50；20:35前默认不用当天数据"
          echo "固定入口：stock_alert.py"
          echo "=================================================="

  check-cache:
    name: ② 检查已有K线缓存
    needs: prepare
    if: ${{ needs.prepare.outputs.mode != 'selfcheck' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      cache_ok: ${{ steps.audit.outputs.cache_ok }}
      cache_count: ${{ steps.audit.outputs.cache_count }}
      cache_majority_date: ${{ steps.audit.outputs.cache_majority_date }}

    steps:
      - name: 恢复已有K线缓存
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-check-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-

      - name: 检查缓存数量和日期覆盖
        id: audit
        shell: bash
        env:
          REQUIRED_CACHE_DATE: ${{ needs.prepare.outputs.required_cache_date }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import csv, os
          from pathlib import Path
          from collections import Counter

          def norm_date(x):
              s = str(x or '').strip().replace('/', '-')
              if not s:
                  return ''
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              return s[:10]

          cache_dir = Path('kline_cache')
          required = norm_date(os.environ.get('REQUIRED_CACHE_DATE'))
          dates = []
          files = list(cache_dir.rglob('*.csv')) if cache_dir.exists() else []
          files = [f for f in files if not f.name.startswith('_')]
          for f in files:
              try:
                  with open(f, 'r', encoding='utf-8-sig', newline='') as fh:
                      rows = list(csv.reader(fh))
                  if len(rows) < 2:
                      continue
                  header = rows[0]
                  idx = 0
                  for name in ('date', '日期', 'trade_date', '交易日期'):
                      if name in header:
                          idx = header.index(name)
                          break
                  last = ''
                  for row in reversed(rows[1:]):
                      if row and len(row) > idx and str(row[idx]).strip():
                          last = norm_date(row[idx])
                          break
                  if last:
                      dates.append(last)
              except Exception:
                  pass
          c = Counter(dates)
          majority = c.most_common(1)[0][0] if c else ''
          count = len(files)
          with_date = len(dates)
          ok = bool(count >= 1000 and with_date >= 1000 and majority and (not required or majority >= required))
          print(f'cache_ok={str(ok).lower()}')
          print(f'cache_count={count}')
          print(f'cache_majority_date={majority}')
          PY

      - name: 显示缓存检查结果
        shell: bash
        run: |
          echo "缓存是否可用：${{ steps.audit.outputs.cache_ok }}"
          echo "缓存CSV数量：${{ steps.audit.outputs.cache_count }}"
          echo "缓存众数日期：${{ steps.audit.outputs.cache_majority_date }}"
          echo "要求覆盖到：${{ needs.prepare.outputs.required_cache_date }}"

  cache-backfill:
    name: ③ 更新K线缓存
    needs: [prepare, check-cache]
    if: ${{ needs.prepare.outputs.mode != 'selfcheck' && needs.prepare.outputs.cache_strategy != 'use_existing' && (needs.prepare.outputs.cache_strategy == 'force_refresh' || needs.prepare.outputs.mode == 'cache_only' || needs.check-cache.outputs.cache_ok != 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      PYTHONUNBUFFERED: '1'
      TARGET_TRADE_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      EXPECTED_KLINE_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      DATA_GATE_TARGET_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      RUN_ROUND: '1'
      MAX_AUTO_ROUNDS: '1'
      AUTO_CONTINUE: '0'
      FULL_REBUILD: ${{ needs.prepare.outputs.full_rebuild }}
      MIN_CACHE_FILES_REQUIRED: ${{ needs.prepare.outputs.min_cache_files_required }}
      MAX_RUNTIME_MINUTES: ${{ needs.prepare.outputs.max_runtime_minutes }}

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装缓存任务依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests akshare baostock openpyxl lxml beautifulsoup4 html5lib tqdm

      - name: 恢复K线缓存
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-

      - name: 执行K线缓存补拉
        env:
          SOFT_STOP_BUFFER_MINUTES: '20'
          EASTMONEY_TIMEOUT: '20'
          AKSHARE_TIMEOUT: '35'
          BAOSTOCK_TIMEOUT: '45'
          SOURCE_FAIL_THRESHOLD: '5'
          SOURCE_COOLDOWN_SECONDS: '900'
        shell: bash
        run: |
          mkdir -p outputs kline_cache
          echo "缓存目标日期：$TARGET_TRADE_DATE"
          echo "缓存CSV数量-补拉前：$(find kline_cache -type f -name '*.csv' ! -name '_*.csv' | wc -l)"
          python -u tools/export_neckline_candidates.py
          echo "缓存CSV数量-补拉后：$(find kline_cache -type f -name '*.csv' ! -name '_*.csv' | wc -l)"

      - name: 判断是否允许保存K线缓存
        if: always()
        id: cache_save_gate
        shell: bash
        run: |
          COUNT=$(find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l)
          echo "cache_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$FULL_REBUILD" = "1" ]; then
            echo "save_cache=true" >> "$GITHUB_OUTPUT"
            echo "FULL_REBUILD=1，允许保存缓存。"
          elif [ "$COUNT" -ge "$MIN_CACHE_FILES_REQUIRED" ]; then
            echo "save_cache=true" >> "$GITHUB_OUTPUT"
            echo "缓存数量 $COUNT >= $MIN_CACHE_FILES_REQUIRED，允许保存缓存。"
          else
            echo "save_cache=false" >> "$GITHUB_OUTPUT"
            echo "缓存数量 $COUNT < $MIN_CACHE_FILES_REQUIRED，不保存，避免污染缓存。"
          fi

      - name: 缓存数量不足则停止本轮
        if: always() && steps.cache_save_gate.outputs.save_cache != 'true'
        shell: bash
        run: |
          echo "❌ 本轮缓存补拉后数量不足，不保存、不进入验收，避免旧缓存或坏缓存误导一号员工。"
          exit 1

      - name: 保存K线缓存
        if: always() && steps.cache_save_gate.outputs.save_cache == 'true'
        uses: actions/cache/save@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-${{ github.run_id }}

      - name: 上传缓存补拉报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 一号员工-缓存补拉报告
          path: |
            outputs/**
          if-no-files-found: warn
          retention-days: 14

  cache-acceptance:
    name: ④ 验收K线缓存
    needs: [prepare, check-cache, cache-backfill]
    if: ${{ always() && needs.prepare.outputs.mode != 'selfcheck' && ((needs.prepare.outputs.cache_strategy == 'use_existing' && needs.check-cache.outputs.cache_ok == 'true') || (needs.prepare.outputs.cache_strategy == 'auto' && (needs.check-cache.outputs.cache_ok == 'true' || needs.cache-backfill.result == 'success')) || (needs.prepare.outputs.cache_strategy == 'force_refresh' && needs.cache-backfill.result == 'success')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: '1'
      REQUIRED_CACHE_DATE: ${{ needs.prepare.outputs.required_cache_date }}
      TARGET_TRADE_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      EXPECTED_KLINE_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      DATA_GATE_TARGET_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      ALLOW_TARGET_DATE_OVERRIDE: '允许'

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装验收依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: 恢复待验收K线缓存
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-acceptance-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-${{ github.run_id }}
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-

      - name: 运行原缓存验收脚本
        shell: bash
        run: |
          mkdir -p outputs kline_cache
          if [ -f tools/validate_kline_cache.py ]; then
            python -u tools/validate_kline_cache.py
          else
            echo "⚠️ 未找到 tools/validate_kline_cache.py，继续执行内置数量/日期验收。"
          fi

      - name: 内置数量 + 日期覆盖验收
        shell: bash
        run: |
          python - <<'PY'
          import csv, json, os
          from pathlib import Path
          from collections import Counter

          def norm_date(x):
              s = str(x or '').strip().replace('/', '-')
              if not s:
                  return ''
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              return s[:10]

          required = norm_date(os.environ.get('REQUIRED_CACHE_DATE'))
          cache_dir = Path('kline_cache')
          files = [f for f in cache_dir.rglob('*.csv') if not f.name.startswith('_')] if cache_dir.exists() else []
          dates, samples = [], []
          for f in files:
              try:
                  with open(f, 'r', encoding='utf-8-sig', newline='') as fh:
                      rows = list(csv.reader(fh))
                  if len(rows) < 2:
                      continue
                  header = rows[0]
                  idx = 0
                  for name in ('date', '日期', 'trade_date', '交易日期'):
                      if name in header:
                          idx = header.index(name)
                          break
                  last = ''
                  for row in reversed(rows[1:]):
                      if row and len(row) > idx and str(row[idx]).strip():
                          last = norm_date(row[idx])
                          break
                  if last:
                      dates.append(last)
                      if len(samples) < 12:
                          samples.append((f.name, last))
              except Exception:
                  pass

          c = Counter(dates)
          majority = c.most_common(1)[0][0] if c else ''
          report = {
              'csv_count': len(files),
              'csv_with_date_count': len(dates),
              'cache_majority_date': majority,
              'required_cache_date': required,
              'cache_date_top': c.most_common(10),
              'samples': samples,
              'accepted': bool(len(files) >= 1000 and len(dates) >= 1000 and majority and (not required or majority >= required)),
          }
          Path('outputs').mkdir(exist_ok=True)
          Path('outputs/cache_acceptance_date_report.json').write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(report, ensure_ascii=False, indent=2))

          if len(files) < 1000:
              raise SystemExit('K线缓存CSV数量过少，不允许交给一号员工。')
          if len(dates) < 1000:
              raise SystemExit('可读日期的K线CSV数量过少，不允许交给一号员工。')
          if not majority:
              raise SystemExit('未读取到缓存众数日期，不允许交给一号员工。')
          if required and majority < required:
              raise SystemExit(f'K线缓存日期未覆盖目标：缓存众数={majority}，要求>={required}')
          print('✅ K线缓存数量和日期覆盖均通过。')
          PY

      - name: 上传已验收K线缓存
        uses: actions/upload-artifact@v4
        with:
          name: kline-cache-accepted
          path: |
            kline_cache/**
            outputs/**
          if-no-files-found: error
          retention-days: 3

      - name: 上传验收报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 一号员工-缓存验收报告
          path: |
            outputs/**
          if-no-files-found: warn
          retention-days: 14

  run-stock-alert:
    name: ⑤ 运行一号员工
    needs: [prepare, cache-acceptance]
    if: ${{ always() && needs.prepare.outputs.mode != 'cache_only' && (needs.prepare.outputs.mode == 'selfcheck' || needs.cache-acceptance.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      PYTHONUNBUFFERED: '1'
      MODEL_FILE: 'stock_alert.py'
      MODEL_VERSION: 'V28.6.2'

      # 目标日期：daily用于手动选股日期；backtest用于缓存覆盖和防止读未来K线。
      SELECTION_TRADE_DATE: ${{ needs.prepare.outputs.selection_trade_date }}
      TARGET_TRADE_DATE: ${{ needs.prepare.outputs.selection_trade_date }}
      DATA_GATE_TARGET_DATE: ${{ needs.prepare.outputs.selection_trade_date }}
      LAST_TRADE_DAY_OVERRIDE: ${{ needs.prepare.outputs.selection_trade_date }}
      ALLOW_TARGET_DATE_OVERRIDE: '允许'

      ENABLE_XHU_PRESSURE_BREAKOUT: '1'
      XHU_PRESSURE_DEFAULT_BUCKET_PCT: '0.005'
      XHU_PRESSURE_MAX_ZONES_PER_PERIOD: '5'
      XHU_PRESSURE_ENABLE_YEARLY: '1'

      V20_A_MIN_SCORE: '82'
      V20_A_MINUS_MIN_SCORE: '79'
      V20_BPLUS_MIN_SCORE: '75'
      V20_A_MIN_RR: '1.5'
      V20_A_MIN_TRADE_QUALITY: '5'
      V20_TRADE_QUALITY_FLOOR_A_MINUS: '5'
      V20_TRADE_QUALITY_FLOOR_BPLUS: '3'
      V24_1_MARKET_REGIME: 'neutral'

      RUN_V25_BACKTEST: '0'
      V25_1_MODE: 'daily'

      USE_FULL_HISTORY_CACHE: '1'
      FULL_HISTORY_CACHE_DIR: 'kline_cache'
      ALLOW_STALE_KLINE_CACHE: '0'

      KLINE_FALLBACK_AKSHARE: '0'
      STOCK_LIST_FALLBACK_AKSHARE: '0'
      BAOSTOCK_RELOGIN_ON_BROKEN_PIPE: '1'
      SUPPRESS_BAOSTOCK_VERBOSE: '1'
      REQUEST_SLEEP: '0.02'
      KLINE_MAX_RETRIES: '1'
      RETRY_FAILED_KLINE_AFTER_SCAN: '0'
      SINGLE_STOCK_TIMEOUT_SECONDS: '8'
      STOCK_LIST_QUERY_TIMEOUT_SECONDS: '60'

      BASE_KLINE_LOOKBACK_DAYS: '520'
      DEEP_KLINE_LOOKBACK_DAYS: '2200'
      KLINE_LOOKBACK_DAYS: '2200'
      DEEP_SCORE_LIMIT: '200'
      DEEP_SCORE_LIMIT_RAW: '200'
      DEEP_SCORE_HARD_CAP: '200'
      MIN_VALID_KLINE: '1000'

      # 一号员工正式买入池：Top5。
      TOP_PUSH_LIMIT: '5'
      RESULT_LIMIT: '5'
      FORCE_TOP_N: '5'
      MIN_PUSH_COUNT: '5'

      V25_BACKTEST_TOP_N: ${{ needs.prepare.outputs.backtest_topn }}
      V25_BACKTEST_DEEP_LIMIT: ${{ needs.prepare.outputs.backtest_deep_limit }}
      V25_1_BACKTEST_BASE_LIMIT: ${{ needs.prepare.outputs.backtest_base_limit }}
      V25_BACKTEST_MAX_DATES: ${{ needs.prepare.outputs.backtest_max_dates }}
      V25_BACKTEST_DATE_STEP: ${{ needs.prepare.outputs.backtest_date_step }}
      V25_BACKTEST_DISABLE_TELEGRAM: '1'

      ENABLE_TELEGRAM: '1'
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载已验收K线缓存
        if: ${{ needs.prepare.outputs.mode != 'selfcheck' }}
        uses: actions/download-artifact@v4
        with:
          name: kline-cache-accepted
          path: .

      - name: 显示工作区
        shell: bash
        run: |
          echo "主程序：$MODEL_FILE"
          echo "内部版本：$MODEL_VERSION"
          echo "运行模式：${{ needs.prepare.outputs.mode }}"
          echo "选股日期：${{ needs.prepare.outputs.selection_trade_date }}"
          echo "缓存目录：$FULL_HISTORY_CACHE_DIR"
          ls -la
          if [ -d kline_cache ]; then
            echo "K线CSV数量：$(find kline_cache -type f -name '*.csv' ! -name '_*.csv' | wc -l)"
          fi

      - name: 检查一号员工主程序
        shell: bash
        run: |
          if [ ! -f "$MODEL_FILE" ]; then
            echo "❌ 没找到固定入口：$MODEL_FILE"
            exit 1
          fi
          python -m py_compile "$MODEL_FILE"
          echo "✅ 语法检查通过"

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装运行依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pandas numpy requests tqdm akshare baostock openpyxl lxml beautifulsoup4 matplotlib
          python - <<'PY'
          import pandas, numpy, requests, baostock
          print('✅ 核心依赖导入成功')
          PY

      - name: 运行前完整自检
        shell: bash
        run: |
          python "$MODEL_FILE" --mode daily --self-check

      - name: 运行一号员工
        shell: bash
        run: |
          MODE='${{ needs.prepare.outputs.mode }}'
          echo "当前运行模式：$MODE"

          if [ "$MODE" = "selfcheck" ]; then
            echo "selfcheck 已完成，不再运行 daily/backtest。"
            exit 0
          fi

          if [ "$MODE" = "backtest" ]; then
            export ENABLE_TELEGRAM=0
            export RUN_V25_BACKTEST=1
            export V25_1_MODE=backtest
            export TARGET_TRADE_DATE='${{ needs.prepare.outputs.backtest_end }}'
            export DATA_GATE_TARGET_DATE='${{ needs.prepare.outputs.backtest_end }}'
            export LAST_TRADE_DAY_OVERRIDE='${{ needs.prepare.outputs.backtest_end }}'
            CMD="python \"$MODEL_FILE\" --mode backtest --start ${{ needs.prepare.outputs.backtest_start }} --end ${{ needs.prepare.outputs.backtest_end }} --max-dates ${{ needs.prepare.outputs.backtest_max_dates }} --topn ${{ needs.prepare.outputs.backtest_topn }} --deep-limit ${{ needs.prepare.outputs.backtest_deep_limit }} --base-limit ${{ needs.prepare.outputs.backtest_base_limit }} --date-step ${{ needs.prepare.outputs.backtest_date_step }}"
            echo "$CMD"
            eval "$CMD"
          else
            export RUN_V25_BACKTEST=0
            export V25_1_MODE=daily
            python "$MODEL_FILE" --mode daily
          fi

      - name: 上传一号员工运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 一号员工选股结果
          path: |
            *.csv
            *.md
            *.html
            *.json
            output*/**
            outputs/**
            reports/**
            logs/**
          if-no-files-found: ignore
          retention-days: 14
