name: Stock Alert V25.3

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "daily=每日选股；backtest=历史回测；selfcheck=自检"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - backtest
          - selfcheck
      start:
        description: "回测开始日期"
        required: false
        default: "2022-04-08"
      end:
        description: "回测结束日期"
        required: false
        default: "2023-04-08"
      max_dates:
        description: "最多回测交易日数量"
        required: false
        default: ""
      base_limit:
        description: "基础层进入深度层数量"
        required: false
        default: ""

  schedule:
    - cron: "30 7 * * 1-5"

jobs:
  run-stock-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List files
        run: |
          pwd
          ls -la
          echo "All Python files:"
          find . -maxdepth 3 -name "*.py" -print

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests tqdm akshare beautifulsoup4 lxml openpyxl

      - name: Detect Python script
        run: |
          SCRIPT=$(find . -maxdepth 3 -name "stock_alert*.py" | head -n 1)

          if [ -z "$SCRIPT" ]; then
            echo "没有找到 stock_alert*.py 文件"
            echo "当前目录文件："
            ls -la
            exit 1
          fi

          echo "SCRIPT=$SCRIPT" >> $GITHUB_ENV
          echo "Using script: $SCRIPT"

      - name: Syntax check
        run: |
          python -m py_compile "$SCRIPT"

      - name: Run stock alert
        env:
          PYTHONUTF8: "1"
          TQDM_DISABLE: "1"
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"

          if [ "$MODE" = "selfcheck" ]; then
            python "$SCRIPT" --mode backtest --self-check
          elif [ "$MODE" = "backtest" ]; then
            CMD="python $SCRIPT --mode backtest --start ${{ github.event.inputs.start }} --end ${{ github.event.inputs.end }}"
            if [ -n "${{ github.event.inputs.max_dates }}" ]; then
              CMD="$CMD --max-dates ${{ github.event.inputs.max_dates }}"
            fi
            if [ -n "${{ github.event.inputs.base_limit }}" ]; then
              CMD="$CMD --base-limit ${{ github.event.inputs.base_limit }}"
            fi
            echo "$CMD"
            eval "$CMD"
          else
            python "$SCRIPT" --mode daily
          fi

      - name: Prepare artifacts
        if: always()
        run: |
          mkdir -p artifact_upload
          find . -maxdepth 3 \( -name "*.csv" -o -name "*.html" -o -name "*.md" -o -path "./output*" \) -print -exec cp -r {} artifact_upload/ \; || true
          echo "Artifact files:"
          ls -la artifact_upload || true

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-alert-output
          path: artifact_upload
          retention-days: 7
