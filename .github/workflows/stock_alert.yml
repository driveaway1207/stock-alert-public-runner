name: stock-alert

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

jobs:
  stock-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests baostock numpy

      - name: Run stock script
        env:
          ENABLE_TELEGRAM: 1
          RESULT_LIMIT: 20
          DEEP_SCORE_LIMIT: 500
          DEEP_SCORE_HARD_CAP: 150

          # V10.1：默认只扫描最新有行情交易日，不再回看近3天，提升速度并避免旧信号挤占名额
          CHECK_DAYS: 1

          MAX_WORKERS: 1
          REQUEST_SLEEP: 0.12

          # 公共仓库标准runner单job最长6小时，这里给收尾和artifact上传预留时间
          MAX_RUNTIME_SECONDS: 21300

          # 基础评分最多5小时；CHECK_DAYS=1后理论上会明显提前完成
          BASIC_RUNTIME_SECONDS: 18000

          # 深度评分数量仍保持150条不变
          DEEP_RUNTIME_SECONDS: 7200

          SINGLE_STOCK_TIMEOUT_SECONDS: 35
          MIN_VALID_KLINE: 1000
          PROGRESS_INTERVAL: 100

          PYTHONUNBUFFERED: 1

          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: python -u stock_alert.py

      - name: Upload stock candidates
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-candidates
          path: |
            stock_candidates.json
            failed_kline_symbols.json
            signals_history.json
          if-no-files-found: warn

      - name: Upload kline cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kline-cache
          path: |
            kline_cache/
          if-no-files-found: ignore
