name: 一号员工A股每日增量更新并推送

on:
  workflow_dispatch:
    inputs:
      run_stock_alert:
        description: "是否运行一号员工选股：1=运行，0=只更新缓存"
        required: true
        default: "1"
      skip_kline_update:
        description: "是否跳过每日K线更新、直接使用已恢复缓存：1=跳过更新，0=正常更新"
        required: true
        default: "0"
      lookback_days:
        description: "落后股票增量回看自然日"
        required: true
        default: "7"
      max_runtime_minutes:
        description: "每日增量更新最多运行分钟数"
        required: true
        default: "110"

  schedule:
    # 北京时间 18:00 = UTC 10:00
    - cron: "0 10 * * 1-5"

permissions:
  contents: read
  actions: write

concurrency:
  group: employee1-a-stock-daily-update-and-alert
  cancel-in-progress: false

jobs:
  daily-update-and-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 显示工作目录
        run: |
          pwd
          ls -la
          echo "Python files:"
          find . -maxdepth 3 -type f -name "*.py" | sort || true
          echo "Workflow files:"
          find .github/workflows -maxdepth 1 -type f | sort || true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests akshare baostock openpyxl lxml beautifulsoup4 html5lib tqdm numpy pillow matplotlib

      - name: 准备目录
        run: |
          mkdir -p outputs
          mkdir -p kline_cache
          mkdir -p telegram_tables

      - name: 恢复A股K线缓存
        id: restore_kline_cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-daily-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-

      - name: 显示缓存恢复状态
        run: |
          echo "Cache hit: ${{ steps.restore_kline_cache.outputs.cache-hit }}"
          echo "Cache matched key: ${{ steps.restore_kline_cache.outputs.cache-matched-key }}"
          echo "Restored kline_cache stock csv count:"
          find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l
          echo "Cache dir size:"
          du -sh kline_cache || true
          echo "Meta file:"
          ls -lah kline_cache/_full_history_status.csv || true

      - name: 每日增量更新A股K线缓存
        if: ${{ github.event.inputs.skip_kline_update != '1' }}
        env:
          PYTHONUNBUFFERED: "1"
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
          MAX_RUNTIME_MINUTES: ${{ github.event.inputs.max_runtime_minutes || '110' }}
          SOFT_STOP_BUFFER_MINUTES: "5"
          PER_STOCK_TIMEOUT: "20"
          PROGRESS_EVERY: "100"
        run: |
          echo "[RUN] 每日增量更新A股K线缓存"
          python -u tools/update_kline_cache_daily.py

      - name: 跳过K线更新时生成昨日缓存闸门状态
        if: ${{ github.event.inputs.skip_kline_update == '1' }}
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "[SKIP] 本次跳过每日K线更新，直接使用已恢复的 kline_cache 缓存。"
          mkdir -p outputs
          python - <<'PY'
          import os, json, glob
          import pandas as pd
          from datetime import datetime

          files=[f for f in glob.glob('kline_cache/*.csv') if not os.path.basename(f).startswith('_')]
          latest_dates=[]
          readable=0
          for f in files[:]:
              try:
                  df=pd.read_csv(f)
                  if df.empty:
                      continue
                  # 兼容 date/日期/trade_date 字段
                  date_col=None
                  for c in ['date','日期','trade_date','交易日期']:
                      if c in df.columns:
                          date_col=c
                          break
                  if date_col is None:
                      continue
                  s=df[date_col].dropna().astype(str)
                  if len(s)==0:
                      continue
                  latest_dates.append(s.iloc[-1])
                  readable += 1
              except Exception:
                  pass

          target=max(latest_dates) if latest_dates else ''
          state={
              'should_run_stock_alert': True,
              'should_run': True,
              'target_trade_date': target,
              'fresh_coverage_pct': 'skip_update_use_restored_cache',
              'gate_reason': f'skip_kline_update=1; use restored kline_cache; readable_files={readable}; target_trade_date={target}',
              'skip_kline_update': True,
              'cache_count': len(files),
              'readable_cache_files': readable,
              'generated_at': datetime.now().isoformat(timespec='seconds'),
          }
          with open('outputs/daily_kline_update_state.json','w',encoding='utf-8') as f:
              json.dump(state,f,ensure_ascii=False,indent=2)
          with open('outputs/daily_kline_update_summary_skip_update.json','w',encoding='utf-8') as f:
              json.dump(state,f,ensure_ascii=False,indent=2)
          print(json.dumps(state,ensure_ascii=False,indent=2))
          PY

      - name: 缓存验收并生成模型股票池
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "[RUN] 缓存验收并生成 model_usable_universe"
          python -u tools/validate_kline_cache.py

      - name: 数据新鲜度闸门
        id: data_gate
        run: |
          echo "[RUN] 数据新鲜度闸门"

          STATE_FILE="outputs/daily_kline_update_state.json"

          if [ ! -f "$STATE_FILE" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing_daily_update_state" >> "$GITHUB_OUTPUT"
            echo "❌ 缺少 daily_kline_update_state.json，不运行一号员工。"
            exit 0
          fi

          SHOULD_RUN=$(python -c "import json; d=json.load(open('$STATE_FILE', encoding='utf-8')); print(str(d.get('should_run_stock_alert', d.get('should_run', True))).lower())")
          TARGET_DATE=$(python -c "import json; d=json.load(open('$STATE_FILE', encoding='utf-8')); print(d.get('target_trade_date', d.get('目标交易日', '')))")
          COVERAGE=$(python -c "import json; d=json.load(open('$STATE_FILE', encoding='utf-8')); print(d.get('fresh_coverage_pct', d.get('最新K覆盖率', '')))")
          REASON=$(python - <<'PY'
          import json
          d=json.load(open('outputs/daily_kline_update_state.json', encoding='utf-8'))
          reason=d.get('gate_reason') or d.get('reason') or ''
          if not reason:
              stopped=d.get('stopped_by_time')
              updated=d.get('updated_to_target_count', d.get('updated_成功更新到目标日数', ''))
              total=d.get('cache_count', d.get('缓存股票数', d.get('total', '')))
              coverage=d.get('fresh_coverage_pct', d.get('最新K覆盖率', ''))
              if stopped:
                  reason=f"stopped_by_time; coverage={coverage}; updated={updated}/{total}"
              else:
                  reason=f"coverage_not_enough; coverage={coverage}; updated={updated}/{total}"
          print(str(reason)[:500])
          PY
          )

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          echo "数据新鲜度闸门:"
          echo "should_run=$SHOULD_RUN"
          echo "target_date=$TARGET_DATE"
          echo "coverage=$COVERAGE"
          echo "reason=$REASON"

      - name: 运行一号员工A股选股并推送Telegram
        if: ${{ steps.data_gate.outputs.should_run == 'true' && github.event.inputs.run_stock_alert != '0' }}
        env:
          PYTHONUNBUFFERED: "1"
          ENABLE_TELEGRAM: "1"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # V19/V19.1 推送思路：不再用80分作为硬门槛；每日按排序固定推送Top3。
          # 这些变量如果 stock_alert.py 当前版本尚未全部读取，也不会影响运行。
          FINAL_SCORE_THRESHOLD: "0"
          TOP_PUSH_LIMIT: "3"
          RESULT_LIMIT: "3"
          FORCE_TOP_N: "3"
          MIN_PUSH_COUNT: "3"
          DEEP_SCORE_HARD_CAP: "200"
          DEEP_SCORE_LIMIT: "500"
          V19_SCORE_CARDS_FILE: "v19_3_score_cards.json"
          V19_DAILY_REPORT_FILE: "v19_3_daily_report.txt"
          V19_REVIEW_REPORT_FILE: "v19_3_review_report.txt"

          DATA_GATE_TARGET_DATE: ${{ steps.data_gate.outputs.target_date }}
          DATA_GATE_COVERAGE: ${{ steps.data_gate.outputs.coverage }}
          DATA_GATE_REASON: ${{ steps.data_gate.outputs.reason }}
        run: |
          echo "[RUN] 一号员工A股选股并推送"
          echo "使用 TELEGRAM_BOT_TOKEN → TELEGRAM_TOKEN"
          echo "V19.3: FINAL_SCORE_THRESHOLD=0, TOP_PUSH_LIMIT=3, RESULT_LIMIT=3, DEEP_SCORE_HARD_CAP=200"
          python -u stock_alert.py

      - name: 数据未达标时不运行正式推荐
        if: ${{ steps.data_gate.outputs.should_run != 'true' }}
        run: |
          echo "⚠️ 数据新鲜度闸门未通过，本次不运行正式选股。"
          echo "target_date=${{ steps.data_gate.outputs.target_date }}"
          echo "coverage=${{ steps.data_gate.outputs.coverage }}"
          echo "reason=${{ steps.data_gate.outputs.reason }}"

      - name: 数据未达标时推送Telegram诊断
        if: ${{ steps.data_gate.outputs.should_run != 'true' && github.event.inputs.run_stock_alert != '0' }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE: ${{ steps.data_gate.outputs.target_date }}
          COVERAGE: ${{ steps.data_gate.outputs.coverage }}
          REASON: ${{ steps.data_gate.outputs.reason }}
        run: |
          echo "[RUN] 数据未达标Telegram诊断"
          python - <<'PY'
          import os, json, html, requests
          token=os.environ.get('TELEGRAM_TOKEN','').strip()
          chat_id=os.environ.get('TELEGRAM_CHAT_ID','').strip()
          if not token or not chat_id:
              print('telegram diagnostic skipped: missing TELEGRAM_TOKEN or TELEGRAM_CHAT_ID')
              raise SystemExit(0)

          state={}
          try:
              with open('outputs/daily_kline_update_state.json', encoding='utf-8') as f:
                  state=json.load(f)
          except Exception as e:
              print('state read failed:', e)

          def pick(*keys, default=''):
              for k in keys:
                  if k in state and state[k] not in (None, ''):
                      return state[k]
              return default

          target=os.environ.get('TARGET_DATE') or pick('target_trade_date','目标交易日')
          coverage=os.environ.get('COVERAGE') or pick('fresh_coverage_pct','最新K覆盖率')
          reason=os.environ.get('REASON') or pick('gate_reason','reason')
          updated=pick('updated_to_target_count','updated_成功更新到目标日数', default='')
          processed=pick('processed_count','本轮处理记录数', default='')
          total=pick('cache_count','缓存股票数','total', default='')
          stopped=pick('stopped_by_time', default='')
          failed=pick('failed_count','failed_失败数', default='')
          elapsed=pick('elapsed','耗时', default='')
          if not reason:
              reason=f"coverage_not_enough; stopped_by_time={stopped}; updated={updated}/{total}"

          lines=[
              '⚠️ <b>一号员工今日未运行正式推荐</b>',
              '',
              f'目标交易日：<code>{html.escape(str(target))}</code>',
              f'数据覆盖率：<code>{html.escape(str(coverage))}</code>',
              f'已更新到目标日：<code>{html.escape(str(updated))}/{html.escape(str(total))}</code>',
              f'本轮处理：<code>{html.escape(str(processed))}</code>',
              f'失败数：<code>{html.escape(str(failed))}</code>',
              f'时间保护触发：<code>{html.escape(str(stopped))}</code>',
              f'耗时：<code>{html.escape(str(elapsed))}</code>',
              '',
              f'原因：<code>{html.escape(str(reason))}</code>',
              '',
              '处理建议：可直接 Re-run all jobs；缓存已保存时，下一轮会继续补剩余股票。'
          ]
          text='\n'.join(lines)
          url=f'https://api.telegram.org/bot{token}/sendMessage'
          r=requests.post(url, data={'chat_id':chat_id, 'text':text, 'parse_mode':'HTML'}, timeout=20)
          print('telegram diagnostic status:', r.status_code)
          if not r.ok:
              print(r.text[:500])
          PY

      - name: 显示输出文件
        if: always()
        run: |
          echo "Outputs directory:"
          ls -lah outputs || true

          echo ""
          echo "Daily update state:"
          cat outputs/daily_kline_update_state.json || true

          echo ""
          echo "Latest output files:"
          find outputs -maxdepth 1 -type f -printf "%s %p\n" 2>/dev/null | sort -nr | head -50 || true

          echo ""
          echo "Root json/txt/csv files:"
          ls -lah *.json *.txt *.csv 2>/dev/null || true

          echo ""
          echo "Important candidate/report files:"
          for f in stock_candidates.json v19_3_score_cards.json v19_3_daily_report.txt v19_3_review_report.txt v19_2_score_cards.json v19_2_daily_report.txt v19_2_review_report.txt v19_1_score_cards.json v19_1_daily_report.txt v19_1_review_report.txt telegram_message.txt telegram_report.txt; do
            if [ -f "$f" ]; then
              echo "FOUND $f"
              ls -lah "$f"
              echo "--- head of $f ---"
              head -80 "$f" || true
              echo "--- end head ---"
            else
              echo "MISSING $f"
            fi
          done

      - name: 上传输出结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee1-a-stock-daily-outputs
          path: |
            outputs/
            stock_candidates.json
            v19_3_score_cards.json
            v19_3_daily_report.txt
            v19_3_review_report.txt
            v19_2_score_cards.json
            v19_2_daily_report.txt
            v19_2_review_report.txt
            v19_1_score_cards.json
            v19_1_daily_report.txt
            v19_1_review_report.txt
            telegram_message.txt
            telegram_report.txt
            *.json
            *.txt
            *.csv
          if-no-files-found: warn
          retention-days: 14

      - name: 判断是否保存缓存
        if: always()
        id: cache_save_gate
        run: |
          COUNT=$(find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l)
          echo "cache_count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event.inputs.skip_kline_update }}" = "1" ]; then
            echo "save_cache=false" >> "$GITHUB_OUTPUT"
            echo "本次 skip_kline_update=1，仅用旧缓存跑模型，不保存缓存，避免中午误覆盖。"
          elif [ "$COUNT" -ge 3000 ]; then
            echo "save_cache=true" >> "$GITHUB_OUTPUT"
            echo "缓存文件数 $COUNT >= 3000，允许保存缓存。"
          else
            echo "save_cache=false" >> "$GITHUB_OUTPUT"
            echo "缓存文件数 $COUNT < 3000，不保存，避免覆盖好缓存。"
          fi

      - name: 保存更新后的A股K线缓存
        if: always() && steps.cache_save_gate.outputs.save_cache == 'true'
        uses: actions/cache/save@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-daily-${{ github.run_id }}
