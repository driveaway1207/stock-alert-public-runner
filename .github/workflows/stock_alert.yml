name: Stock Alert V25.3

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式：daily=每日选股；backtest=历史回测；selfcheck=自检"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - backtest
          - selfcheck
      start:
        description: "回测开始日期，仅 backtest 使用"
        required: false
        default: "2022-04-08"
      end:
        description: "回测结束日期，仅 backtest 使用"
        required: false
        default: "2023-04-08"
      max_dates:
        description: "最多回测交易日数量，留空表示不限制"
        required: false
        default: ""
      base_limit:
        description: "基础层进入深度层数量，例如 200/300/500"
        required: false
        default: ""

  schedule:
    - cron: "30 7 * * 1-5"

jobs:
  run-stock-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests tqdm akshare beautifulsoup4 lxml openpyxl

      - name: Detect Python script
        run: |
          if [ -f "stock_alert_v25_3_bigbull_full.py" ]; then
            echo "SCRIPT=stock_alert_v25_3_bigbull_full.py" >> $GITHUB_ENV
          elif [ -f "stock_alert_v25_3_full.py" ]; then
            echo "SCRIPT=stock_alert_v25_3_full.py" >> $GITHUB_ENV
          elif [ -f "stock_alert_v25_3.py" ]; then
            echo "SCRIPT=stock_alert_v25_3.py" >> $GITHUB_ENV
          elif [ -f "stock_alert_v24_1_full.py" ]; then
            echo "SCRIPT=stock_alert_v24_1_full.py" >> $GITHUB_ENV
          else
            echo "找不到可运行的 Python 文件"
            ls -la
            exit 1
          fi
          echo "Using script: $SCRIPT"

      - name: Syntax check
        run: |
          python -m py_compile "$SCRIPT"

      - name: Run stock alert
        env:
          PYTHONUTF8: "1"
          TQDM_DISABLE: "1"
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"

          if [ "$MODE" = "selfcheck" ]; then
            python "$SCRIPT" --mode backtest --self-check
          elif [ "$MODE" = "backtest" ]; then
            CMD="python $SCRIPT --mode backtest --start ${{ github.event.inputs.start }} --end ${{ github.event.inputs.end }}"
            if [ -n "${{ github.event.inputs.max_dates }}" ]; then
              CMD="$CMD --max-dates ${{ github.event.inputs.max_dates }}"
            fi
            if [ -n "${{ github.event.inputs.base_limit }}" ]; then
              CMD="$CMD --base-limit ${{ github.event.inputs.base_limit }}"
            fi
            echo "$CMD"
            eval "$CMD"
          else
            python "$SCRIPT" --mode daily
          fi

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-alert-output
          path: |
            output*
            *.csv
            *.html
            *.md
          retention-days: 7
