name: 一号员工选股模型 V25.3

on:
  schedule:
    # GitHub Actions 使用 UTC 时间
    # 北京时间 18:15 = UTC 10:15
    - cron: '15 10 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式：daily=每日选股；backtest=历史回测；selfcheck=自检'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - backtest
          - selfcheck

      start:
        description: '回测开始日期，例如 2022-04-08'
        required: false
        default: '2022-04-08'

      end:
        description: '回测结束日期，例如 2023-04-08'
        required: false
        default: '2023-04-08'

      max_dates:
        description: '最多回测交易日数量，留空表示不限制'
        required: false
        default: ''

      base_limit:
        description: '回测基础层进入深度层数量，例如 300/500，留空使用脚本默认'
        required: false
        default: ''

jobs:
  run-stock-alert:
    name: 运行一号员工选股
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      PYTHONUNBUFFERED: '1'

      # 一号员工主程序固定使用仓库里的 stock_alert.py
      MODEL_FILE: 'stock_alert.py'

      # 优先读取K线缓存；如果没有缓存，就走 BaoStock 主数据源
      USE_FULL_HISTORY_CACHE: '1'
      FULL_HISTORY_CACHE_DIR: 'K线缓存'

      # BaoStock 是主数据源，AkShare 不做大规模补拉
      KLINE_FALLBACK_AKSHARE: '0'
      STOCK_LIST_FALLBACK_AKSHARE: '0'

      # 不用旧缓存硬凑正式结果
      ALLOW_STALE_KLINE_CACHE: '0'

      # BaoStock 连接保护
      BAOSTOCK_RELOGIN_ON_BROKEN_PIPE: '1'
      SUPPRESS_BAOSTOCK_VERBOSE: '1'

      # Telegram 推送
      ENABLE_TELEGRAM: '1'
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # 正式推送数量
      TOP_PUSH_LIMIT: '3'
      RESULT_LIMIT: '3'
      FORCE_TOP_N: '3'
      MIN_PUSH_COUNT: '3'

    steps:
      - name: ① 下载仓库代码
        uses: actions/checkout@v4

      - name: ② 检查一号员工主程序
        shell: bash
        run: |
          echo "检查一号员工主程序：$MODEL_FILE"

          if [ ! -f "$MODEL_FILE" ]; then
            echo "❌ 没找到一号员工主程序：$MODEL_FILE"
            echo "当前仓库根目录文件如下："
            ls -la
            exit 1
          fi

          echo "✅ 找到一号员工主程序：$MODEL_FILE"

      - name: ③ 检查K线缓存文件夹
        shell: bash
        run: |
          echo "开始检查K线缓存文件夹..."

          if [ -d "K线缓存" ]; then
            echo "✅ 找到中文K线缓存文件夹：K线缓存"
            echo "FULL_HISTORY_CACHE_DIR=K线缓存" >> $GITHUB_ENV
            echo "USE_FULL_HISTORY_CACHE=1" >> $GITHUB_ENV

            CSV_COUNT=$(find "K线缓存" -name "*.csv" | wc -l)
            echo "K线缓存CSV数量：$CSV_COUNT"

          elif [ -d "kline_cache" ]; then
            echo "✅ 找到旧英文K线缓存文件夹：kline_cache"
            echo "为了兼容旧代码，本次继续读取 kline_cache"
            echo "FULL_HISTORY_CACHE_DIR=kline_cache" >> $GITHUB_ENV
            echo "USE_FULL_HISTORY_CACHE=1" >> $GITHUB_ENV

            CSV_COUNT=$(find "kline_cache" -name "*.csv" | wc -l)
            echo "K线缓存CSV数量：$CSV_COUNT"

          else
            echo "⚠️ 没找到K线缓存文件夹。"
            echo "说明：仓库里目前没有 K线缓存 或 kline_cache 文件夹。"
            echo "本次不强制失败，改为使用 BaoStock 主数据源拉取K线。"
            echo "USE_FULL_HISTORY_CACHE=0" >> $GITHUB_ENV
            echo "FULL_HISTORY_CACHE_DIR=K线缓存" >> $GITHUB_ENV
          fi

      - name: ④ 显示最近的K线缓存文件
        shell: bash
        run: |
          echo "当前K线缓存目录：$FULL_HISTORY_CACHE_DIR"

          if [ -d "$FULL_HISTORY_CACHE_DIR" ]; then
            echo "最近更新的K线文件："
            find "$FULL_HISTORY_CACHE_DIR" -name "*.csv" -type f -printf '%TY-%Tm-%Td %TH:%TM %p\n' | sort | tail -30 || true
          else
            echo "没有K线缓存目录，本次将走 BaoStock 主数据源。"
          fi

      - name: ⑤ 检查风险雷区文件
        shell: bash
        run: |
          if [ -f "risk_flags.json" ]; then
            echo "✅ 找到风险雷区文件：risk_flags.json"
          else
            echo "⚠️ 没找到风险雷区文件 risk_flags.json"
            echo "模型仍然可以运行，但外部监管/财务/治理雷区识别会变弱。"
          fi

      - name: ⑥ 安装Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: ⑦ 安装运行依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy requests tqdm akshare baostock openpyxl lxml beautifulsoup4 matplotlib
          fi

      - name: ⑧ 检查Python代码语法
        shell: bash
        run: |
          echo "检查Python代码语法：$MODEL_FILE"
          python -m py_compile "$MODEL_FILE"

      - name: ⑨ 运行一号员工选股模型
        shell: bash
        run: |
          MODE="${{ github.event.inputs.mode }}"
          START="${{ github.event.inputs.start }}"
          END="${{ github.event.inputs.end }}"
          MAX_DATES="${{ github.event.inputs.max_dates }}"
          BASE_LIMIT="${{ github.event.inputs.base_limit }}"

          if [ -z "$MODE" ]; then
            MODE="daily"
          fi

          echo "当前运行模式：$MODE"
          echo "一号员工主程序：$MODEL_FILE"
          echo "是否读取K线缓存：$USE_FULL_HISTORY_CACHE"
          echo "K线缓存目录：$FULL_HISTORY_CACHE_DIR"
          echo "AkShare补拉开关：$KLINE_FALLBACK_AKSHARE"

          if [ "$MODE" = "selfcheck" ]; then
            python "$MODEL_FILE" --mode daily --self-check

          elif [ "$MODE" = "backtest" ]; then
            CMD="python \"$MODEL_FILE\" --mode backtest --start ${START:-2022-04-08} --end ${END:-2023-04-08}"

            if [ -n "$MAX_DATES" ]; then
              CMD="$CMD --max-dates $MAX_DATES"
            fi

            if [ -n "$BASE_LIMIT" ]; then
              CMD="$CMD --base-limit $BASE_LIMIT"
            fi

            echo "$CMD"
            eval "$CMD"

          else
            python "$MODEL_FILE" --mode daily
          fi

      - name: ⑩ 保存运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 一号员工选股结果
          path: |
            *.csv
            *.md
            *.html
            *.json
            output*/**
            outputs/**
            reports/**
            logs/**
          if-no-files-found: ignore
          retention-days: 14
