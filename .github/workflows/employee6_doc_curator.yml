name: 六号员工
run-name: 六号员工

on:
  workflow_dispatch:

concurrency:
  group: employee6-doc-curator
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  inspect-docs:
    name: 六号员工-手动文档清洁检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python -u employee6_doc_curator.py
