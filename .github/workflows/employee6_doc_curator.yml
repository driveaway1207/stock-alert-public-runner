name: 六号员工
run-name: 六号员工

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'AI_ENGINEER_CHANGE_LOG.md'
      - 'AI_ENGINEER_SUCCESS_LEDGER.md'
      - 'AI_ENGINEER_FINAL_RULES_INDEX.md'
  workflow_run:
    workflows: ['五号员工']
    types: [completed]

concurrency:
  group: employee6-doc-curator
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  curate-docs:
    name: 六号员工-文档审计与经验沉淀
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[employee6-skip]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install requests
      - run: python -u employee6_doc_curator.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[employee6-skip] 六号员工自动更新文档账本'
          file_pattern: 'AI_ENGINEER_CHANGE_LOG.md AI_ENGINEER_SUCCESS_LEDGER.md AI_ENGINEER_FINAL_RULES_INDEX.md AI_ENGINEER_DOCUMENT_MAP.md EMPLOYEE6_OPERATION_RUNBOOK.md'
          commit_user_name: employee6-doc-curator
          commit_user_email: employee6-doc-curator@users.noreply.github.com
