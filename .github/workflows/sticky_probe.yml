name: 单股粘合K线验证

on:
  workflow_dispatch:
    inputs:
      code:
        description: '股票代码，例如 301376'
        required: true
        default: '301376'
      period:
        description: '周期'
        required: true
        default: 'month'
        type: choice
        options:
          - daily
          - week
          - month
      window:
        description: '最近N根K线'
        required: true
        default: '9'

jobs:
  probe:
    name: 验证单股粘合K线
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: 恢复K线缓存
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: sticky-probe-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-

      - name: 运行单股粘合验证
        shell: bash
        run: |
          mkdir -p outputs
          echo "缓存CSV数量：$(find kline_cache -type f -name '*.csv' ! -name '_*.csv' 2>/dev/null | wc -l || true)"
          python sticky_probe.py \
            --code "${{ github.event.inputs.code }}" \
            --period "${{ github.event.inputs.period }}" \
            --window "${{ github.event.inputs.window }}" \
            | tee outputs/sticky_probe_result.txt

      - name: 上传验证结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 单股粘合验证结果
          path: outputs/sticky_probe_result.txt
          if-no-files-found: warn
          retention-days: 7
