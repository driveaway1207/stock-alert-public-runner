name: 二号员工

"on":
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式：daily=运行二号员工；selfcheck=只自检；cache_only=只更新/验收共享缓存"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - selfcheck
          - cache_only

      selection_trade_date:
        description: "二号员工运行日期，可空。格式YYYY-MM-DD；空=自动按北京时间20:35规则判断"
        required: false
        default: ""

      cache_target_date:
        description: "拉取/验收共享缓存目标日期，可空。空=daily跟随运行日期"
        required: false
        default: ""

      cache_strategy:
        description: "缓存策略：auto=缺/旧才补；force_refresh=强制补；use_existing=只用现有缓存"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - force_refresh
          - use_existing

      baostock_ready_policy:
        description: "BaoStock未到20:35时：auto=自动用前一交易日；stop_if_unready=停止；force=强制按填写日期"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - stop_if_unready
          - force

      full_rebuild:
        description: "共享缓存过少时是否允许从0全量建立：0=不允许，1=允许"
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

      min_cache_files_required:
        description: "非从0重建时，至少需要多少个缓存CSV才允许保存共享缓存"
        required: false
        default: "3000"

      max_runtime_minutes:
        description: "缓存补拉单轮最大运行分钟数，建议270"
        required: false
        default: "270"

concurrency:
  group: 二号员工-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  prepare:
    name: ① 准备二号员工运行参数
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      mode: ${{ steps.config.outputs.mode }}
      selection_trade_date: ${{ steps.config.outputs.selection_trade_date }}
      cache_target_date: ${{ steps.config.outputs.cache_target_date }}
      required_cache_date: ${{ steps.config.outputs.required_cache_date }}
      cache_strategy: ${{ steps.config.outputs.cache_strategy }}
      full_rebuild: ${{ steps.config.outputs.full_rebuild }}
      min_cache_files_required: ${{ steps.config.outputs.min_cache_files_required }}
      max_runtime_minutes: ${{ steps.config.outputs.max_runtime_minutes }}

    steps:
      - name: 解析二号员工日期、模式与缓存策略
        id: config
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_SELECTION_TRADE_DATE: ${{ github.event.inputs.selection_trade_date }}
          INPUT_CACHE_TARGET_DATE: ${{ github.event.inputs.cache_target_date }}
          INPUT_CACHE_STRATEGY: ${{ github.event.inputs.cache_strategy }}
          INPUT_BAOSTOCK_READY_POLICY: ${{ github.event.inputs.baostock_ready_policy }}
          INPUT_FULL_REBUILD: ${{ github.event.inputs.full_rebuild }}
          INPUT_MIN_CACHE_FILES_REQUIRED: ${{ github.event.inputs.min_cache_files_required }}
          INPUT_MAX_RUNTIME_MINUTES: ${{ github.event.inputs.max_runtime_minutes }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import datetime, timedelta, timezone

          def norm_date(x):
              s = str(x or '').strip().replace('/', '-')
              if not s:
                  return ''
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              return s[:10]

          def prev_workday(d):
              d = d - timedelta(days=1)
              while d.weekday() >= 5:
                  d -= timedelta(days=1)
              return d

          event_name = os.environ.get('EVENT_NAME') or 'workflow_dispatch'
          mode = (os.environ.get('INPUT_MODE') or 'daily').strip() or 'daily'
          if event_name != 'workflow_dispatch':
              mode = 'daily'

          cache_strategy = (os.environ.get('INPUT_CACHE_STRATEGY') or 'auto').strip() or 'auto'
          ready_policy = (os.environ.get('INPUT_BAOSTOCK_READY_POLICY') or 'auto').strip() or 'auto'

          now = datetime.now(timezone(timedelta(hours=8)))
          today = now.date()

          if today.weekday() >= 5:
              auto_target = today
              while auto_target.weekday() >= 5:
                  auto_target = auto_target - timedelta(days=1)
              auto_reason = '周末自动回退到最近工作日'
          elif now.hour > 20 or (now.hour == 20 and now.minute >= 35):
              auto_target = today
              auto_reason = '北京时间20:35后，允许使用当天作为目标交易日'
          else:
              if ready_policy == 'stop_if_unready':
                  raise SystemExit('当前未到北京时间20:35，BaoStock全市场日线可能未完全稳定；baostock_ready_policy=stop_if_unready，停止运行。')
              auto_target = prev_workday(today)
              auto_reason = '北京时间20:35前，自动使用前一工作日，避免拿不全当天K线'

          manual_selection = norm_date(os.environ.get('INPUT_SELECTION_TRADE_DATE'))
          manual_cache = norm_date(os.environ.get('INPUT_CACHE_TARGET_DATE'))
          selection_trade_date = manual_selection or auto_target.isoformat()
          cache_target_date = manual_cache or selection_trade_date
          required_cache_date = cache_target_date

          full_rebuild = (os.environ.get('INPUT_FULL_REBUILD') or '0').strip() or '0'
          min_cache_files_required = (os.environ.get('INPUT_MIN_CACHE_FILES_REQUIRED') or '3000').strip() or '3000'
          max_runtime_minutes = (os.environ.get('INPUT_MAX_RUNTIME_MINUTES') or '270').strip() or '270'

          print(f'mode={mode}')
          print(f'selection_trade_date={selection_trade_date}')
          print(f'cache_target_date={cache_target_date}')
          print(f'required_cache_date={required_cache_date}')
          print(f'cache_strategy={cache_strategy}')
          print(f'full_rebuild={full_rebuild}')
          print(f'min_cache_files_required={min_cache_files_required}')
          print(f'max_runtime_minutes={max_runtime_minutes}')
          print(f'auto_target_reason={auto_reason}')
          PY

      - name: 显示本次二号员工参数
        shell: bash
        run: |
          echo "================ 二号员工运行参数 ================"
          echo "运行模式：${{ steps.config.outputs.mode }}"
          echo "运行日期：${{ steps.config.outputs.selection_trade_date }}"
          echo "共享缓存目标日期：${{ steps.config.outputs.cache_target_date }}"
          echo "共享缓存覆盖要求：>= ${{ steps.config.outputs.required_cache_date }}"
          echo "缓存策略：${{ steps.config.outputs.cache_strategy }}"
          echo "固定主程序：second_employee_wallstreet_v12_0.py"
          echo "共享缓存目录：kline_cache"
          echo "=================================================="

  check-cache:
    name: ② 检查共享K线缓存
    needs: prepare
    if: ${{ needs.prepare.outputs.mode != 'selfcheck' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      cache_ok: ${{ steps.audit.outputs.cache_ok }}
      cache_count: ${{ steps.audit.outputs.cache_count }}
      cache_majority_date: ${{ steps.audit.outputs.cache_majority_date }}

    steps:
      - name: 恢复已有共享K线缓存
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-second-check-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-

      - name: 检查共享缓存数量和日期覆盖
        id: audit
        shell: bash
        env:
          REQUIRED_CACHE_DATE: ${{ needs.prepare.outputs.required_cache_date }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import csv, os
          from pathlib import Path
          from collections import Counter

          def norm_date(x):
              s = str(x or '').strip().replace('/', '-')
              if not s:
                  return ''
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              return s[:10]

          cache_dir = Path('kline_cache')
          required = norm_date(os.environ.get('REQUIRED_CACHE_DATE'))
          dates = []
          files = list(cache_dir.rglob('*.csv')) if cache_dir.exists() else []
          files = [f for f in files if not f.name.startswith('_')]
          for f in files:
              try:
                  with open(f, 'r', encoding='utf-8-sig', newline='') as fh:
                      rows = list(csv.reader(fh))
                  if len(rows) < 2:
                      continue
                  header = rows[0]
                  idx = 0
                  for name in ('date', '日期', 'trade_date', '交易日期'):
                      if name in header:
                          idx = header.index(name)
                          break
                  last = ''
                  for row in reversed(rows[1:]):
                      if row and len(row) > idx and str(row[idx]).strip():
                          last = norm_date(row[idx])
                          break
                  if last:
                      dates.append(last)
              except Exception:
                  pass
          c = Counter(dates)
          majority = c.most_common(1)[0][0] if c else ''
          count = len(files)
          with_date = len(dates)
          ok = bool(count >= 1000 and with_date >= 1000 and majority and (not required or majority >= required))
          print(f'cache_ok={str(ok).lower()}')
          print(f'cache_count={count}')
          print(f'cache_majority_date={majority}')
          PY

      - name: 显示共享缓存检查结果
        shell: bash
        run: |
          echo "共享缓存是否可用：${{ steps.audit.outputs.cache_ok }}"
          echo "共享缓存CSV数量：${{ steps.audit.outputs.cache_count }}"
          echo "共享缓存众数日期：${{ steps.audit.outputs.cache_majority_date }}"
          echo "要求覆盖到：${{ needs.prepare.outputs.required_cache_date }}"

  cache-backfill:
    name: ③ 二号员工更新共享K线缓存
    needs: [prepare, check-cache]
    if: ${{ needs.prepare.outputs.mode != 'selfcheck' && needs.prepare.outputs.cache_strategy != 'use_existing' && (needs.prepare.outputs.cache_strategy == 'force_refresh' || needs.prepare.outputs.mode == 'cache_only' || needs.check-cache.outputs.cache_ok != 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      PYTHONUNBUFFERED: '1'
      TARGET_TRADE_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      EXPECTED_KLINE_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      DATA_GATE_TARGET_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      RUN_ROUND: '1'
      MAX_AUTO_ROUNDS: '1'
      AUTO_CONTINUE: '0'
      FULL_REBUILD: ${{ needs.prepare.outputs.full_rebuild }}
      MIN_CACHE_FILES_REQUIRED: ${{ needs.prepare.outputs.min_cache_files_required }}
      MAX_RUNTIME_MINUTES: ${{ needs.prepare.outputs.max_runtime_minutes }}

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装缓存任务依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests akshare baostock openpyxl lxml beautifulsoup4 html5lib tqdm

      - name: 恢复共享K线缓存
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-

      - name: 执行二号员工共享缓存补拉
        env:
          SOFT_STOP_BUFFER_MINUTES: '20'
          EASTMONEY_TIMEOUT: '20'
          AKSHARE_TIMEOUT: '35'
          BAOSTOCK_TIMEOUT: '45'
          SOURCE_FAIL_THRESHOLD: '5'
          SOURCE_COOLDOWN_SECONDS: '900'
        shell: bash
        run: |
          mkdir -p outputs kline_cache
          echo "共享缓存目标日期：$TARGET_TRADE_DATE"
          echo "共享缓存CSV数量-补拉前：$(find kline_cache -type f -name '*.csv' ! -name '_*.csv' | wc -l)"
          if [ ! -f tools/export_neckline_candidates.py ]; then
            echo "❌ 未找到一号员工共享缓存补拉脚本 tools/export_neckline_candidates.py"
            exit 1
          fi
          python -u tools/export_neckline_candidates.py
          echo "共享缓存CSV数量-补拉后：$(find kline_cache -type f -name '*.csv' ! -name '_*.csv' | wc -l)"

      - name: 判断是否允许保存共享K线缓存
        if: always()
        id: cache_save_gate
        shell: bash
        run: |
          COUNT=$(find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l)
          echo "cache_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$FULL_REBUILD" = "1" ]; then
            echo "save_cache=true" >> "$GITHUB_OUTPUT"
            echo "FULL_REBUILD=1，允许保存共享缓存。"
          elif [ "$COUNT" -ge "$MIN_CACHE_FILES_REQUIRED" ]; then
            echo "save_cache=true" >> "$GITHUB_OUTPUT"
            echo "缓存数量 $COUNT >= $MIN_CACHE_FILES_REQUIRED，允许保存共享缓存。"
          else
            echo "save_cache=false" >> "$GITHUB_OUTPUT"
            echo "缓存数量 $COUNT < $MIN_CACHE_FILES_REQUIRED，不保存，避免污染共享缓存。"
          fi

      - name: 缓存数量不足则停止本轮
        if: always() && steps.cache_save_gate.outputs.save_cache != 'true'
        shell: bash
        run: |
          echo "❌ 本轮缓存补拉后数量不足，不保存、不进入验收，避免旧缓存或坏缓存误导二号员工/一号员工。"
          exit 1

      - name: 保存共享K线缓存
        if: always() && steps.cache_save_gate.outputs.save_cache == 'true'
        uses: actions/cache/save@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-${{ github.run_id }}

      - name: 上传二号员工缓存补拉报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 二号员工-缓存补拉报告
          path: |
            outputs/**
          if-no-files-found: warn
          retention-days: 14

  cache-acceptance:
    name: ④ 验收共享K线缓存
    needs: [prepare, check-cache, cache-backfill]
    if: ${{ always() && needs.prepare.outputs.mode != 'selfcheck' && ((needs.prepare.outputs.cache_strategy == 'use_existing' && needs.check-cache.outputs.cache_ok == 'true') || (needs.prepare.outputs.cache_strategy == 'auto' && (needs.check-cache.outputs.cache_ok == 'true' || needs.cache-backfill.result == 'success')) || (needs.prepare.outputs.cache_strategy == 'force_refresh' && needs.cache-backfill.result == 'success')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: '1'
      REQUIRED_CACHE_DATE: ${{ needs.prepare.outputs.required_cache_date }}
      TARGET_TRADE_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      EXPECTED_KLINE_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      DATA_GATE_TARGET_DATE: ${{ needs.prepare.outputs.cache_target_date }}
      ALLOW_TARGET_DATE_OVERRIDE: '允许'

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装验收依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: 恢复待验收共享K线缓存
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-second-acceptance-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-${{ github.run_id }}
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-

      - name: 运行原缓存验收脚本
        shell: bash
        run: |
          mkdir -p outputs kline_cache
          if [ -f tools/validate_kline_cache.py ]; then
            python -u tools/validate_kline_cache.py
          else
            echo "⚠️ 未找到 tools/validate_kline_cache.py，继续执行内置数量/日期验收。"
          fi

      - name: 内置数量 + 日期覆盖验收
        shell: bash
        run: |
          python - <<'PY'
          import csv, json, os
          from pathlib import Path
          from collections import Counter

          def norm_date(x):
              s = str(x or '').strip().replace('/', '-')
              if not s:
                  return ''
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              return s[:10]

          required = norm_date(os.environ.get('REQUIRED_CACHE_DATE'))
          cache_dir = Path('kline_cache')
          files = [f for f in cache_dir.rglob('*.csv') if not f.name.startswith('_')] if cache_dir.exists() else []
          dates, samples = [], []
          for f in files:
              try:
                  with open(f, 'r', encoding='utf-8-sig', newline='') as fh:
                      rows = list(csv.reader(fh))
                  if len(rows) < 2:
                      continue
                  header = rows[0]
                  idx = 0
                  for name in ('date', '日期', 'trade_date', '交易日期'):
                      if name in header:
                          idx = header.index(name)
                          break
                  last = ''
                  for row in reversed(rows[1:]):
                      if row and len(row) > idx and str(row[idx]).strip():
                          last = norm_date(row[idx])
                          break
                  if last:
                      dates.append(last)
                      if len(samples) < 12:
                          samples.append((f.name, last))
              except Exception:
                  pass

          c = Counter(dates)
          majority = c.most_common(1)[0][0] if c else ''
          report = {
              'csv_count': len(files),
              'csv_with_date_count': len(dates),
              'cache_majority_date': majority,
              'required_cache_date': required,
              'cache_date_top': c.most_common(10),
              'samples': samples,
              'accepted': bool(len(files) >= 1000 and len(dates) >= 1000 and majority and (not required or majority >= required)),
          }
          Path('outputs').mkdir(exist_ok=True)
          Path('outputs/cache_acceptance_date_report.json').write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(report, ensure_ascii=False, indent=2))

          if len(files) < 1000:
              raise SystemExit('共享K线缓存CSV数量过少，不允许交给二号员工。')
          if len(dates) < 1000:
              raise SystemExit('可读日期的共享K线CSV数量过少，不允许交给二号员工。')
          if not majority:
              raise SystemExit('未读取到缓存众数日期，不允许交给二号员工。')
          if required and majority < required:
              raise SystemExit(f'共享K线缓存日期未覆盖目标：缓存众数={majority}，要求>={required}')
          print('✅ 共享K线缓存数量和日期覆盖均通过。')
          PY

      - name: 上传已验收共享K线缓存
        uses: actions/upload-artifact@v4
        with:
          name: kline-cache-accepted
          path: |
            kline_cache/**
            outputs/**
          if-no-files-found: error
          retention-days: 3

      - name: 上传二号员工缓存验收报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 二号员工-缓存验收报告
          path: |
            outputs/**
          if-no-files-found: warn
          retention-days: 14

  run-second-employee:
    name: ⑤ 运行二号员工
    needs: [prepare, cache-acceptance]
    if: ${{ always() && needs.prepare.outputs.mode != 'cache_only' && (needs.prepare.outputs.mode == 'selfcheck' || needs.cache-acceptance.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      PYTHONUNBUFFERED: '1'
      MODEL_FILE: 'second_employee_wallstreet_v12_0.py'
      SELECTION_TRADE_DATE: ${{ needs.prepare.outputs.selection_trade_date }}
      TARGET_TRADE_DATE: ${{ needs.prepare.outputs.selection_trade_date }}
      DATA_GATE_TARGET_DATE: ${{ needs.prepare.outputs.selection_trade_date }}
      FULL_HISTORY_CACHE_DIR: 'kline_cache'

    steps:
      - name: 下载仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载已验收共享K线缓存
        if: ${{ needs.prepare.outputs.mode != 'selfcheck' }}
        uses: actions/download-artifact@v4
        with:
          name: kline-cache-accepted
          path: .

      - name: 显示二号员工工作区
        shell: bash
        run: |
          echo "主程序：$MODEL_FILE"
          echo "运行模式：${{ needs.prepare.outputs.mode }}"
          echo "二号员工运行日期：${{ needs.prepare.outputs.selection_trade_date }}"
          echo "共享缓存目录：$FULL_HISTORY_CACHE_DIR"
          ls -la
          if [ -d kline_cache ]; then
            echo "共享K线CSV数量：$(find kline_cache -type f -name '*.csv' ! -name '_*.csv' | wc -l)"
          fi

      - name: 检查二号员工主程序
        shell: bash
        run: |
          if [ ! -f "$MODEL_FILE" ]; then
            echo "❌ 没找到固定入口：$MODEL_FILE"
            exit 1
          fi
          python -m py_compile "$MODEL_FILE"
          echo "✅ 二号员工语法检查通过"

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装二号员工运行依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pandas numpy requests tqdm akshare baostock openpyxl lxml beautifulsoup4 pyarrow

      - name: 二号员工自检
        shell: bash
        run: |
          python "$MODEL_FILE" selfcheck

      - name: 构建二号员工本地输入表
        if: ${{ needs.prepare.outputs.mode != 'selfcheck' }}
        shell: bash
        run: |
          mkdir -p second_employee_input second_employee_output
          python - <<'PY'
          import os, re, json
          from pathlib import Path
          import pandas as pd

          cache_dir = Path('kline_cache')
          out_dir = Path('second_employee_input')
          out_dir.mkdir(exist_ok=True)

          def norm_date_yyyymmdd(x):
              s = str(x or '').strip().replace('/', '-')
              if not s:
                  return ''
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10].replace('-', '')
              digits = re.sub(r'\D', '', s)
              return digits[:8] if len(digits) >= 8 else ''

          target = norm_date_yyyymmdd(os.environ.get('SELECTION_TRADE_DATE'))

          def pick_col(cols, names):
              lower = {str(c).strip().lower(): c for c in cols}
              for n in names:
                  key = str(n).strip().lower()
                  if key in lower:
                      return lower[key]
              return None

          rows = []
          files = [p for p in cache_dir.rglob('*.csv') if not p.name.startswith('_')]
          if len(files) < 1000:
              raise SystemExit(f'共享缓存CSV数量过少：{len(files)}')

          for p in files:
              try:
                  df = pd.read_csv(p, dtype=str, encoding='utf-8-sig')
              except UnicodeDecodeError:
                  df = pd.read_csv(p, dtype=str, encoding='gbk')
              except Exception:
                  continue
              if df.empty:
                  continue

              cols = list(df.columns)
              date_col = pick_col(cols, ['trade_date', 'date', '日期', '交易日期'])
              code_col = pick_col(cols, ['stock_code', 'code', '代码', '证券代码'])
              name_col = pick_col(cols, ['stock_name', 'name', '名称', '证券简称'])
              open_col = pick_col(cols, ['open', '开盘', '开盘价'])
              high_col = pick_col(cols, ['high', '最高', '最高价'])
              low_col = pick_col(cols, ['low', '最低', '最低价'])
              close_col = pick_col(cols, ['close', '收盘', '收盘价'])
              volume_col = pick_col(cols, ['volume', 'vol', '成交量'])
              amount_col = pick_col(cols, ['amount', '成交额', '成交金额'])
              is_st_col = pick_col(cols, ['is_st', 'isst', 'isST', '是否ST'])
              sector_col = pick_col(cols, ['sector_code', 'industry', '行业', '板块'])

              needed = [date_col, open_col, high_col, low_col, close_col, volume_col]
              if any(c is None for c in needed):
                  continue

              sub = pd.DataFrame()
              sub['trade_date'] = df[date_col].map(norm_date_yyyymmdd)
              sub['open'] = pd.to_numeric(df[open_col], errors='coerce')
              sub['high'] = pd.to_numeric(df[high_col], errors='coerce')
              sub['low'] = pd.to_numeric(df[low_col], errors='coerce')
              sub['close'] = pd.to_numeric(df[close_col], errors='coerce')
              sub['volume'] = pd.to_numeric(df[volume_col], errors='coerce')
              sub['amount'] = pd.to_numeric(df[amount_col], errors='coerce') if amount_col is not None else sub['close'] * sub['volume']

              if code_col is not None:
                  sub['stock_code'] = df[code_col].astype(str)
              else:
                  m = re.search(r'(\d{6})', p.stem)
                  sub['stock_code'] = m.group(1) if m else p.stem

              sub['stock_name'] = df[name_col].astype(str) if name_col is not None else sub['stock_code']
              sub['sector_code'] = df[sector_col].astype(str) if sector_col is not None else 'UNKNOWN'
              sub['is_st'] = df[is_st_col].astype(str) if is_st_col is not None else False
              sub['is_suspended'] = False
              sub['listed_days'] = 9999

              sub = sub.dropna(subset=['trade_date', 'open', 'high', 'low', 'close', 'volume', 'amount'])
              sub = sub[sub['trade_date'].astype(str).str.len() == 8]
              sub = sub[(sub['high'] >= sub[['open', 'close']].max(axis=1)) & (sub['low'] <= sub[['open', 'close']].min(axis=1))]
              if sub.empty:
                  continue
              # 二号员工只需要最近历史窗口，避免全历史暴力计算导致 runner 取消。
              sub = sub.sort_values('trade_date').tail(1200)
              rows.append(sub)

          if not rows:
              raise SystemExit('未能从已验收共享K线缓存构建二号员工输入。')

          all_df = pd.concat(rows, ignore_index=True)
          all_df = all_df.drop_duplicates(['stock_code', 'trade_date'], keep='last')
          all_df = all_df.sort_values(['stock_code', 'trade_date'])
          available_dates = sorted(all_df['trade_date'].unique())

          if target:
              if target not in set(available_dates):
                  prior = [d for d in available_dates if d <= target]
                  if prior:
                      print(f'⚠️ 指定日期 {target} 不在缓存中，自动使用最近可用日期 {prior[-1]}')
                      target = prior[-1]
                  else:
                      raise SystemExit(f'指定日期 {target} 之前没有可用缓存。')
              selected_date = target
          else:
              selected_date = str(all_df['trade_date'].max())

          stock_count = all_df[all_df['trade_date'] == selected_date]['stock_code'].nunique()
          if stock_count < 1000:
              raise SystemExit(f'目标日期 {selected_date} 股票数量过少：{stock_count}')

          out_path = out_dir / 'daily_kline.csv'
          all_df.to_csv(out_path, index=False, encoding='utf-8-sig')
          (out_dir / 'selected_trade_date.txt').write_text(selected_date, encoding='utf-8')
          report = {
              'input_files': len(files),
              'rows': int(len(all_df)),
              'stocks': int(all_df['stock_code'].nunique()),
              'selected_trade_date': selected_date,
              'selected_stock_count': int(stock_count),
              'history_window_per_stock': 1200,
              'output': str(out_path),
              'cache_source': 'kline-cache-accepted artifact from shared a-kline-cache',
          }
          Path('second_employee_output/cache_input_report.json').write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: 运行二号员工
        if: ${{ needs.prepare.outputs.mode != 'selfcheck' }}
        shell: bash
        run: |
          set +e
          SELECTED_DATE=$(cat second_employee_input/selected_trade_date.txt)
          echo "二号员工最终使用交易日：$SELECTED_DATE"
          mkdir -p second_employee_output
          python "$MODEL_FILE" run \
            --input second_employee_input/daily_kline.csv \
            --output-dir second_employee_output \
            --trade-date "$SELECTED_DATE" \
            > second_employee_output/run.log 2>&1
          EXIT_CODE=$?
          echo "二号员工退出码：$EXIT_CODE"
          echo "运行日志最后200行："
          tail -200 second_employee_output/run.log || true
          exit $EXIT_CODE

      - name: 展示二号员工结果摘要
        if: always()
        shell: bash
        run: |
          echo "二号员工输出文件："
          find second_employee_output -maxdepth 2 -type f -print || true
          echo "报告预览："
          sed -n '1,220p' second_employee_output/second_employee_report.md || true
          echo "缓存输入报告："
          cat second_employee_output/cache_input_report.json || true

      - name: 上传二号员工运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 二号员工运行结果
          path: |
            second_employee_output/**
            second_employee_input/**
          if-no-files-found: warn
          retention-days: 14
