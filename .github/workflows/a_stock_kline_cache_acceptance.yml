name: A Stock Kline Cache Acceptance

on:
  workflow_run:
    workflows:
      - A Stock Full Kline Cache Auto Backfill
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: a-stock-kline-cache-acceptance
  cancel-in-progress: false

jobs:
  cache-acceptance:
    name: cache-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 120

    # 自动触发时，只有全量缓存任务成功，才验收
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace
        run: |
          pwd
          ls -la
          echo "Python files:"
          find . -maxdepth 3 -type f -name "*.py" | sort || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Prepare directories
        run: |
          mkdir -p outputs
          mkdir -p kline_cache

      - name: Restore full kline cache
        id: restore_kline_cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-acceptance-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-

      - name: Show restored cache status
        run: |
          echo "Cache hit: ${{ steps.restore_kline_cache.outputs.cache-hit }}"
          echo "Cache primary key: ${{ steps.restore_kline_cache.outputs.cache-primary-key }}"
          echo "Cache matched key: ${{ steps.restore_kline_cache.outputs.cache-matched-key }}"
          echo "Restored kline_cache stock csv count:"
          find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l
          echo "Cache dir size:"
          du -sh kline_cache || true
          echo "Meta file:"
          ls -lah kline_cache/_full_history_status.csv || true

      - name: Run cache acceptance
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -u tools/validate_kline_cache.py

      - name: Show outputs
        if: always()
        run: |
          echo "Outputs:"
          ls -lah outputs || true
          echo "Acceptance state:"
          cat outputs/cache_acceptance_state.json || true

      - name: Check accepted cache before upload
        run: |
          CSV_COUNT=$(find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l)
          echo "准备交给一号员工的K线CSV数量：$CSV_COUNT"

          if [ "$CSV_COUNT" -lt 1000 ]; then
            echo "❌ K线缓存数量过少，不上传给一号员工。"
            exit 1
          fi

          echo "✅ K线缓存数量正常，可以交给一号员工。"

      - name: Upload accepted kline cache and reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kline-cache-accepted
          path: |
            kline_cache/**
            outputs/**
          if-no-files-found: error
          retention-days: 3

      - name: Upload acceptance reports only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kline-cache-acceptance-reports
          path: |
            outputs/**
          if-no-files-found: warn
          retention-days: 14
