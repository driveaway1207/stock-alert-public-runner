name: 三号员工

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "目标交易日，可空。格式：2026-05-31 或 20260531"
        required: false
        default: ""
      send_telegram:
        description: "是否发送Telegram：1发送，0不发送"
        required: false
        default: "1"

jobs:
  run:
    name: 三号员工
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      NO_COLOR: ""

      EMPLOYEE3_TARGET_DATE: ${{ github.event.inputs.target_date }}
      SELECTION_TRADE_DATE: ${{ github.event.inputs.target_date }}
      TARGET_TRADE_DATE: ${{ github.event.inputs.target_date }}
      DATA_GATE_TARGET_DATE: ${{ github.event.inputs.target_date }}

      ENABLE_TELEGRAM: ${{ github.event.inputs.send_telegram }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      EMPLOYEE3_PROGRESS_COLOR: "1"

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests baostock

      - name: 运行三号员工
        run: |
          python employee3_runner.py

      - name: 写入运行摘要
        if: always()
        run: |
          echo "## 三号员工" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f employee3_reports/core_line_breakout_screen.md ]; then
            cat employee3_reports/core_line_breakout_screen.md >> $GITHUB_STEP_SUMMARY
          else
            echo "未生成三号员工报告。" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 上传三号员工报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 三号员工报告
          path: employee3_reports/
