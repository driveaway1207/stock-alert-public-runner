name: 三号员工
run-name: 三号员工

"on":
  workflow_dispatch:
    inputs:
      employee3_date_choice:
        description: "🎨 选择海选日期｜默认：当前交易日"
        required: false
        type: choice
        default: "🟩 当前交易日"
        options:
          - "🟩 当前交易日"
          - "🟦 上一个交易日"
          - "🟨 上两个交易日"
          - "🟧 上三个交易日"
          - "🟥 上四个交易日"
          - "🟪 上五个交易日"
          - "🟫 上六个交易日"
          - "⬛ 上七个交易日"

      employee3_target_date:
        description: "✍️ 手动日期｜可填0604、6.4、YYYY-MM-DD、YYYYMMDD｜填了优先"
        required: false
        default: ""

      employee3_send_telegram:
        description: "📨 是否发送Telegram"
        required: false
        type: choice
        default: "🟩 是｜发送Telegram"
        options:
          - "🟩 是｜发送Telegram"
          - "⬜ 否｜不发送Telegram"

      employee3_baostock_fallback:
        description: "🔄 是否允许BaoStock补拉最近K线｜默认：否，只读公共缓存"
        required: false
        type: choice
        default: "⬜ 否｜只读公共缓存"
        options:
          - "⬜ 否｜只读公共缓存"
          - "🟧 是｜允许补拉最近K线"

  schedule:
    - cron: "10 13 * * 1-5"
concurrency:
  group: third-employee-singleton-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  employee3:
    name: 三号员工
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: resolve target date
        id: config
        shell: bash
        env:
          EMPLOYEE3_INPUT_DATE_CHOICE: ${{ github.event.inputs.employee3_date_choice }}
          EMPLOYEE3_INPUT_TARGET_DATE: ${{ github.event.inputs.employee3_target_date }}
          EMPLOYEE3_INPUT_SEND_TELEGRAM: ${{ github.event.inputs.employee3_send_telegram }}
          EMPLOYEE3_INPUT_BAOSTOCK_FALLBACK: ${{ github.event.inputs.employee3_baostock_fallback }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          from datetime import datetime, timedelta, timezone

          def norm_date(x, today):
              s = str(x or '').strip()
              if not s:
                  return ''
              s = s.replace('年', '-').replace('月', '-').replace('日', '')
              s = s.replace('/', '-').replace('.', '-').replace('_', '-').strip()
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              m = re.fullmatch(r'(\d{1,2})-(\d{1,2})', s)
              if m:
                  month, day = int(m.group(1)), int(m.group(2))
                  return f'{today.year:04d}-{month:02d}-{day:02d}'
              if len(s) in (3, 4) and s.isdigit():
                  month, day = int(s[:-2]), int(s[-2:])
                  return f'{today.year:04d}-{month:02d}-{day:02d}'
              return s[:10]

          def shift_trading_day(d, n):
              if n == 0:
                  while d.weekday() >= 5:
                      d -= timedelta(days=1)
                  return d
              moved = 0
              while moved < n:
                  d -= timedelta(days=1)
                  if d.weekday() < 5:
                      moved += 1
              return d

          now = datetime.now(timezone(timedelta(hours=8)))
          today = now.date()

          manual = norm_date(os.environ.get('EMPLOYEE3_INPUT_TARGET_DATE'), today)
          choice = str(os.environ.get('EMPLOYEE3_INPUT_DATE_CHOICE') or '').strip()

          choice_map = {
              '当前交易日': 0,
              '上一个交易日': 1,
              '上两个交易日': 2,
              '上三个交易日': 3,
              '上四个交易日': 4,
              '上五个交易日': 5,
              '上六个交易日': 6,
              '上七个交易日': 7,
          }

          # 三号员工定时任务在北京时间21:10运行，默认必须扫描当天完整日K；
          # 只有用户手动选择“上一个交易日”等回看选项时，才向前偏移。
          offset = 0
          for key, value in choice_map.items():
              if key in choice:
                  offset = value
                  break

          if manual:
              target = manual
              reason = 'manual_date'
          else:
              target = shift_trading_day(today, offset).isoformat()
              reason = f'dropdown_offset_{offset}'

          send_choice = str(os.environ.get('EMPLOYEE3_INPUT_SEND_TELEGRAM') or '')
          send_telegram = '0' if '不发送' in send_choice or '否' in send_choice else '1'

          fallback_choice = str(os.environ.get('EMPLOYEE3_INPUT_BAOSTOCK_FALLBACK') or '')
          baostock_fallback = '1' if '允许' in fallback_choice or '是' in fallback_choice else '0'

          print(f'target_date={target}')
          print(f'target_reason={reason}')
          print(f'date_choice={choice or "定时默认当前交易日"}')
          print(f'send_telegram={send_telegram}')
          print(f'baostock_fallback={baostock_fallback}')
          PY

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: restore shared kline cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-employee3-check-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: inspect cache before employee3
        run: |
          echo "target date: ${{ steps.config.outputs.target_date }}"
          echo "target reason: ${{ steps.config.outputs.target_reason }}"
          echo "date choice: ${{ steps.config.outputs.date_choice }}"
          echo "send telegram: ${{ steps.config.outputs.send_telegram }}"
          echo "baostock fallback: ${{ steps.config.outputs.baostock_fallback }}"
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -type f 2>/dev/null | wc -l || true
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -maxdepth 2 -type f 2>/dev/null | head -50 || true

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests akshare baostock openpyxl lxml beautifulsoup4 html5lib tqdm

      - name: bootstrap shared cache when restore is empty
        id: bootstrap_cache
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
          FULL_REBUILD: "1"
          MIN_CACHE_FILES_REQUIRED: "3000"
          MAX_RUNTIME_MINUTES: "210"
          SOFT_STOP_BUFFER_MINUTES: "15"
          RUN_ROUND: "1"
          MAX_AUTO_ROUNDS: "1"
          AUTO_CONTINUE: "0"
          EASTMONEY_TIMEOUT: "20"
          AKSHARE_TIMEOUT: "35"
          BAOSTOCK_TIMEOUT: "45"
          SOURCE_FAIL_THRESHOLD: "5"
          SOURCE_COOLDOWN_SECONDS: "900"
        shell: bash
        run: |
          mkdir -p outputs kline_cache
          COUNT_BEFORE=$(find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l)
          echo "cache_count_before=$COUNT_BEFORE" >> "$GITHUB_OUTPUT"
          if [ "$COUNT_BEFORE" -lt 3000 ]; then
            echo "共享缓存不足3000只，启动三号员工冷启动建库。"
            python -u tools/export_neckline_candidates.py
          else
            echo "共享缓存已有 $COUNT_BEFORE 只，跳过冷启动建库。"
          fi
          COUNT_AFTER=$(find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l)
          echo "cache_count_after=$COUNT_AFTER" >> "$GITHUB_OUTPUT"
          if [ "$COUNT_AFTER" -lt 3000 ]; then
            echo "冷启动后缓存仍不足3000只，本轮不允许正式选股；已保留本轮缓存供下次续建。"
            exit 1
          fi

      - name: refresh shared kline cache for employee3
        id: refresh_cache
        if: always()
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: 1
          MAX_RUNTIME_MINUTES: "45"
          SOFT_STOP_BUFFER_MINUTES: "5"
          MIN_FRESH_COVERAGE: "0.965"
          ALLOW_STOCK_ALERT_IF_STALE_ONLY: "1"
        run: |
          mkdir -p outputs kline_cache
          python -u tools/update_kline_cache_daily.py

      - name: validate refreshed cache and resolve effective trade date
        id: cache_state
        if: always()
        continue-on-error: true
        shell: bash
        env:
          REQUESTED_TARGET_DATE: ${{ steps.config.outputs.target_date }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path
          state_file = Path("outputs/daily_kline_update_state.json")
          requested = str(os.environ.get("REQUESTED_TARGET_DATE") or "").strip()
          event_name = str(os.environ.get("EVENT_NAME") or "").strip()
          cache_files = len([p for p in Path("kline_cache").rglob("*.csv") if not p.name.startswith("_")])
          if not state_file.exists():
              print(f"effective_target_date={requested}")
              print("cache_latest_trade_date=")
              print("fresh_coverage=0.000000")
              print(f"cache_files={cache_files}")
              print("cache_ready=false")
              raise SystemExit("missing cache refresh state")
          state = json.loads(state_file.read_text(encoding="utf-8"))
          effective = str(state.get("目标交易日") or "").strip()
          coverage = float(state.get("fresh_coverage") or 0.0)
          allowed = bool(state.get("should_run_stock_alert"))
          resolved = requested if event_name == "workflow_dispatch" and requested else effective
          ready = bool(effective and allowed and cache_files >= 3000)
          print(f"effective_target_date={resolved}")
          print(f"cache_latest_trade_date={effective}")
          print(f"fresh_coverage={coverage:.6f}")
          print(f"cache_files={cache_files}")
          print(f"cache_ready={str(ready).lower()}")
          if not ready:
              raise SystemExit(f"cache gate failed: effective={effective} coverage={coverage:.6f} cache_files={cache_files}")
          PY

      - name: save refreshed shared kline cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-employee3-${{ github.run_id }}

      - name: upload employee3 cache refresh report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee3-cache-refresh-report
          path: |
            outputs/daily_kline_update_report_*.csv
            outputs/daily_kline_update_summary_*.csv
            outputs/daily_kline_update_state.json
          if-no-files-found: warn
          retention-days: 14

      - name: run employee3 native engine
        id: employee3_engine
        if: steps.cache_state.outcome == 'success'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMPLOYEE3_TARGET_DATE: ${{ steps.cache_state.outputs.effective_target_date }}
          SELECTION_TRADE_DATE: ${{ steps.cache_state.outputs.effective_target_date }}
          TARGET_TRADE_DATE: ${{ steps.cache_state.outputs.effective_target_date }}
          DATA_GATE_TARGET_DATE: ${{ steps.cache_state.outputs.effective_target_date }}
          ENABLE_TELEGRAM: "0"
          EMPLOYEE3_SEND_TELEGRAM: "0"
          EMPLOYEE3_ALLOW_BAOSTOCK_FALLBACK: ${{ steps.config.outputs.baostock_fallback }}
          EMPLOYEE5_ALLOW_BAOSTOCK_FALLBACK: ${{ steps.config.outputs.baostock_fallback }}
          EMPLOYEE3_PROGRESS_COLOR: "1"
          NO_COLOR: ""
        run: python -u employee3_runner.py

      - name: guard report and send employee3 telegram
        id: report_guard
        if: always()
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMPLOYEE3_TARGET_DATE: ${{ steps.cache_state.outputs.effective_target_date || steps.config.outputs.target_date }}
          SELECTION_TRADE_DATE: ${{ steps.cache_state.outputs.effective_target_date || steps.config.outputs.target_date }}
          TARGET_TRADE_DATE: ${{ steps.cache_state.outputs.effective_target_date || steps.config.outputs.target_date }}
          DATA_GATE_TARGET_DATE: ${{ steps.cache_state.outputs.effective_target_date || steps.config.outputs.target_date }}
          ENABLE_TELEGRAM: ${{ steps.config.outputs.send_telegram }}
          EMPLOYEE3_SEND_TELEGRAM: ${{ steps.config.outputs.send_telegram }}
          EMPLOYEE3_BOOTSTRAP_OUTCOME: ${{ steps.bootstrap_cache.outcome }}
          EMPLOYEE3_REFRESH_OUTCOME: ${{ steps.refresh_cache.outcome }}
          EMPLOYEE3_CACHE_GATE_OUTCOME: ${{ steps.cache_state.outcome }}
          EMPLOYEE3_ENGINE_OUTCOME: ${{ steps.employee3_engine.outcome }}
          EMPLOYEE3_CACHE_READY: ${{ steps.cache_state.outputs.cache_ready }}
          EMPLOYEE3_CACHE_FILES: ${{ steps.cache_state.outputs.cache_files }}
          EMPLOYEE3_FRESH_COVERAGE: ${{ steps.cache_state.outputs.fresh_coverage }}
        run: python -u employee3_report_guard.py

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee3-reports
          path: employee3_reports/
          if-no-files-found: warn
          retention-days: 30

      - name: upload cache visibility snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee3-cache-visibility-snapshot
          path: |
            kline_cache/
            employee5_kline_cache/
            data/kline_cache/
            cache/kline_cache/
          if-no-files-found: ignore
          retention-days: 3

      - name: enforce employee3 pipeline result
        if: always()
        shell: bash
        env:
          CACHE_READY: ${{ steps.cache_state.outputs.cache_ready }}
          CACHE_GATE_OUTCOME: ${{ steps.cache_state.outcome }}
          ENGINE_OUTCOME: ${{ steps.employee3_engine.outcome }}
          GUARD_OUTCOME: ${{ steps.report_guard.outcome }}
        run: |
          echo "cache_ready=$CACHE_READY cache_gate=$CACHE_GATE_OUTCOME engine=$ENGINE_OUTCOME guard=$GUARD_OUTCOME"
          if [ "$CACHE_READY" != "true" ] || [ "$CACHE_GATE_OUTCOME" != "success" ]; then
            echo "三号员工缓存门控失败。"
            exit 1
          fi
          if [ "$ENGINE_OUTCOME" != "success" ]; then
            echo "三号员工主引擎未成功产出报告。"
            exit 1
          fi
          if [ "$GUARD_OUTCOME" != "success" ]; then
            echo "三号员工报告守门失败。"
            exit 1
          fi
