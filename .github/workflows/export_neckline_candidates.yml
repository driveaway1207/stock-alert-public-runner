name: Export Neckline Candidates

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Full Kline Cache
        uses: actions/cache@v4
        with:
          path: kline_cache
          key: a-kline-full-history-cache-${{ github.run_id }}
          restore-keys: |
            a-kline-full-history-cache-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install baostock akshare pandas openpyxl requests

      - name: Run Export Script
        run: |
          python tools/export_neckline_candidates.py

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-cache-health
          path: outputs/*.csv
