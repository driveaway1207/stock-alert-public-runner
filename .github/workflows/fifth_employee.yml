name: 五号员工
run-name: 五号员工

"on":
  workflow_dispatch:
    inputs:
      employee5_target_date:
        description: "Employee5 target date, empty means latest trade day"
        required: false
        default: ""
      max_stocks:
        description: "Max limit-up samples to analyze"
        required: false
        default: "300"
  schedule:
    - cron: '45 12 * * 1-5'
  issues:
    types:
      - labeled
      - edited
  issue_comment:
    types:
      - created

concurrency:
  group: fifth-employee-singleton-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  employee5:
    name: 五号员工
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'issues' && github.event.issue.number == 2 && (contains(join(github.event.issue.labels.*.name, ','), 'run-employee5') || github.event.label.name == 'run-employee5')) || (github.event_name == 'issue_comment' && github.event.issue.number == 2 && contains(github.event.comment.body, 'run-employee5')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install baostock akshare pandas requests

      - name: build employee5 base data without telegram
        env:
          PYTHONUNBUFFERED: 1
          EMPLOYEE5_TARGET_DATE: ${{ github.event.inputs.employee5_target_date }}
          EMPLOYEE5_MAX_STOCKS: ${{ github.event.inputs.max_stocks || '300' }}
          EMPLOYEE5_AK_TIMEOUT_SECONDS: "18"
          EMPLOYEE5_REQUEST_SLEEP: "0.15"
        run: python -u employee5_runner.py

      - name: run employee5 cause pool report
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets[format('TELEGRAM_{0}', 'BOT_TOKEN')] }}
          TELEGRAM_TOKEN: ${{ secrets[format('TELEGRAM_{0}', 'BOT_TOKEN')] }}
          TELEGRAM_CHAT_ID: ${{ secrets[format('TELEGRAM_{0}', 'CHAT_ID')] }}
          EMPLOYEE5_TARGET_DATE: ${{ github.event.inputs.employee5_target_date }}
          EMPLOYEE5_MAX_STOCKS: ${{ github.event.inputs.max_stocks || '300' }}
          EMPLOYEE5_AK_TIMEOUT_SECONDS: "18"
          EMPLOYEE5_REQUEST_SLEEP: "0.15"
        run: python -u employee5_structural_report.py

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee5-reports
          path: employee5_reports/
          if-no-files-found: warn
          retention-days: 30
