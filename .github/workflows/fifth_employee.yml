name: 五号员工
run-name: 五号员工

"on":
  workflow_dispatch:
    inputs:
      employee5_target_date:
        description: "五号员工分析日期，可空。格式YYYY-MM-DD或YYYYMMDD；空=最近交易日"
        required: false
        default: ""
      max_stocks:
        description: "兼容旧入口；新版五号员工默认全量扫描缓存"
        required: false
        default: "300"
  schedule:
    - cron: '45 12 * * 1-5'
  issues:
    types:
      - labeled

concurrency:
  group: fifth-employee-singleton-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  employee5:
    name: 五号员工
    if: ${{ github.event_name != 'issues' || (github.event.issue.number == 2 && github.event.label.name == 'run-employee5') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: restore kline cache
        uses: actions/cache/restore@v4
        with:
          path: |
            kline_cache/
            employee5_kline_cache/
            data/kline_cache/
            cache/kline_cache/
          key: a-stock-kline-cache-v1-${{ github.run_id }}
          restore-keys: |
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: inspect cache before employee5
        run: |
          echo "cache file count:"
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -type f 2>/dev/null | wc -l || true
          echo "cache preview:"
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -maxdepth 2 -type f 2>/dev/null | head -50 || true

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: run employee5
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMPLOYEE5_TARGET_DATE: ${{ github.event.inputs.employee5_target_date }}
          EMPLOYEE5_SCAN_LIMIT: "0"
        run: python -u employee5_runner.py

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee5-reports
          path: employee5_reports/
          if-no-files-found: warn
          retention-days: 30

      - name: upload cache visibility snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee5-cache-visibility-snapshot
          path: |
            kline_cache/
            employee5_kline_cache/
            data/kline_cache/
            cache/kline_cache/
          if-no-files-found: ignore
          retention-days: 3
