name: 五号员工
run-name: 五号员工

"on":
  # 自动定时运行已关闭；只保留手动 workflow_dispatch。
  workflow_dispatch:
    inputs:
      employee5_date_choice:
        description: "🎨 选择分析日期｜默认：上一个交易日"
        required: false
        type: choice
        default: "🟦 上一个交易日"
        options:
          - "🟦 上一个交易日"
          - "🟩 当前交易日"
          - "🟨 上两个交易日"
          - "🟧 上三个交易日"
          - "🟥 上四个交易日"
          - "🟪 上五个交易日"
          - "🟫 上六个交易日"
          - "⬛ 上七个交易日"
      employee5_target_date:
        description: "✍️ 手动日期｜可填0604、6.4、YYYY-MM-DD、YYYYMMDD｜填了优先"
        required: false
        default: ""

concurrency:
  group: fifth-employee-singleton-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  employee5:
    name: 五号员工
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: resolve target date
        id: config
        shell: bash
        env:
          EMPLOYEE5_INPUT_DATE_CHOICE: ${{ github.event.inputs.employee5_date_choice }}
          EMPLOYEE5_INPUT_TARGET_DATE: ${{ github.event.inputs.employee5_target_date }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          from datetime import datetime, timedelta, timezone

          def norm_date(x, today):
              s = str(x or '').strip()
              if not s:
                  return ''
              s = s.replace('年', '-').replace('月', '-').replace('日', '')
              s = s.replace('/', '-').replace('.', '-').replace('_', '-').strip()
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              m = re.fullmatch(r'(\d{1,2})-(\d{1,2})', s)
              if m:
                  month, day = int(m.group(1)), int(m.group(2))
                  return f'{today.year:04d}-{month:02d}-{day:02d}'
              if len(s) in (3, 4) and s.isdigit():
                  month, day = int(s[:-2]), int(s[-2:])
                  return f'{today.year:04d}-{month:02d}-{day:02d}'
              return s[:10]

          def shift_trading_day(d, n):
              # n=0：当前交易日；n=1：上一个交易日。
              if n == 0:
                  while d.weekday() >= 5:
                      d -= timedelta(days=1)
                  return d
              moved = 0
              while moved < n:
                  d -= timedelta(days=1)
                  if d.weekday() < 5:
                      moved += 1
              return d

          now = datetime.now(timezone(timedelta(hours=8)))
          today = now.date()
          manual = norm_date(os.environ.get('EMPLOYEE5_INPUT_TARGET_DATE'), today)
          choice = str(os.environ.get('EMPLOYEE5_INPUT_DATE_CHOICE') or '').strip()
          choice_map = {
              '当前交易日': 0,
              '上一个交易日': 1,
              '上两个交易日': 2,
              '上三个交易日': 3,
              '上四个交易日': 4,
              '上五个交易日': 5,
              '上六个交易日': 6,
              '上七个交易日': 7,
          }
          offset = 1
          for key, value in choice_map.items():
              if key in choice:
                  offset = value
                  break

          if manual:
              target = manual
              reason = 'manual_date'
          else:
              target = shift_trading_day(today, offset).isoformat()
              reason = f'dropdown_offset_{offset}'

          print(f'target_date={target}')
          print(f'target_reason={reason}')
          print(f'date_choice={choice}')
          PY

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: restore shared kline cache
        uses: actions/cache/restore@v4
        with:
          # 必须与一号员工共享缓存保存路径保持一致。
          # GitHub Actions cache 的版本会包含 path，路径集合不一致会导致同 key 也恢复不到。
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-employee5-check-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: inspect cache before employee5
        run: |
          echo "target date: ${{ steps.config.outputs.target_date }}"
          echo "cache file count:"
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -type f 2>/dev/null | wc -l || true
          echo "cache preview:"
          find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -maxdepth 2 -type f 2>/dev/null | head -50 || true

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests akshare baostock openpyxl lxml beautifulsoup4 html5lib tqdm

      - name: audit restored cache coverage
        id: cache_audit_before
        shell: bash
        env:
          TARGET_DATE: ${{ steps.config.outputs.target_date }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import csv, os
          from pathlib import Path
          from collections import Counter

          def norm_date(x):
              s = str(x or '').strip().replace('/', '-')
              if not s:
                  return ''
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              return s[:10]

          target = norm_date(os.environ.get('TARGET_DATE'))
          roots = [Path('kline_cache'), Path('employee5_kline_cache'), Path('data/kline_cache'), Path('cache/kline_cache')]
          files = []
          for root in roots:
              if root.exists():
                  files.extend([p for p in root.rglob('*.csv') if not p.name.startswith('_')])
          dates = []
          for f in files:
              try:
                  with open(f, 'r', encoding='utf-8-sig', newline='') as fh:
                      reader = csv.reader(fh)
                      header = next(reader, [])
                      rows = list(reader)
                  if not rows:
                      continue
                  idx = 0
                  for name in ('date', '日期', 'trade_date', '交易日期'):
                      if name in header:
                          idx = header.index(name)
                          break
                  last = ''
                  for row in reversed(rows):
                      if row and len(row) > idx and str(row[idx]).strip():
                          last = norm_date(row[idx])
                          break
                  if last:
                      dates.append(last)
              except Exception:
                  pass
          c = Counter(dates)
          majority = c.most_common(1)[0][0] if c else ''
          count = len(files)
          with_date = len(dates)
          ok = bool(count >= 1000 and with_date >= 1000 and majority and (not target or majority >= target))
          print(f'cache_ok={str(ok).lower()}')
          print(f'cache_count={count}')
          print(f'cache_with_date={with_date}')
          print(f'cache_majority_date={majority}')
          PY

      - name: show cache audit before backfill
        shell: bash
        run: |
          echo "缓存是否覆盖目标日期：${{ steps.cache_audit_before.outputs.cache_ok }}"
          echo "缓存CSV数量：${{ steps.cache_audit_before.outputs.cache_count }}"
          echo "缓存有效日期数量：${{ steps.cache_audit_before.outputs.cache_with_date }}"
          echo "缓存众数日期：${{ steps.cache_audit_before.outputs.cache_majority_date }}"
          echo "目标日期：${{ steps.config.outputs.target_date }}"

      - name: auto backfill cache if target data missing
        if: ${{ steps.cache_audit_before.outputs.cache_ok != 'true' }}
        env:
          PYTHONUNBUFFERED: '1'
          TARGET_TRADE_DATE: ${{ steps.config.outputs.target_date }}
          EXPECTED_KLINE_DATE: ${{ steps.config.outputs.target_date }}
          DATA_GATE_TARGET_DATE: ${{ steps.config.outputs.target_date }}
          RUN_ROUND: '1'
          MAX_AUTO_ROUNDS: '1'
          AUTO_CONTINUE: '0'
          FULL_REBUILD: '1'
          MIN_CACHE_FILES_REQUIRED: '3000'
          MAX_RUNTIME_MINUTES: '270'
          SOFT_STOP_BUFFER_MINUTES: '20'
          EASTMONEY_TIMEOUT: '20'
          AKSHARE_TIMEOUT: '35'
          BAOSTOCK_TIMEOUT: '45'
          SOURCE_FAIL_THRESHOLD: '5'
          SOURCE_COOLDOWN_SECONDS: '900'
        shell: bash
        run: |
          mkdir -p outputs kline_cache employee5_reports
          echo "五号员工缓存未覆盖目标日期，先自动补拉K线缓存。"
          echo "缓存目标日期：$TARGET_TRADE_DATE"
          echo "缓存CSV数量-补拉前：$(find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -type f -name '*.csv' ! -name '_*.csv' 2>/dev/null | wc -l)"
          python -u tools/export_neckline_candidates.py
          echo "缓存CSV数量-补拉后：$(find kline_cache employee5_kline_cache data/kline_cache cache/kline_cache -type f -name '*.csv' ! -name '_*.csv' 2>/dev/null | wc -l)"

      - name: audit cache after optional backfill
        id: cache_audit_after
        if: always()
        shell: bash
        env:
          TARGET_DATE: ${{ steps.config.outputs.target_date }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import csv, os
          from pathlib import Path
          from collections import Counter

          def norm_date(x):
              s = str(x or '').strip().replace('/', '-')
              if not s:
                  return ''
              if len(s) >= 10 and s[4:5] == '-' and s[7:8] == '-':
                  return s[:10]
              if len(s) == 8 and s.isdigit():
                  return f'{s[:4]}-{s[4:6]}-{s[6:8]}'
              return s[:10]

          target = norm_date(os.environ.get('TARGET_DATE'))
          roots = [Path('kline_cache'), Path('employee5_kline_cache'), Path('data/kline_cache'), Path('cache/kline_cache')]
          files = []
          for root in roots:
              if root.exists():
                  files.extend([p for p in root.rglob('*.csv') if not p.name.startswith('_')])
          dates = []
          for f in files:
              try:
                  with open(f, 'r', encoding='utf-8-sig', newline='') as fh:
                      reader = csv.reader(fh)
                      header = next(reader, [])
                      rows = list(reader)
                  if not rows:
                      continue
                  idx = 0
                  for name in ('date', '日期', 'trade_date', '交易日期'):
                      if name in header:
                          idx = header.index(name)
                          break
                  last = ''
                  for row in reversed(rows):
                      if row and len(row) > idx and str(row[idx]).strip():
                          last = norm_date(row[idx])
                          break
                  if last:
                      dates.append(last)
              except Exception:
                  pass
          c = Counter(dates)
          majority = c.most_common(1)[0][0] if c else ''
          count = len(files)
          with_date = len(dates)
          ok = bool(count >= 1000 and with_date >= 1000 and majority and (not target or majority >= target))
          save_cache = bool(count >= 3000)
          print(f'cache_ok={str(ok).lower()}')
          print(f'cache_count={count}')
          print(f'cache_with_date={with_date}')
          print(f'cache_majority_date={majority}')
          print(f'save_cache={str(save_cache).lower()}')
          PY

      - name: show cache audit after optional backfill
        if: always()
        shell: bash
        run: |
          echo "缓存是否覆盖目标日期：${{ steps.cache_audit_after.outputs.cache_ok }}"
          echo "缓存CSV数量：${{ steps.cache_audit_after.outputs.cache_count }}"
          echo "缓存有效日期数量：${{ steps.cache_audit_after.outputs.cache_with_date }}"
          echo "缓存众数日期：${{ steps.cache_audit_after.outputs.cache_majority_date }}"
          echo "是否保存共享缓存：${{ steps.cache_audit_after.outputs.save_cache }}"

      - name: save shared kline cache
        if: ${{ always() && steps.cache_audit_after.outputs.save_cache == 'true' }}
        uses: actions/cache/save@v4
        with:
          # 必须与一号员工共享缓存保存路径保持一致，保证后续一号/五号员工互相可恢复。
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-employee5-${{ github.run_id }}

      - name: run employee5
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMPLOYEE5_TARGET_DATE: ${{ steps.config.outputs.target_date }}
          EMPLOYEE5_SCAN_LIMIT: "0"
        run: python -u employee5_runner.py

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee5-reports
          path: employee5_reports/
          if-no-files-found: warn
          retention-days: 30

      - name: upload cache visibility snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee5-cache-visibility-snapshot
          path: |
            kline_cache/
            employee5_kline_cache/
            data/kline_cache/
            cache/kline_cache/
          if-no-files-found: ignore
          retention-days: 3
