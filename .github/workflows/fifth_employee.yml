name: 五号员工

"on":
  workflow_dispatch:
    inputs:
      employee5_target_date:
        description: "五号员工分析日期，可空。格式YYYY-MM-DD或YYYYMMDD；空=最近交易日"
        required: false
        default: ""
      max_stocks:
        description: "最多分析涨停样本数量"
        required: false
        default: "120"
  schedule:
    - cron: '45 12 * * 1-5'

concurrency:
  group: 五号员工-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  employee5:
    name: 五号员工涨停归因
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      - name: Run fifth employee limit-up researcher
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMPLOYEE5_TARGET_DATE: ${{ github.event.inputs.employee5_target_date }}
          EMPLOYEE5_MAX_STOCKS: ${{ github.event.inputs.max_stocks || '120' }}
          EMPLOYEE5_AK_TIMEOUT_SECONDS: "18"
          EMPLOYEE5_REQUEST_SLEEP: "0.15"
        run: python -u employee5_runner.py

      - name: Upload fifth employee reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee5-reports
          path: employee5_reports/
          if-no-files-found: warn
          retention-days: 30
