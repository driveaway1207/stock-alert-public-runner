name: Daily overlap stock report

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional target date, for example 2026-06-25"
        required: false
        default: ""
      skip_module_run:
        description: "Use existing module CSV outputs only"
        required: false
        type: choice
        default: "0"
        options:
          - "0"
          - "1"
  schedule:
    - cron: "0 15 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "0 17 * * 1-5"

concurrency:
  group: daily-overlap-stock-report-main
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install preflight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas akshare

      - name: Decide whether this scheduled run should continue
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import urllib.request
          from datetime import datetime, timedelta, timezone

          if os.getenv("EVENT_NAME") != "schedule" or os.getenv("TARGET_DATE", "").strip():
              print("should_run=true")
              print("reason=manual_or_explicit_target")
              raise SystemExit

          bj = timezone(timedelta(hours=8))
          now = datetime.now(bj)

          def completed_trade_date():
              cutoff_hour = int(os.getenv("OVERLAP_TRADE_DATE_CUTOFF_HOUR_BJ", "18"))
              include_today = now.hour >= cutoff_hour
              try:
                  import akshare as ak
                  import pandas as pd

                  cal = ak.tool_trade_date_hist_sina()
                  col = "trade_date" if "trade_date" in cal.columns else cal.columns[0]
                  today = now.date()
                  dates = pd.to_datetime(cal[col], errors="coerce").dt.date.dropna()
                  valid = [d for d in dates if d <= today] if include_today else [d for d in dates if d < today]
                  if valid:
                      return max(valid).isoformat()
              except Exception:
                  d = now.date()
                  if not include_today:
                      d -= timedelta(days=1)
                  while d.weekday() >= 5:
                      d -= timedelta(days=1)
                  return d.isoformat()

          def latest_scheduled_run_conclusion():
              token = os.getenv("GITHUB_TOKEN")
              repo = os.getenv("GITHUB_REPOSITORY")
              if not token or not repo:
                  return "unknown"
              api = f"https://api.github.com/repos/{repo}/actions/workflows/daily_overlap_report.yml/runs?branch=main&event=schedule&status=completed&per_page=1"
              try:
                  req = urllib.request.Request(
                      api,
                      headers={
                          "Authorization": f"Bearer {token}",
                          "Accept": "application/vnd.github+json",
                          "X-GitHub-Api-Version": "2022-11-28",
                      },
                  )
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
                  runs = data.get("workflow_runs") or []
                  if not runs:
                      return "none"
                  return str(runs[0].get("conclusion") or "unknown")
              except Exception:
                  return "unknown"

          target_trade_date = completed_trade_date()
          url = "https://driveaway1207.github.io/stock-alert-public-runner/stock_pool_report.json?nocache=" + str(int(now.timestamp()))
          try:
              with urllib.request.urlopen(url, timeout=20) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
              published_target = str(payload.get("target_date") or "")
              stats = payload.get("module_stats") or []
              required = {"pojie", "lingdong", "qingtian", "employee3"}
              ok_keys = {str(x.get("key")) for x in stats if x.get("ok") is True}
              complete_report = required.issubset(ok_keys)
              if published_target == target_trade_date and complete_report:
                  latest_conclusion = latest_scheduled_run_conclusion()
                  if latest_conclusion == "success":
                      print("should_run=false")
                      print(f"reason=target_trade_date_already_published_complete_{target_trade_date}_latest_success")
                      raise SystemExit
                  print("should_run=true")
                  print(f"reason=complete_report_but_latest_scheduled_run_{latest_conclusion}_retry")
                  raise SystemExit
              print("should_run=true")
              print(f"reason=target_trade_date_{target_trade_date}_not_complete_or_not_published")
          except Exception as exc:
              print("should_run=true")
              print("reason=no_recent_report_json_" + type(exc).__name__)
          PY

  run-modules:
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    name: Run ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: pojie
            name: pojie
          - key: lingdong
            name: lingdong
          - key: qingtian
            name: qingtian
          - key: employee3
            name: employee3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore shared kline cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-${{ matrix.key }}-overlap-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tabulate

      - name: Run module
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OVERLAP_TARGET_DATE: ${{ github.event.inputs.target_date }}
          OVERLAP_SKIP_MODULE_RUN: ${{ github.event.inputs.skip_module_run || '0' }}
          OVERLAP_ONLY_MODULES: ${{ matrix.key }}
          OVERLAP_SEND_TELEGRAM: "0"
        run: python -u tools/run_overlap_module.py

      - name: Save module status
        if: always()
        env:
          MODULE_KEY: ${{ matrix.key }}
        run: |
          mkdir -p overlap_status
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          key = os.environ["MODULE_KEY"]
          src = Path("public_reports/stock_pool_report.json")
          out = Path("overlap_status") / f"{key}.json"
          if src.exists():
              payload = json.loads(src.read_text(encoding="utf-8"))
          else:
              payload = {
                  "module_stats": [{"key": key, "name": key, "ok": False, "count": 0, "outputs": []}],
                  "module_results": {key: {"ok": False, "tail": "module wrapper did not produce status json"}},
              }
          out.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Upload module outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overlap-module-${{ matrix.key }}
          path: |
            artifacts/
            employee3_reports/
            *.csv
            */*.csv
            */*.json
            */*.md
            overlap_status/
            public_reports/
          if-no-files-found: ignore
          retention-days: 7

  build-report:
    needs: [preflight, run-modules]
    if: always() && needs.preflight.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore shared kline cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-overlap-summary-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: Download module outputs
        uses: actions/download-artifact@v4
        with:
          pattern: overlap-module-*
          merge-multiple: true
          path: .

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tabulate

      - name: Build overlap HTML report from module outputs
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OVERLAP_TARGET_DATE: ${{ github.event.inputs.target_date }}
          OVERLAP_SKIP_MODULE_RUN: "1"
          OVERLAP_SEND_TELEGRAM: "0"
          REPORT_PUBLIC_URL: "https://driveaway1207.github.io/stock-alert-public-runner/stock_pool_report.html"
        run: python -u tools/run_overlap_module.py

      - name: Merge real module statuses into final report
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, "tools")
          import daily_overlap_report as report

          final_path = Path("public_reports/stock_pool_report.json")
          payload = json.loads(final_path.read_text(encoding="utf-8"))
          merged_stats = []
          merged_results = {}
          for path in sorted(Path("overlap_status").glob("*.json")):
              item = json.loads(path.read_text(encoding="utf-8"))
              stats = item.get("module_stats") or []
              if stats:
                  merged_stats.append(stats[0])
              merged_results.update(item.get("module_results") or {})
          if merged_stats:
              payload["module_stats"] = merged_stats
              payload["module_results"] = merged_results
              final_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
              report.REPORT_HTML.write_text(report.build_html(payload), encoding="utf-8")
          PY

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp public_reports/stock_pool_report.html _site/stock_pool_report.html
          cp public_reports/stock_pool_report.json _site/stock_pool_report.json
          cp public_reports/stock_pool_report.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Telegram link
        if: always() && steps.deployment.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_PUBLIC_URL: ${{ steps.deployment.outputs.page_url }}stock_pool_report.html
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, "tools")
          import daily_overlap_report as report

          payload = json.loads(Path("public_reports/stock_pool_report.json").read_text(encoding="utf-8"))
          ok = report.send_telegram(os.environ["REPORT_PUBLIC_URL"], payload)
          payload["telegram_sent"] = ok
          Path("public_reports/stock_pool_report.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps({"telegram_sent": ok}, ensure_ascii=False))
          if not ok:
              raise SystemExit(1)
          PY

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-overlap-stock-report
          path: public_reports/
          if-no-files-found: warn
          retention-days: 30
