name: Daily overlap stock report

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional target date, for example 2026-06-25"
        required: false
        default: ""
      skip_module_run:
        description: "Use existing module CSV outputs only"
        required: false
        type: choice
        default: "0"
        options:
          - "0"
          - "1"
  schedule:
    - cron: "0 15 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "0 17 * * 1-5"

concurrency:
  group: daily-overlap-stock-report-main
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - name: Decide whether this scheduled run should continue
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import urllib.request
          from datetime import datetime, timedelta, timezone

          if os.getenv("EVENT_NAME") != "schedule" or os.getenv("TARGET_DATE", "").strip():
              print("should_run=true")
              print("reason=manual_or_explicit_target")
              raise SystemExit

          bj = timezone(timedelta(hours=8))
          now = datetime.now(bj)
          url = "https://driveaway1207.github.io/stock-alert-public-runner/stock_pool_report.json?nocache=" + str(int(now.timestamp()))
          try:
              with urllib.request.urlopen(url, timeout=20) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
              generated = str(payload.get("generated_at_bj") or "")
              ts = datetime.strptime(generated, "%Y-%m-%d %H:%M:%S").replace(tzinfo=bj)
              age_hours = (now - ts).total_seconds() / 3600
              if 0 <= age_hours <= 4:
                  print("should_run=false")
                  print(f"reason=recent_report_exists_age_hours_{age_hours:.2f}")
              else:
                  print("should_run=true")
                  print(f"reason=report_stale_or_missing_age_hours_{age_hours:.2f}")
          except Exception as exc:
              print("should_run=true")
              print("reason=no_recent_report_json_" + type(exc).__name__)
          PY

  run-modules:
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    name: Run ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: pojie
            name: pojie
          - key: lingdong
            name: lingdong
          - key: qingtian
            name: qingtian
          - key: employee3
            name: employee3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore shared kline cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-${{ matrix.key }}-overlap-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tabulate

      - name: Run module
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OVERLAP_TARGET_DATE: ${{ github.event.inputs.target_date }}
          OVERLAP_SKIP_MODULE_RUN: ${{ github.event.inputs.skip_module_run || '0' }}
          OVERLAP_ONLY_MODULES: ${{ matrix.key }}
          OVERLAP_SEND_TELEGRAM: "0"
        run: python -u tools/run_overlap_module.py

      - name: Upload module outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overlap-module-${{ matrix.key }}
          path: |
            artifacts/
            employee3_reports/
            *.csv
            */*.csv
            */*.json
            */*.md
            public_reports/
          if-no-files-found: ignore
          retention-days: 7

  build-report:
    needs: [preflight, run-modules]
    if: always() && needs.preflight.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore shared kline cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-overlap-summary-${{ github.run_id }}
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-
            a-stock-kline-cache-v1-
            a-stock-full-kline-cache-
            employee5-kline-cache-
            kline-cache-

      - name: Download module outputs
        uses: actions/download-artifact@v4
        with:
          pattern: overlap-module-*
          merge-multiple: true
          path: .

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tabulate

      - name: Build overlap HTML report from module outputs
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OVERLAP_TARGET_DATE: ${{ github.event.inputs.target_date }}
          OVERLAP_SKIP_MODULE_RUN: "1"
          OVERLAP_SEND_TELEGRAM: "0"
          REPORT_PUBLIC_URL: "https://driveaway1207.github.io/stock-alert-public-runner/stock_pool_report.html"
        run: python -u tools/run_overlap_module.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp public_reports/stock_pool_report.html _site/stock_pool_report.html
          cp public_reports/stock_pool_report.json _site/stock_pool_report.json
          cp public_reports/stock_pool_report.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Telegram link
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OVERLAP_SKIP_MODULE_RUN: "1"
          OVERLAP_SEND_TELEGRAM: "1"
          REPORT_PUBLIC_URL: ${{ steps.deployment.outputs.page_url }}stock_pool_report.html
        run: python -u tools/run_overlap_module.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-overlap-stock-report
          path: public_reports/
          if-no-files-found: warn
          retention-days: 30
