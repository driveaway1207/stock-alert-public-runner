name: Pressure Band Validator

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit symbols for test run"
        required: false
        default: "50"

permissions:
  contents: read
  actions: write

jobs:
  run-pressure-band-validator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore full A-share kline cache
        id: restore_kline_cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-pressure-band-test
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-${{ runner.os }}-
            full-kline-cache-

      - name: Show restored cache status
        run: |
          echo "========== 恢复到的缓存 =========="
          echo "Cache hit: ${{ steps.restore_kline_cache.outputs.cache-hit }}"
          echo "Cache primary key: ${{ steps.restore_kline_cache.outputs.cache-primary-key }}"
          echo "Cache matched key: ${{ steps.restore_kline_cache.outputs.cache-matched-key }}"

          echo "========== kline_cache 检查 =========="
          if [ -d "kline_cache" ]; then
            echo "kline_cache 文件数量："
            find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l

            echo "kline_cache 目录大小："
            du -sh kline_cache || true

            echo "kline_cache 前50个文件："
            find kline_cache -type f -name "*.csv" ! -name "_*.csv" | head -50 || true

            echo "状态文件："
            ls -lah kline_cache/_full_history_status.csv || true
          else
            echo "没有 kline_cache 目录"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pressure band validator
        run: |
          mkdir -p output
          python modules/pressure_band_validator.py \
            --symbols SZ.000001,SH.600519,SZ.300750,SH.601318,SZ.002594,SH.600036,SZ.000858,SH.600900,SZ.300059,SH.601899 \
            --cache-dir kline_cache \
            --out output/pressure_band_candidates.csv \
            --failed-out output/pressure_band_failed.csv

      - name: Check cache after run
        if: always()
        run: |
          echo "========== 运行后缓存检查 =========="
          if [ -d "kline_cache" ]; then
            echo "kline_cache 文件数量："
            find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l

            echo "kline_cache 目录大小："
            du -sh kline_cache || true

            echo "kline_cache 前50个文件："
            find kline_cache -type f -name "*.csv" ! -name "_*.csv" | head -50 || true
          else
            echo "运行后没有 kline_cache 目录"
          fi

      - name: Upload output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pressure-band-output
          path: |
            output/pressure_band_candidates.csv
            output/pressure_band_failed.csv
