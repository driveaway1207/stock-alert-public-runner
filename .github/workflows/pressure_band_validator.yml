name: Pressure Band Validator

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit symbols for test run"
        required: false
        default: "50"

jobs:
  run-pressure-band-validator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore A-share kline cache
        id: restore-kline-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/cache/kline
            data/cache
            cache
            kline_cache
            data/kline_cache
            data
          key: a-kline-cache-main-daily-latest
          restore-keys: |
            a-kline-cache-main-daily-
            a-kline-cache-main-

      - name: Show restored cache key
        run: |
          echo "========== 恢复到的缓存 key =========="
          echo "cache-hit: ${{ steps.restore-kline-cache.outputs.cache-hit }}"
          echo "cache-primary-key: ${{ steps.restore-kline-cache.outputs.cache-primary-key }}"
          echo "cache-matched-key: ${{ steps.restore-kline-cache.outputs.cache-matched-key }}"

      - name: Check restored cache files
        run: |
          echo "========== 检查缓存目录 =========="
          echo "当前目录："
          pwd

          echo "---------- 全部 csv 文件前100个 ----------"
          find . -type f -name "*.csv" | head -100 || true

          echo "---------- data/cache/kline 目录 ----------"
          if [ -d "data/cache/kline" ]; then
            echo "data/cache/kline 文件数量："
            find data/cache/kline -type f | wc -l

            echo "data/cache/kline 前50个文件："
            find data/cache/kline -type f | head -50

            echo "data/cache/kline 目录大小："
            du -sh data/cache/kline || true
          else
            echo "没有 data/cache/kline 目录"
          fi

          echo "---------- data/cache 目录 ----------"
          if [ -d "data/cache" ]; then
            echo "data/cache 文件数量："
            find data/cache -type f | wc -l

            echo "data/cache 前50个文件："
            find data/cache -type f | head -50

            echo "data/cache 目录大小："
            du -sh data/cache || true
          else
            echo "没有 data/cache 目录"
          fi

          echo "---------- cache 目录 ----------"
          if [ -d "cache" ]; then
            echo "cache 文件数量："
            find cache -type f | wc -l

            echo "cache 前50个文件："
            find cache -type f | head -50

            echo "cache 目录大小："
            du -sh cache || true
          else
            echo "没有 cache 目录"
          fi

          echo "---------- data/kline_cache 目录 ----------"
          if [ -d "data/kline_cache" ]; then
            echo "data/kline_cache 文件数量："
            find data/kline_cache -type f | wc -l

            echo "data/kline_cache 前50个文件："
            find data/kline_cache -type f | head -50

            echo "data/kline_cache 目录大小："
            du -sh data/kline_cache || true
          else
            echo "没有 data/kline_cache 目录"
          fi

          echo "---------- kline_cache 目录 ----------"
          if [ -d "kline_cache" ]; then
            echo "kline_cache 文件数量："
            find kline_cache -type f | wc -l

            echo "kline_cache 前50个文件："
            find kline_cache -type f | head -50

            echo "kline_cache 目录大小："
            du -sh kline_cache || true
          else
            echo "没有 kline_cache 目录"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pressure band validator
        run: |
          mkdir -p output
          python modules/pressure_band_validator.py \
            --symbols SZ.000001,SH.600519,SZ.300750,SH.601318,SZ.002594,SH.600036,SZ.000858,SH.600900,SZ.300059,SH.601899 \
            --cache-dir data/cache/kline \
            --out output/pressure_band_candidates.csv \
            --failed-out output/pressure_band_failed.csv

      - name: Check cache after run
        run: |
          echo "========== 运行后检查缓存 =========="
          echo "全部 csv 文件前100个："
          find . -type f -name "*.csv" | head -100 || true

          if [ -d "data/cache/kline" ]; then
            echo "data/cache/kline 文件数量："
            find data/cache/kline -type f | wc -l

            echo "data/cache/kline 前50个文件："
            find data/cache/kline -type f | head -50

            echo "data/cache/kline 目录大小："
            du -sh data/cache/kline || true
          else
            echo "运行后仍然没有 data/cache/kline 目录"
          fi

      - name: Upload output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pressure-band-output
          path: |
            output/pressure_band_candidates.csv
            output/pressure_band_failed.csv
