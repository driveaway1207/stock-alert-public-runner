name: Pressure Band Validator

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "每批扫描数量，建议500"
        required: false
        default: "500"
      min_rr:
        description: "正式可实操最低第一目标收益风险比"
        required: false
        default: "1.5"

permissions:
  contents: read
  actions: write

concurrency:
  group: pressure-band-validator
  cancel-in-progress: false

jobs:
  run-pressure-band-validator:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore full A-share kline cache
        id: restore_kline_cache
        uses: actions/cache/restore@v4
        with:
          path: kline_cache
          key: a-kline-cache-${{ github.ref_name }}-pressure-band-test
          restore-keys: |
            a-kline-cache-${{ github.ref_name }}-
            a-kline-cache-
            full-kline-cache-${{ runner.os }}-${{ github.ref_name }}-
            full-kline-cache-

      - name: Verify restored cache
        run: |
          echo "========== 恢复到的缓存 =========="
          echo "Cache hit: ${{ steps.restore_kline_cache.outputs.cache-hit }}"
          echo "Cache primary key: ${{ steps.restore_kline_cache.outputs.cache-primary-key }}"
          echo "Cache matched key: ${{ steps.restore_kline_cache.outputs.cache-matched-key }}"

          if [ ! -d "kline_cache" ]; then
            echo "没有 kline_cache 目录，终止运行。"
            exit 1
          fi

          CACHE_COUNT=$(find kline_cache -type f -name "*.csv" ! -name "_*.csv" | wc -l)
          echo "kline_cache 文件数量：$CACHE_COUNT"
          du -sh kline_cache || true

          if [ "$CACHE_COUNT" -lt 3000 ]; then
            echo "缓存数量少于3000，说明没有恢复到完整A股缓存，终止运行。"
            exit 1
          fi

      - name: Build full symbols file from kline cache
        run: |
          mkdir -p output batches batch_outputs

          find kline_cache -type f -name "*.csv" ! -name "_*.csv" \
            | sed 's#^.*/##' \
            | sed 's#\.csv$##' \
            | grep -E '^[0-9]{6}$' \
            | sort \
            > output/symbols_from_cache.txt

          echo "缓存股票池数量："
          wc -l output/symbols_from_cache.txt

          echo "切分批次，每批 ${{ github.event.inputs.batch_size }} 只"
          split -l ${{ github.event.inputs.batch_size }} -d -a 3 output/symbols_from_cache.txt batches/batch_

          echo "批次数量："
          ls batches/batch_* | wc -l

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy akshare tqdm openpyxl

      - name: Run validator by batches
        run: |
          mkdir -p batch_outputs output

          i=0
          for f in batches/batch_*; do
            echo "========== 开始批次 $i：$f =========="

            timeout 25m python modules/pressure_band_validator.py \
              --symbols-file "$f" \
              --cache-dir kline_cache \
              --out-dir "batch_outputs/batch_$i" \
              --min-rr ${{ github.event.inputs.min_rr }} \
              --quiet || echo "批次 $i 失败或超时，继续下一批"

            echo "========== 批次 $i 完成 =========="

            if [ -f "batch_outputs/batch_$i/pressure_band_actionable.csv" ]; then
              ACTIONABLE_LINES=$(wc -l < "batch_outputs/batch_$i/pressure_band_actionable.csv")
              echo "正式可实操：$((ACTIONABLE_LINES > 0 ? ACTIONABLE_LINES - 1 : 0))"
            fi

            if [ -f "batch_outputs/batch_$i/pressure_band_near_actionable.csv" ]; then
              NEAR_LINES=$(wc -l < "batch_outputs/batch_$i/pressure_band_near_actionable.csv")
              echo "准可实操：$((NEAR_LINES > 0 ? NEAR_LINES - 1 : 0))"
            fi

            if [ -f "batch_outputs/batch_$i/pressure_band_waiting_breakout.csv" ]; then
              WAITING_LINES=$(wc -l < "batch_outputs/batch_$i/pressure_band_waiting_breakout.csv")
              echo "等待高级突破：$((WAITING_LINES > 0 ? WAITING_LINES - 1 : 0))"
            fi

            i=$((i+1))
          done

      - name: Merge batch outputs
        if: always()
        run: |
          python - <<'PY'
          import pandas as pd
          from pandas.errors import EmptyDataError
          from pathlib import Path

          root = Path("batch_outputs")
          out = Path("output")
          out.mkdir(exist_ok=True)

          files = [
              "pressure_band_actionable.csv",
              "pressure_band_actionable_精简版.csv",
              "pressure_band_near_actionable.csv",
              "pressure_band_near_actionable_精简版.csv",
              "pressure_band_waiting_breakout.csv",
              "pressure_band_failed_breakout.csv",
              "pressure_band_all_validation.csv",
              "pressure_band_failed.csv",
          ]

          def read_csv_safe(p: Path):
              if not p.exists() or p.stat().st_size == 0:
                  return None
              try:
                  df = pd.read_csv(p)
                  if df.empty:
                      return None
                  return df
              except EmptyDataError:
                  return None
              except Exception as e:
                  print(f"读取失败 {p}: {e}")
                  return None

          merged = {}

          for name in files:
              dfs = []
              for bd in sorted(root.glob("batch_*")):
                  p = bd / name
                  df = read_csv_safe(p)
                  if df is not None:
                      df.insert(0, "批次", bd.name)
                      dfs.append(df)

              m = pd.concat(dfs, ignore_index=True) if dfs else pd.DataFrame()

              if not m.empty and "第一目标收益风险比" in m.columns:
                  m["_RR"] = pd.to_numeric(m["第一目标收益风险比"], errors="coerce").fillna(0)
                  m = m.sort_values("_RR", ascending=False).drop(columns=["_RR"])

              m.to_csv(out / name, index=False, encoding="utf-8-sig")
              merged[name] = m
              print(f"{name}: {len(m)}")

          merged.get("pressure_band_actionable_精简版.csv", pd.DataFrame()).to_csv(
              out / "正式可实操候选.csv", index=False, encoding="utf-8-sig"
          )

          merged.get("pressure_band_near_actionable_精简版.csv", pd.DataFrame()).to_csv(
              out / "准可实操候选.csv", index=False, encoding="utf-8-sig"
          )

          merged.get("pressure_band_waiting_breakout.csv", pd.DataFrame()).to_csv(
              out / "等待高级突破候选.csv", index=False, encoding="utf-8-sig"
          )

          merged.get("pressure_band_failed_breakout.csv", pd.DataFrame()).to_csv(
              out / "假突破失败候选.csv", index=False, encoding="utf-8-sig"
          )

          merged.get("pressure_band_all_validation.csv", pd.DataFrame()).to_csv(
              out / "全部压力带验证.csv", index=False, encoding="utf-8-sig"
          )

          print("========== 合并完成 ==========")
          print("正式可实操:", len(merged.get("pressure_band_actionable_精简版.csv", [])))
          print("准可实操:", len(merged.get("pressure_band_near_actionable_精简版.csv", [])))
          print("等待突破:", len(merged.get("pressure_band_waiting_breakout.csv", [])))
          print("假突破:", len(merged.get("pressure_band_failed_breakout.csv", [])))
          PY

      - name: Show final summary
        if: always()
        run: |
          echo "========== 输出文件 =========="
          ls -lah output || true

          echo "========== 正式可实操候选 =========="
          if [ -f output/正式可实操候选.csv ]; then
            wc -l output/正式可实操候选.csv
            head -20 output/正式可实操候选.csv
          fi

          echo "========== 准可实操候选 =========="
          if [ -f output/准可实操候选.csv ]; then
            wc -l output/准可实操候选.csv
            head -20 output/准可实操候选.csv
          fi

          echo "========== 等待高级突破候选 =========="
          if [ -f output/等待高级突破候选.csv ]; then
            wc -l output/等待高级突破候选.csv
          fi

          echo "========== 假突破失败候选 =========="
          if [ -f output/假突破失败候选.csv ]; then
            wc -l output/假突破失败候选.csv
          fi

          echo "========== 失败清单 =========="
          if [ -f output/pressure_band_failed.csv ]; then
            wc -l output/pressure_band_failed.csv
            head -20 output/pressure_band_failed.csv
          fi

      - name: Upload output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pressure-band-output
          path: |
            output/正式可实操候选.csv
            output/准可实操候选.csv
            output/等待高级突破候选.csv
            output/假突破失败候选.csv
            output/全部压力带验证.csv
            output/pressure_band_actionable.csv
            output/pressure_band_actionable_精简版.csv
            output/pressure_band_near_actionable.csv
            output/pressure_band_near_actionable_精简版.csv
            output/pressure_band_waiting_breakout.csv
            output/pressure_band_failed_breakout.csv
            output/pressure_band_all_validation.csv
            output/pressure_band_failed.csv
            output/symbols_from_cache.txt
